<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Sweet Earth</title>
<meta name="description" content="Empowering and educating youth to be environmentally conscious and take initiative.">
<meta property="og:type" content="website">
<meta property="og:title" content="Earth Sweet Earth">
<meta property="og:description" content="Empowering and educating youth to be environmentally conscious and take initiative.">
<meta property="og:url" content="https://earthsweetearth.org">
<meta property="og:image" content="https://earthsweetearth.org/social.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#F4D462">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Eagle+Lake&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Supabase library — powers real accounts once you add your keys (CONFIG block in the script). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --green:#007600; --green-dk:#005800;
    --blue:#2083C4;  --blue-dk:#186098;
    --bg:#D5E3DA; --card:#ffffff; --ink:#20302a; --muted:#5f7168; --line:#c4d6cb;
    --sun:#F4C430;
    --maxw:1200px;
  }
  [data-theme="dark"]{
    --green:#49b76e; --green-dk:#3aa05e;
    --blue:#5cb3ea;  --blue-dk:#3f97cf;
    --bg:#0e1720; --card:#17222c; --ink:#e7eef3; --muted:#9db0bb; --line:#2a3742;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;font-family:"Inter",system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;
    transition:background .3s ease,color .3s ease;}
  #app{flex:1 0 auto;}
  footer{flex-shrink:0;}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;line-height:1.1;margin:0;color:var(--green);}
  p{margin:0 0 1rem;}
  a{color:var(--blue);}
  img{max-width:100%;display:block;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(22px,3.5vw,40px);}

  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:6px;}
  .skip{position:absolute;left:16px;top:-60px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;z-index:200;transition:top .2s;}
  .skip:focus{top:70px;}

  /* buttons */
  .btn{display:inline-block;font-family:inherit;font-weight:600;font-size:.96rem;padding:12px 24px;border-radius:100px;text-decoration:none;cursor:pointer;border:2px solid transparent;transition:transform .15s,background .2s,color .2s,border-color .2s;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-dk);transform:translateY(-2px);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{background:var(--blue-dk);transform:translateY(-2px);}
  .btn-ghost{background:transparent;border-color:var(--blue);color:var(--blue);}
  .btn-ghost:hover{background:var(--blue);color:#fff;transform:translateY(-2px);}
  .btn-sm{padding:8px 16px;font-size:.88rem;}
  .btn-xs{padding:5px 12px;font-size:.8rem;border-width:1.5px;}
  .btn-danger{background:#c0392b;color:#fff;}
  .btn-danger:hover{background:#a5301f;transform:translateY(-2px);}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  .mrow{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
  .mrow .search{flex:1;}

  /* preview bar */
  .proto{background:#20302a;color:#e7efe9;font-size:.84rem;}
  [data-theme="dark"] .proto{background:#050d13;}
  .proto .wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 24px;}
  .proto b{color:var(--sun);}
  .proto .spacer{flex:1;}
  .proto .pv{display:flex;gap:6px;flex-wrap:wrap;}
  .proto .pv button{background:transparent;border:1px solid #4a5d54;color:#cfe;border-radius:100px;padding:4px 11px;font-size:.8rem;cursor:pointer;font-family:inherit;}
  .proto .pv button.active{background:var(--sun);color:#20302a;border-color:var(--sun);font-weight:600;}

  /* top nav — sized so all tabs fit on one row at the same height for everyone */
  .topbar{background:#F4D462;border-bottom:1px solid rgba(0,0,0,.14);position:sticky;top:0;z-index:50;transition:background .3s;}
  [data-theme="dark"] .topbar{background:#80471c;border-bottom:1px solid #5c3214;}
  [data-theme="dark"] .topbar .tabs button{color:#eadfce;}
  .topbar .brand{color:#0a4d0a;}
  .topbar .tabs button{color:#33261a;}
  [data-theme="dark"] .topbar .brand{color:var(--green);}
  .nav{display:flex;flex-wrap:nowrap;align-items:center;gap:11px;padding:6px 0;min-height:52px;}
  .brand{display:inline-flex;align-items:center;flex:none;text-decoration:none;}
  .brand-logo{height:clamp(30px,5vw,44px);width:clamp(30px,5vw,44px);object-fit:contain;display:block;}
  .tabs{flex:1 1 auto;min-width:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .tabsInner{display:flex;gap:2px;width:max-content;margin:0 auto;padding:0 4px;}
  .tabs::-webkit-scrollbar{display:none;}
  .tabs button{background:transparent;border:none;font-family:inherit;font-size:.92rem;font-weight:500;color:var(--ink);cursor:pointer;padding:7px 11px;border-radius:8px;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s;}
  .tabs button:hover{color:var(--green);}
  .tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
  .tabs button.admin{color:var(--blue);}
  .tabs button.admin.active{color:var(--blue);border-bottom-color:var(--blue);}
  .acct{display:flex;gap:8px;align-items:center;white-space:nowrap;flex:none;}
  .iconbtn{background:var(--blue);border:1.5px solid var(--blue);color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;}
  .iconbtn:hover{background:var(--blue-dk);border-color:var(--blue-dk);color:#fff;}
  .userbtn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1.5px solid var(--blue);border-radius:100px;padding:4px 12px 4px 4px;cursor:pointer;font-family:inherit;color:var(--ink);transition:background .2s;}
  .userbtn:hover{background:rgba(32,131,196,.12);}
  [data-theme="dark"] .userbtn:hover{background:rgba(92,179,234,.18);}
  .userbtn .uname{font-size:.9rem;font-weight:600;}
  .acct-profile{position:relative;display:inline-flex;}
  .acct-profile.out{display:none;}   /* logged-out "more" (three-dot) menu: only shown on narrow screens (see media query) */
  .nav-menu{position:absolute;top:calc(100% + 10px);right:0;min-width:188px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 34px rgba(20,48,42,.16);padding:6px;display:none;flex-direction:column;gap:2px;z-index:60;}
  [data-theme="dark"] .nav-menu{box-shadow:0 14px 34px rgba(0,0,0,.45);}
  .nav-menu.open{display:flex;}
  .nav-menu button{display:flex;align-items:center;gap:11px;background:none;border:none;padding:11px 13px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:.92rem;font-weight:500;color:var(--ink);text-align:left;width:100%;transition:background .15s;}
  .nav-menu button:hover{background:var(--bg);}
  .nav-menu svg{width:18px;height:18px;flex-shrink:0;color:var(--muted);}
  .nav-menu button:hover svg{color:var(--green);}
  @media(max-width:640px){
    .nav{min-height:44px;padding:5px 0;gap:9px;}
    .brand-logo{height:29px;width:29px;}
    .tabs button{font-size:.82rem;padding:5px 8px;}
    .acct{gap:7px;}
    .iconbtn{width:34px;height:34px;}
    .langnavbtn{height:34px;width:120px;font-size:.82rem;padding:0 10px;}
    .acct>.iconbtn,.acct>.langnavbtn{display:none;}   /* condense theme + language into the dropdown, whether logged in OR out */
    .acct-profile.out{display:inline-flex;}           /* ...reached via the logged-out "more" menu */
    .acct.has-profile .userbtn .uname{display:none;}
    .acct.has-profile .userbtn{padding:3px;border-radius:50%;}
    .nav-menu{min-width:174px;}
  }
  .avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-weight:700;font-size:.85rem;overflow:hidden;}

  /* page bits */
  .view{padding-top:52px;padding-bottom:84px;}   /* vertical only — horizontal gutter comes from .wrap */
  .fade{animation:fade .45s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .eyebrow{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--blue);margin-bottom:12px;}
  .page-title{font-size:clamp(2rem,4.5vw,2.9rem);margin-bottom:10px;}
  .page-intro{font-size:1.1rem;color:var(--ink);max-width:65ch;margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(20,48,42,.06);}
  [data-theme="dark"] .card{box-shadow:0 8px 22px rgba(0,0,0,.3);}
  .grid{display:grid;gap:20px;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  .muted{color:var(--muted);}
  .pill{display:inline-block;background:rgba(32,131,196,.12);color:var(--blue-dk);border-radius:100px;padding:3px 12px;font-size:.76rem;font-weight:600;}
  [data-theme="dark"] .pill{background:rgba(92,179,234,.18);color:var(--blue);}
  .addbtn{background:transparent;border:2px dashed var(--line);color:var(--muted);border-radius:12px;padding:12px 18px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.9rem;width:100%;transition:border-color .2s,color .2s;}
  .addbtn:hover{border-color:var(--green);color:var(--green);}
  .rowbtns{display:flex;gap:6px;margin-top:10px;}
  .sec{margin-bottom:52px;}
  .home-stack{display:flex;flex-direction:column;gap:52px;padding:52px 0 52px;}
  .sechead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px;}

  /* info tooltip (ⓘ) — upright, and opens BELOW so it never gets clipped by the nav */
  .info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:.72rem;font-weight:700;cursor:help;margin-left:6px;font-style:normal;vertical-align:middle;}
  .info .tip{visibility:hidden;opacity:0;position:absolute;top:150%;left:50%;transform:translateX(-50%);background:#20302a;color:#eef;padding:10px 12px;border-radius:8px;font-size:.82rem;font-weight:400;white-space:normal;width:240px;line-height:1.4;z-index:60;transition:opacity .15s;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .info .tip::after{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#20302a;}
  .info .tip a{color:var(--sun);}
  .info:hover .tip,.info:focus .tip,.info:focus-within .tip{visibility:visible;opacity:1;}

  /* ---------- HERO (home) ---------- */
  .hero-scroll{position:relative;height:var(--seasons,240vh);}
  .hero{position:sticky;top:var(--nav-h, 64px);height:calc(100vh - var(--nav-h, 64px));overflow:hidden;isolation:isolate;}
  .sky{position:absolute;inset:0;z-index:0;transition:none;}
  .stars,.milky{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity .4s;}
  .constellations{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:0;transition:opacity .4s;}
  .hero.night .stars,.hero.night .milky,.hero.night .constellations{opacity:1;}
  .milky{background:
      radial-gradient(40% 26% at 58% 32%, rgba(255,244,222,.09), transparent 72%),
      radial-gradient(26% 20% at 50% 46%, rgba(150,110,70,.15), transparent 72%),
      radial-gradient(24% 18% at 64% 24%, rgba(170,120,72,.14), transparent 74%),
      radial-gradient(20% 15% at 54% 40%, rgba(224,180,120,.14), transparent 72%),
      radial-gradient(18% 14% at 68% 18%, rgba(234,194,132,.13), transparent 74%),
      radial-gradient(26% 22% at 47% 50%, rgba(88,120,220,.13), transparent 74%),
      radial-gradient(22% 18% at 66% 22%, rgba(120,90,210,.12), transparent 74%),
      radial-gradient(20% 16% at 60% 30%, rgba(70,100,200,.10), transparent 76%),
      radial-gradient(16% 14% at 52% 44%, rgba(140,82,190,.10), transparent 76%);
    filter:blur(8px);mix-blend-mode:screen;}
  .milky::after{content:"";position:absolute;inset:0;opacity:.55;background:
      radial-gradient(1.3px 1.3px at 55% 33%,#fff,transparent),radial-gradient(1px 1px at 60% 26%,#d5ddff,transparent),
      radial-gradient(1.3px 1.3px at 64% 24%,#fff,transparent),radial-gradient(1px 1px at 58% 34%,#e9edff,transparent),
      radial-gradient(1px 1px at 52% 40%,#cfd8ff,transparent),radial-gradient(1.3px 1.3px at 49% 48%,#fff,transparent),
      radial-gradient(1px 1px at 46% 52%,#ffe9cf,transparent),radial-gradient(1.2px 1.2px at 57% 30%,#fff5e6,transparent),
      radial-gradient(1px 1px at 61% 22%,#ffe9cf,transparent),radial-gradient(1.1px 1.1px at 66% 20%,#fff,transparent),
      radial-gradient(1px 1px at 50% 44%,#ffe0c0,transparent),radial-gradient(1.2px 1.2px at 70% 16%,#fff,transparent),
      radial-gradient(1px 1px at 48% 46%,#f0e6ff,transparent),radial-gradient(1.1px 1.1px at 63% 28%,#fff,transparent),
      radial-gradient(1px 1px at 54% 38%,#ffedd6,transparent),radial-gradient(1.2px 1.2px at 72% 14%,#fff,transparent);}
  .star{position:absolute;border-radius:50%;background:#fff;}
  .star.tw{box-shadow:0 0 4px 1px rgba(255,255,255,.9);}
  .cline{fill:none;stroke:#b6cbff;stroke-width:1.4;opacity:0;filter:drop-shadow(0 0 3px rgba(150,185,255,.8)) drop-shadow(0 0 7px rgba(120,160,255,.45));}
  .cstar{fill:#ffffff;opacity:.4;filter:drop-shadow(0 0 3px rgba(200,220,255,.8));}
  .celestial{position:absolute;inset:0;z-index:1;pointer-events:none;}
  .sun-wrap{position:absolute;left:0;top:0;width:150px;height:150px;will-change:transform;}
  .sun-glow{position:absolute;left:50%;top:50%;width:340px;height:340px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(244,212,98,.72),rgba(244,212,98,0) 70%);mix-blend-mode:screen;}
  .sun-disk{position:absolute;left:50%;top:50%;width:120px;height:120px;transform:translate(-50%,-50%);border-radius:50%;background:var(--sun);box-shadow:0 0 46px rgba(244,212,98,.6);}
  .moon{position:absolute;left:50%;top:8%;transform:translateX(-50%) scale(var(--hs,1));transform-origin:top center;filter:drop-shadow(0 0 18px rgba(200,215,255,.4));}
  .clouds{position:absolute;inset:0;z-index:2;pointer-events:none;}
  .cloud{position:absolute;fill:#ffffff;opacity:.9;}
  .hills-back{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:34vh;z-index:2;display:block;}
  .hills-front{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:23vh;z-index:5;display:block;}
  .ground-shadows{position:absolute;left:0;right:0;bottom:0;width:100%;height:52vh;z-index:2;pointer-events:none;}
  .tshadow{position:absolute;left:0;top:0;width:120px;height:24px;border-radius:50%;background:radial-gradient(closest-side,rgba(8,38,14,.5),rgba(8,38,14,0));z-index:6;pointer-events:none;opacity:0;transform-origin:center;will-change:transform,opacity;}
  .leaf-pile{position:absolute;inset:0;width:100%;height:100%;z-index:6;pointer-events:none;opacity:0;overflow:visible;}
  .tree{position:absolute;bottom:0;width:190px;height:44vh;z-index:3;transform-origin:50% 62.3%;pointer-events:none;}
  .tree-left{left:-6px;}
  .tree-right{right:-6px;transform:scaleX(-1);}
  .trunk{fill:#7a5636;transition:fill .3s;}
  [data-theme="dark"] .hero .trunk{fill:#41301f;}
  .bark{fill:none;stroke:#7a5636;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s;}
  [data-theme="dark"] .hero .bark{stroke:#41301f;}
  .foliage{transform-origin:100px 118px;animation:rustle 5s ease-in-out infinite;}
  .foliage.still{animation:none;}
  .leaf{fill:var(--leaf,#3f8f4f);transition:fill .12s;}
  @keyframes rustle{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}}
  .flower .bud{fill:#a9c98d;}
  .flower .petals{fill:#ffc0d8;}
  .flower .fcenter{fill:#ffdd66;}
  .flyleaf{position:absolute;width:calc(16px*var(--hs,1));height:calc(16px*var(--hs,1));z-index:12;pointer-events:none;overflow:visible;}
  .zzz{position:absolute;left:0;top:0;z-index:6;pointer-events:none;}
  .zzz span{position:absolute;font-family:"Fraunces",serif;font-weight:700;color:#eef4ff;text-shadow:0 1px 6px rgba(0,0,0,.4);will-change:transform,opacity;}
  .scroll-hint{margin-top:20px;font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);opacity:.8;animation:hintbob 1.8s ease-in-out infinite;}
  [data-theme="dark"] .hero-content .scroll-hint{color:#bcc7d6;}
  @keyframes hintbob{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(5px);opacity:.9;}}
  .hero-content{position:relative;z-index:7;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px 190px;}
  .wordmark{font-size:clamp(2.6rem,9vw,6rem);font-weight:900;letter-spacing:-.03em;color:var(--green);margin:26px 0 34px;padding-bottom:.37em;position:relative;z-index:0;}
  .wordmark .cw{position:relative;display:inline-block;}
  .wordmark .cwsvg{position:absolute;left:50%;top:50%;width:174%;height:214%;transform:translate(-50%,-61%);z-index:-1;pointer-events:none;overflow:visible;}
  [data-theme="dark"] .wordmark .cwsvg{display:none;}

  [data-theme="dark"] .hero-content .wordmark{color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.5);}
  .wordmark .sw{color:var(--blue);font-style:italic;font-weight:600;}
  [data-theme="dark"] .hero-content .wordmark .sw{color:var(--sun);}
  .tagline{font-family:"Eagle Lake",Georgia,serif;font-size:clamp(1.55rem,3.5vw,2.4rem);line-height:1.55;color:var(--ink);max-width:640px;margin:0 auto 34px;}
  [data-theme="dark"] .hero-content .tagline{color:#dfe7ee;}
  .cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .shooting{position:absolute;height:2px;width:120px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff);border-radius:2px;z-index:1;pointer-events:none;}
  /* birds: small silhouettes gliding across the top two-thirds (daytime only) */
  .birds{position:absolute;z-index:4;pointer-events:none;}
  .bird{position:absolute;color:#333;}
  [data-theme="dark"] .hero .bird{color:#9aa6b4;}
  .bird svg{display:block;fill:currentColor;}
  /* winter snow: falling flakes; the ground shapes themselves recolour to white */
  .snow{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;}
  .snow span{position:absolute;top:-6%;border-radius:50%;background:#fff;opacity:.9;animation:snowfall linear infinite;}
  @keyframes snowfall{0%{transform:translate(0,-10%);}100%{transform:translate(var(--dx,10px),120vh);}}
  .windgust{position:absolute;z-index:12;pointer-events:none;overflow:visible;}
  .windgust path{fill:none;stroke:#ffffff;stroke-linecap:round;}

  /* team */
  .team-photo{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;object-fit:cover;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;overflow:hidden;}
  .team-card{text-align:center;}
  .team-card h3{font-size:1.15rem;margin-bottom:4px;}

  /* discord */
  .discord{text-align:center;}
  .discord h2{font-size:1.7rem;margin-bottom:8px;}

  /* newsletter */
  .featured{border-left:5px solid var(--green);}
  .reactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .reactions button{background:transparent;border:1px solid var(--line);border-radius:100px;padding:6px 13px;font-size:.88rem;cursor:pointer;font-family:inherit;color:var(--ink);transition:background .15s,border-color .15s;}
  .reactions button:hover{border-color:var(--green);}
  .reactions button.on{background:var(--green);color:#fff;border-color:var(--green);}
  .postcard{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:10px;}
  .postcard .t{cursor:pointer;font-weight:600;}
  .composer input,.composer textarea,.ed input,.ed textarea,.ed select{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:var(--card);color:var(--ink);}
  .tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* chapters */
  .search{width:100%;font-family:inherit;font-size:1rem;padding:13px 16px;border:1px solid var(--line);border-radius:100px;margin-bottom:20px;background:var(--card);color:var(--ink);}
  details.cont{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  details.cont summary{cursor:pointer;padding:15px 18px;font-weight:600;color:var(--green);list-style:none;display:flex;justify-content:space-between;}
  details.cont summary::-webkit-details-marker{display:none;}
  details.cont summary::after{content:"+";color:var(--blue);}
  details.cont[open] summary::after{content:"\2013";}
  details.cont .body{padding:0 18px 16px;}
  .chp-country{padding:8px 0;border-top:1px solid var(--line);}
  .chp-country:first-child{border-top:none;}
  .chp-cn{font-weight:600;margin-bottom:4px;}
  .chp-list{list-style:none;margin:0;padding:0 0 0 4px;}
  .chp-list li{padding:3px 0;color:var(--ink);}
  .chaphead{color:var(--green);font-size:1.5rem;margin:30px 0 14px;}
  .chapreqs{margin:0 0 8px;padding-left:20px;line-height:1.7;}
  .chapreqs li{margin-bottom:9px;color:var(--ink);padding-left:4px;}
  .chapreqs li::marker{color:var(--green);}
  .chapreqs a{color:var(--blue);font-weight:600;}
  /* chapter application form */
  .apply-card{max-width:100%;}
  .ca-fld{margin-bottom:20px;}
  .ca-label{display:block;font-weight:600;color:var(--ink);margin-bottom:7px;font-size:.98rem;}
  .ca-label .muted{font-weight:400;}
  .apply .in{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);font-family:inherit;font-size:.95rem;box-sizing:border-box;}
  .apply textarea.in{resize:vertical;line-height:1.5;}
  .apply select.in{cursor:pointer;}
  .ca-five{display:grid;gap:8px;}
  .ca-hint{margin:6px 0 0;font-size:.82rem;color:var(--muted);}
  .ca-hint.bad{color:#c0392b;}
  .ca-hint.ok{color:var(--green);}
  .ca-check{display:flex;gap:10px;align-items:flex-start;margin:6px 0 20px;font-size:.92rem;line-height:1.45;cursor:pointer;}
  .ca-check input{margin-top:3px;flex:none;width:17px;height:17px;}
  .consent-img{display:block;width:100%;height:auto;border:1px solid var(--line);border-radius:10px;background:#fbfaf5;margin-bottom:10px;-webkit-user-select:none;user-select:none;pointer-events:none;}
  [data-theme="dark"] .consent-img{background:#20241d;}
  .sig-wrap{display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
  .sigpad{width:100%;max-width:420px;height:150px;border:1px dashed var(--line);border-radius:10px;background:#fbfaf5;touch-action:none;cursor:crosshair;}
  [data-theme="dark"] .sigpad{background:#20241d;}
  .ca-recap{border:1px solid var(--line);border-radius:10px;padding:14px;display:inline-flex;align-items:center;gap:12px;background:var(--card);}
  .ca-recap input{width:26px;height:26px;flex:none;cursor:pointer;}
  .ca-note{font-size:.82rem;color:var(--muted);margin:6px 0 0;}
  /* homemade "slide the puzzle piece" captcha — no third-party service, drawn on a canvas */
  .pcap{margin-top:2px;max-width:420px;}
  .pcap-stage{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#0b131a;line-height:0;}
  .pcap-canvas{width:100%;height:auto;display:block;-webkit-user-select:none;user-select:none;}
  .pcap-refresh{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:8px;border:none;background:rgba(255,255,255,.9);color:#2a3b32;cursor:pointer;font-size:16px;line-height:30px;text-align:center;padding:0;}
  .pcap-refresh:hover{background:#fff;}
  .pcap-done{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,118,0,.6);color:#fff;font-weight:700;font-size:1.05rem;}
  .pcap.solved .pcap-done{display:flex;}
  .pcap-slider{width:100%;margin:12px 0 4px;-webkit-appearance:none;appearance:none;height:16px;border-radius:9px;background:var(--bg);border:1px solid var(--line);outline:none;cursor:grab;}
  .pcap-slider:focus-visible{box-shadow:0 0 0 3px rgba(32,131,196,.45);}
  .pcap-slider:active{cursor:grabbing;}
  .pcap-slider:disabled{opacity:.75;cursor:default;}
  .pcap-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:44px;height:28px;border-radius:7px;background:var(--sun);border:1.5px solid #c79a12;box-shadow:0 2px 6px rgba(0,0,0,.28);cursor:grab;}
  .pcap-slider::-moz-range-thumb{width:44px;height:28px;border-radius:7px;background:var(--sun);border:1.5px solid #c79a12;box-shadow:0 2px 6px rgba(0,0,0,.28);cursor:grab;}
  .pcap.solved .pcap-slider{background:var(--green);border-color:var(--green-dk);}
  .pcap-label{font-size:.82rem;color:var(--muted);margin:2px 0 0;}
  .pcap.solved .pcap-label{color:var(--green);font-weight:600;}
  .ed-select{width:100%;font-family:inherit;font-size:1rem;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);}

  /* calendar */
  .mtg-rect{display:block;background:var(--card);border:2px solid var(--green);border-radius:14px;padding:22px;text-align:center;font-weight:600;color:var(--green);text-decoration:none;margin-bottom:20px;}
  .mtg-rect:hover{background:rgba(0,118,0,.06);}
  .evt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 18px;margin-bottom:12px;cursor:pointer;}
  .evt:hover{border-color:var(--blue);}
  .evt .en{font-weight:600;color:var(--green);}
  .evt .ed2{font-size:.88rem;color:var(--muted);}

  /* gallery */
  .gitem{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--line);}
  .gitem img{width:100%;aspect-ratio:4/3;object-fit:cover;}
  .gitem figcaption{padding:10px 12px;font-size:.9rem;color:var(--muted);}

  /* admin table */
  .tbl{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .tbl th,.tbl td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:.9rem;vertical-align:middle;}
  .tbl th{background:rgba(0,118,0,.06);color:var(--green);font-family:"Fraunces",serif;}
  [data-theme="dark"] .tbl th{background:rgba(73,183,110,.12);}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl td.c,.tbl th.c{text-align:center;}
  .switch{position:relative;display:inline-block;width:40px;height:22px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:22px;transition:.2s;cursor:pointer;}
  .slider::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--green);}
  .switch input:checked + .slider::before{transform:translateX(18px);}
  .switch input:disabled + .slider{opacity:.5;cursor:not-allowed;}
  select.rsel{font-family:inherit;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);}

  .denied{text-align:center;max-width:520px;margin:40px auto;}
  .denied .big{font-size:2.4rem;margin-bottom:10px;}

  /* social links list */
  .links{display:flex;flex-wrap:wrap;gap:10px;}
  .links a,.links .lk{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 16px;text-decoration:none;color:var(--blue);font-weight:600;font-size:.9rem;}
  .links a:hover{border-color:var(--blue);}

  /* modal / toast */
  .modal{position:fixed;inset:0;background:rgba(20,48,42,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:300;}
  .modal.open{display:flex;}
  .modal-card{background:var(--card);color:var(--ink);border-radius:18px;padding:28px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);max-height:88vh;overflow:auto;animation:pop .2s ease;}
  @keyframes pop{from{transform:scale(.95);opacity:0;}to{transform:none;opacity:1;}}
  .modal-card h3{font-size:1.4rem;margin-bottom:10px;}
  .modal-card .x{float:right;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;}
  .modal-card label{display:block;font-size:.84rem;font-weight:600;color:var(--green);margin:12px 0 5px;}
  .modal-card input,.modal-card textarea,.modal-card select{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);}
  .modal-note{background:rgba(32,131,196,.1);border:1px solid rgba(32,131,196,.3);color:var(--blue-dk);border-radius:10px;padding:11px 13px;font-size:.83rem;margin:12px 0;}
  [data-theme="dark"] .modal-note{color:var(--blue);}
  .err{color:#d0463b;font-size:.83rem;margin:6px 0 0;min-height:1em;}
  .img-prev img{width:80px;height:80px;object-fit:cover;border-radius:10px;margin-top:8px;border:1px solid var(--line);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#20302a;color:#eef;padding:12px 20px;border-radius:100px;font-size:.9rem;opacity:0;transition:.3s;z-index:400;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* footer */
  footer{background:#F4D462;color:#3a2f14;padding:44px 0 34px;text-align:center;font-size:.9rem;}
  [data-theme="dark"] footer{background:#80471c;color:#f3e7d8;border-top:1px solid #5c3214;}
  footer .fm{font-family:"Fraunces",serif;font-size:1.3rem;margin-bottom:14px;color:var(--green);}
  footer .fm .sw{color:var(--blue);font-style:italic;}
  footer .fcol{margin:14px 0;}
  footer .flab{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;opacity:.7;margin-bottom:8px;}
  footer .links{justify-content:center;}
  footer .links a,footer .links .lk{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.2);color:var(--blue-dk);}
  [data-theme="dark"] footer .links a,[data-theme="dark"] footer .links .lk{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25);color:var(--blue);}
  footer .addbtn{max-width:280px;margin:0 auto;color:#3a2f14;border-color:rgba(0,0,0,.35);}
  [data-theme="dark"] footer .addbtn{color:#e8dcc0;border-color:rgba(255,255,255,.4);}
  footer .cpy{margin-top:20px;color:#000;}
  [data-theme="dark"] footer .cpy{color:#fff;}

  @media (max-width:900px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:1fr;}.g2{grid-template-columns:1fr;}}
  @media (max-width:640px){.view{padding-top:38px;padding-bottom:60px;}}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;}*{transition:none!important;}.foliage,.star,.snow span{animation:none!important;}}
  /* activities */
  .acts-sub{font-family:"Fraunces",serif;font-size:1.5rem;color:var(--green);margin:34px 0 14px;}
  .cat-grid,.act-list{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .acard{border-radius:18px;padding:22px;display:flex;flex-direction:column;box-shadow:0 8px 22px rgba(20,48,42,.10);}
  [data-theme="dark"] .acard{box-shadow:0 8px 22px rgba(0,0,0,.32);}
  .acard-color{color:#fff;}
  .acard-plain{background:var(--card);border:1px solid var(--line);color:var(--ink);}
  .acard-plain .acard-name{color:var(--green);}
  .acard-name{font-family:"Fraunces",serif;font-size:1.45rem;font-weight:600;margin-bottom:12px;line-height:1.15;}
  .acard-img{width:100%;height:148px;border-radius:12px;margin-bottom:14px;object-fit:cover;background:rgba(255,255,255,.16);}
  .acard-plain .acard-img{background:rgba(0,118,0,.07);}
  .acard-noimg{display:flex;align-items:center;justify-content:center;font-size:2.6rem;}
  .acard-desc{font-size:.97rem;line-height:1.55;margin-bottom:16px;flex:1;}
  .acard-desc.clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .acard-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .acard-btn{align-self:flex-start;background:rgba(255,255,255,.95);color:#20302a;border:none;font-weight:600;}
  .acard-btn:hover{background:#fff;transform:translateY(-2px);}
  .acard-plain .acard-btn{background:var(--green);color:#fff;}
  .acard-plain .acard-btn:hover{background:var(--green-dk);}
  .featured-act{display:grid;grid-template-columns:minmax(0,340px) 1fr;gap:24px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--green);border-radius:18px;padding:22px;box-shadow:0 8px 22px rgba(20,48,42,.08);}
  [data-theme="dark"] .featured-act{box-shadow:0 8px 22px rgba(0,0,0,.3);}
  .fa-img img,.fa-img .acard-noimg{width:100%;height:210px;border-radius:12px;object-fit:cover;background:rgba(0,118,0,.07);display:flex;align-items:center;justify-content:center;font-size:3.2rem;}
  .fa-body h3{font-size:1.7rem;color:var(--green);margin-bottom:8px;}
  .fa-desc{font-size:1.02rem;line-height:1.6;margin-bottom:14px;}
  .fa-desc.clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
  @media (max-width:700px){.cat-grid,.act-list,.featured-act{grid-template-columns:1fr;}}
  /* under construction */
  .uc-page{text-align:center;max-width:560px;margin:30px auto;}
  .uc-emoji{font-size:3.6rem;margin-bottom:6px;}
  .uc-wrap{position:relative;display:inline-flex;}
  .uc-wrap .uc-tip{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#20302a;color:#eef;padding:8px 12px;border-radius:8px;font-size:.8rem;font-weight:500;white-space:normal;max-width:220px;text-align:center;z-index:80;transition:opacity .15s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.28);}
  .uc-wrap:hover .uc-tip,.uc-wrap:focus-within .uc-tip{visibility:visible;opacity:1;}
  /* legal docs */
  .legal{max-width:760px;}
  .legal .lg-h{font-family:"Fraunces",serif;font-size:1.25rem;color:var(--green);margin:22px 0 6px;}
  /* footer legal */
  .flegal{margin:16px 0 4px;font-size:.85rem;}
  .flegal a{color:var(--blue-dk);text-decoration:none;margin:0 4px;}
  [data-theme="dark"] .flegal a{color:var(--blue);}
  .flegal a:hover{text-decoration:underline;}
  /* about / profile cards */
  .about-sec{margin-bottom:38px;}
  .about-note{max-width:65ch;margin:0 0 14px;}
  .about-btnrow{margin-bottom:20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
  .pcard{display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 14px;border-radius:16px;background:transparent;}
  .pc-pic{width:104px;height:104px;border-radius:50%;object-fit:cover;margin-bottom:12px;background:var(--green);}
  .pc-noimg{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:2.2rem;font-family:"Fraunces",serif;}
  .pc-empty{background:transparent;border:2px dashed var(--line);}

  .pc-name{font-family:"Fraunces",serif;font-weight:600;font-size:1.15rem;color:var(--ink);line-height:1.2;}
  .pc-role{color:var(--blue-dk);font-size:.88rem;font-weight:600;margin-top:3px;}
  [data-theme="dark"] .pc-role{color:var(--blue);}
  .pc-bio{color:var(--muted);font-size:.9rem;margin:8px 0 0;line-height:1.45;}
  /* youth leadership form */
  .yl-rep{background:rgba(32,131,196,.1);border:1px solid rgba(32,131,196,.3);border-radius:10px;padding:12px 14px;font-size:.92rem;margin-bottom:18px;color:var(--blue-dk);}
  [data-theme="dark"] .yl-rep{color:var(--blue);}
  .yl-role{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px;background:var(--card);}

  .yl-role-info{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:.9rem;color:var(--muted);line-height:1.5;}

  .yl-role-info strong{color:var(--green);}

  /* gallery */
  .ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
  .gfeat{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));margin-bottom:10px;}
  @media (max-width:560px){.ggrid,.gfeat{grid-template-columns:1fr;}}
  .gtile{margin:0;display:flex;flex-direction:column;}
  .gphoto{position:relative;width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;background:var(--card);border:1px solid var(--line);}
  .gphoto img{width:100%;height:100%;object-fit:cover;display:block;}
  .g-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .g-ph span{font-size:2.8rem;opacity:.65;}
  .gcap{font-size:.95rem;color:var(--ink);margin:11px 2px 7px;line-height:1.4;}
  .rx{display:flex;align-items:center;gap:7px;margin:0 2px;min-height:30px;}
  .rx-shown{display:inline-flex;align-items:center;}
  .rx-chip{display:inline-flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:2px 7px;margin-left:-9px;cursor:pointer;transition:margin .18s,border-color .15s,background .15s;}
  .rx-chip:first-child{margin-left:0;}
  .rx-chip:hover{border-color:var(--green);}
  .rx-chip.on{border-color:var(--green);background:rgba(0,118,0,.12);}

  .rx-e{font-size:.98rem;line-height:1;}
  .rx-c{font-size:.76rem;color:var(--muted);max-width:0;overflow:hidden;opacity:0;transition:max-width .18s,opacity .18s;}
  .rx-shown:hover .rx-chip{margin-left:5px;}
  .rx-shown:hover .rx-chip:first-child{margin-left:0;}
  .rx-shown:hover .rx-c{max-width:36px;opacity:1;}
  .rx-add{background:var(--card);border:1px solid var(--line);border-radius:100px;min-width:32px;height:27px;cursor:pointer;font-size:.85rem;line-height:1;color:var(--muted);transition:border-color .15s,color .15s;padding:0 6px;}

  .rx-total{font-size:.8rem;color:var(--muted);}
  .gfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:9px 2px 0;flex-wrap:wrap;}
  .gcomment{background:transparent;border:none;color:var(--blue-dk);font-family:inherit;font-size:.86rem;font-weight:600;cursor:pointer;padding:0;}

  .gadmin{display:inline-flex;gap:4px;flex-wrap:wrap;}

  .cinit{background:var(--green);color:#fff;font-weight:700;}
  .cbody{flex:1;min-width:0;}
  .cmeta{font-size:.88rem;}
  .ctime{color:var(--muted);font-size:.78rem;margin-left:7px;}
  .ctext{font-size:.94rem;margin:2px 0 7px;line-height:1.45;overflow-wrap:break-word;}
  .crx{display:flex;align-items:center;gap:6px;}
  .cmp{display:flex;gap:8px;align-items:flex-end;}
  .cmp textarea{flex:1;font-family:inherit;font-size:.95rem;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);resize:vertical;}
  /* newsletter list */
  .nl-list{display:flex;flex-direction:column;gap:12px;}
  .nl-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:border-color .15s;}
  .nl-card:hover{border-color:var(--green);}
  .nl-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;cursor:pointer;}
  .nl-meta{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .nl-time{font-size:.76rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .nl-title{font-family:"Fraunces",serif;font-size:1.2rem;font-weight:600;color:var(--green);line-height:1.25;}
  .nl-arrow{flex:none;color:var(--blue);font-size:1rem;transition:transform .2s;}
  .nl-card.open .nl-arrow{transform:rotate(180deg);}
  .nl-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .nl-body.open{max-height:1600px;}
  .nl-inner{padding:2px 20px 18px;color:var(--ink);line-height:1.6;}
  .nl-admin{display:flex;gap:6px;padding:0 20px 14px;}
  /* calendar */
  .gcal-wrap{width:100%;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--card);}
  .gcal{width:100%;height:600px;display:block;}
  @media (max-width:640px){.gcal{height:460px;}}
  .cev-list{display:flex;flex-direction:column;gap:10px;}
  .cev{display:flex;align-items:stretch;justify-content:space-between;gap:8px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);border-radius:12px;overflow:hidden;}
  .cev-main{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;flex:1;min-width:0;}
  .cev-dot{width:11px;height:11px;border-radius:50%;flex:none;}
  .cev-name{font-weight:600;color:var(--ink);}
  .cev-link{color:var(--blue);font-size:.85rem;}
  .cev-date{font-size:.85rem;color:var(--muted);margin-top:2px;}
  .cev-admin{display:flex;align-items:center;padding-right:12px;}
  /* owner analytics */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:8px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .stat-val{font-family:"Fraunces",serif;font-size:2rem;font-weight:700;color:var(--green);line-height:1;}
  .stat-lab{font-size:.85rem;color:var(--ink);margin-top:6px;}
  .stat-sub{font-size:.76rem;color:var(--muted);margin-top:3px;}
  .ndot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#e0403a;vertical-align:middle;}
  .tabdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#e0403a;margin-left:2px;vertical-align:top;}
  .notif-list{display:flex;flex-direction:column;gap:10px;}
  .notif{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .notif .ndot{flex:none;}
  .notif-main{flex:1;min-width:0;cursor:pointer;}
  .notif-title{font-weight:600;color:var(--ink);}
  .notif-when{font-size:.8rem;color:var(--muted);margin-top:2px;}
  .ad-list{display:flex;flex-direction:column;gap:8px;max-height:52vh;overflow-y:auto;margin:4px 0;}
  .ad-row{display:flex;gap:12px;font-size:.92rem;border-bottom:1px solid var(--line);padding-bottom:7px;}
  .ad-k{flex:none;width:130px;font-weight:600;color:var(--green);}
  .ad-v{flex:1;min-width:0;color:var(--ink);overflow-wrap:break-word;}
  .tchart{display:flex;align-items:flex-end;gap:10px;height:170px;padding:12px 6px;background:var(--card);border:1px solid var(--line);border-radius:14px;}
  .tbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;}
  .tbar-n{font-size:.78rem;color:var(--muted);}
  .tbar-track{flex:1;width:100%;display:flex;align-items:flex-end;}
  .tbar-fill{width:100%;max-width:44px;margin:0 auto;background:linear-gradient(var(--green),var(--green-dk));border-radius:6px 6px 0 0;min-height:3px;}
  .tbar-lab{font-size:.72rem;color:var(--muted);white-space:nowrap;}
  /* gallery: featured row, photo nav, post modal, editor */
  .gfeat-row{display:flex;gap:20px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
  .gfeat-row::-webkit-scrollbar{display:none;}
  .gfeat-row > .gtile{flex:0 0 290px;}
  @media (max-width:560px){.gfeat-row > .gtile{flex:0 0 84%;}}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.86);color:#20302a;font-size:1.2rem;line-height:1;cursor:pointer;opacity:0;transition:opacity .15s;display:flex;align-items:center;justify-content:center;}
  .gphoto:hover .gnav,.gp-media:hover .gnav{opacity:1;}
  .gnav:hover{background:#fff;}
  .gprev{left:8px;} .gnext{right:8px;}
  .gcount{position:absolute;right:8px;bottom:8px;background:rgba(20,48,42,.65);color:#fff;border-radius:100px;padding:2px 9px;font-size:.74rem;}
  .g-drive{flex-direction:column;gap:6px;color:var(--muted);}
  .g-drive small{font-size:.78rem;}
  .g-submit{margin-top:34px;text-align:center;}
  .g-submit p{font-size:1.02rem;color:var(--ink);margin-bottom:12px;}
  .gp-media{position:relative;border-radius:12px;overflow:hidden;margin-bottom:14px;background:var(--bg);}
  .gp-media img{width:100%;max-height:50vh;object-fit:contain;display:block;}
  .gp-drive{text-align:center;padding:18px;border:1px dashed var(--line);border-radius:12px;margin-bottom:14px;}
  .gp-cap{font-size:1rem;line-height:1.6;margin:0 0 6px;white-space:pre-wrap;}
  .ged-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px;margin:10px 0 14px;}
  .ged-t{position:relative;border-radius:10px;overflow:hidden;border:2px solid transparent;}
  .ged-t.on{border-color:var(--green);}
  .ged-t img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
  .ged-tb{position:absolute;inset:auto 0 0 0;display:flex;justify-content:space-between;background:rgba(20,48,42,.62);}
  .ged-tb button{flex:1;background:transparent;border:none;color:#fff;cursor:pointer;font-size:.85rem;padding:2px 0;}
  .ged-tb button:hover{background:rgba(0,0,0,.28);}
  /* profile picture editor */
  .av-edit{margin-top:8px;}
  .av-stage{position:relative;width:220px;height:220px;border-radius:12px;overflow:hidden;background:var(--bg);cursor:grab;}
  .av-stage:active{cursor:grabbing;}
  .av-stage canvas{display:block;touch-action:none;}
  .av-mask{position:absolute;inset:0;pointer-events:none;border-radius:12px;box-shadow:0 0 0 999px rgba(20,48,42,.45) inset;-webkit-mask:radial-gradient(circle at 50% 50%, transparent 108px, #000 109px);mask:radial-gradient(circle at 50% 50%, transparent 108px, #000 109px);}
  .av-zoom{width:220px;}
  /* newsletter: featured issue + PDF archive */
  .nl-feat{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--green);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(20,48,42,.07);}
  [data-theme="dark"] .nl-feat{box-shadow:0 8px 22px rgba(0,0,0,.3);}
  .nl-feat-t{font-size:1.75rem;color:var(--green);margin:10px 0 4px;}
  .nl-feat-b{white-space:pre-wrap;font-size:1.03rem;line-height:1.7;margin-bottom:14px;}
  .nl-sub{font-family:"Fraunces",serif;font-size:1.15rem;color:var(--green);margin:26px 0 12px;}
  .nl-arch{display:flex;flex-direction:column;gap:10px;}
  .nl-a{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;flex-wrap:wrap;}
  .nl-a-m{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .nl-a-t{font-family:"Fraunces",serif;font-weight:600;color:var(--ink);}
  .nl-a-b{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  /* challenges / speakers / participate / event sign-ups */
  .ch-list{margin:0 0 6px;padding-left:22px;}
  .ch-list li{margin-bottom:9px;line-height:1.55;}
  .mgs-note{display:flex;gap:14px;align-items:flex-start;background:rgba(32,131,196,.09);border:1px solid rgba(32,131,196,.3);border-radius:14px;padding:16px 18px;margin:22px 0 6px;}
  .mgs-emoji{font-size:1.8rem;line-height:1;}
  .participate{margin-top:40px;padding-top:26px;border-top:1px solid var(--line);}
  .participate h2{font-family:"Fraunces",serif;color:var(--green);}
  .cev-side{display:flex;align-items:center;gap:8px;padding-right:12px;flex-wrap:wrap;}
  .cev-going{font-size:.82rem;color:var(--muted);white-space:nowrap;}
  .cev.next{box-shadow:0 0 0 2px rgba(0,118,0,.25);}
  .cev.next .cev-name::after{content:"Next up";margin-left:8px;font-size:.7rem;font-weight:600;color:#fff;background:var(--green);border-radius:100px;padding:2px 8px;vertical-align:middle;}
  /* chapter hub / chapter calendar */
  .chapter-cal{margin-top:36px;padding-top:26px;border-top:1px solid var(--line);}
  .dc-status{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:.9rem;background:var(--card);}
  /* contact / about stat / gallery submit spacing */
  .contact-q{font-size:1.35rem;color:var(--ink);margin-bottom:6px;}
  .contact-line{font-size:1.15rem;color:var(--ink);}
  .about-stat{font-size:1.5rem;color:var(--muted);margin:-4px 0 26px;}
  .g-submit-far{margin-top:22vh;}
  /* ===== language intro splash ===== */
  .li-hidden{display:none!important;}
  .lang-intro{position:fixed;inset:0;z-index:9000;background:#0F7A24;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background-color .85s ease;}
  .li-close{position:fixed;top:20px;right:26px;width:44px;height:44px;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:1.7rem;line-height:1;border-radius:50%;cursor:pointer;z-index:5;transition:background .18s ease;}
  .li-close:hover{background:rgba(255,255,255,.3);}
  .langnavbtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:38px;width:138px;box-sizing:border-box;padding:0 12px;border:1.5px solid rgba(0,0,0,.2);background:rgba(255,255,255,.5);border-radius:100px;cursor:pointer;font-family:inherit;color:#33261a;font-size:.9rem;font-weight:600;transition:background .18s ease,border-color .18s ease;}
  .langnavbtn:hover{background:rgba(255,255,255,.85);border-color:rgba(0,0,0,.38);}
  .langnavbtn .globe{width:16px;height:16px;flex-shrink:0;opacity:.7;}
  .langnavbtn #navLangText{transition:opacity .3s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  [data-theme="dark"] .langnavbtn{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#eadfce;}
  [data-theme="dark"] .langnavbtn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.45);}
  .lang-intro.revealing{background-color:rgba(15,122,36,0);}
  .li-bg{position:absolute;inset:0;overflow:hidden;transition:opacity .85s ease;}
  .lang-intro.revealing .li-bg{opacity:0;}
  .li-letter{position:absolute;top:0;left:0;color:#fff;font-family:"Fraunces",Georgia,serif;font-weight:600;pointer-events:none;user-select:none;will-change:transform,opacity;line-height:1;}
  .li-stage{position:relative;z-index:2;width:100%;display:flex;align-items:center;justify-content:center;padding:24px;}
  .li-cycle{background:rgba(255,255,255,.14);border:2px solid #fff;color:#fff;font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(1.7rem,5vw,3rem);padding:.42em 1.3em;border-radius:100px;cursor:pointer;width:min(90vw,560px);min-height:1.9em;box-shadow:0 12px 44px rgba(0,0,0,.28);transition:background .2s ease,transform .2s ease;display:inline-flex;align-items:center;justify-content:center;}
  .li-cycle:hover{background:rgba(255,255,255,.26);transform:translateY(-2px);}
  .li-cycle:active{transform:translateY(0);}
  #liCycleText{display:inline-block;transition:opacity .3s ease;}
  .li-list-wrap{text-align:center;width:100%;}
  .li-search-wrap{position:relative;width:min(90vw,560px);margin:0 auto 18px;}
  .li-search-ic{position:absolute;left:20px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:#fff;opacity:.8;pointer-events:none;}
  .li-search{width:100%;box-sizing:border-box;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.6);color:#fff;font-family:inherit;font-size:1.25rem;text-align:center;padding:14px 46px;border-radius:100px;outline:none;transition:border-color .18s ease,background .18s ease;}
  .li-search::placeholder{color:rgba(255,255,255,.55);}
  .li-search:focus{border-color:#fff;background:rgba(255,255,255,.22);}
  .li-noresult{color:rgba(255,255,255,.7);text-align:center;padding:22px;font-size:1.1rem;}
  .li-globe{font-size:2.4rem;color:rgba(255,255,255,.9);margin-bottom:18px;}
  .li-list{display:grid;grid-template-columns:repeat(auto-fill,182px);justify-content:center;gap:12px;max-width:min(96vw,960px);max-height:70vh;overflow-y:auto;margin:0 auto;padding:6px;}
  .li-lang{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.55);color:#fff;font-family:inherit;font-size:1.12rem;padding:15px 10px;border-radius:13px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .18s ease,border-color .18s ease,transform .12s ease;}
  .li-lang:hover{background:rgba(255,255,255,.26);border-color:#fff;transform:translateY(-1px);}
  .li-seq{display:flex;flex-direction:column;align-items:center;gap:.28em;text-align:center;}
  .li-word{color:#fff;font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(2.4rem,8vw,5rem);line-height:1.1;opacity:0;transition:opacity .8s ease;}
  .li-word.show{opacity:1;}
  .li-ese{opacity:0;transition:opacity 1.4s ease;z-index:3;pointer-events:none;}
  .li-ese.show{opacity:1;}
  .li-ese.fade-out{opacity:0;}
  .ctrans{background:none;border:none;color:var(--blue-dk);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;padding:2px 0;margin-top:2px;}
  [data-theme="dark"] .ctrans{color:var(--blue);}
  .ctrans:hover{text-decoration:underline;}
  /* analytics language bars */
  .lang-bars{display:flex;flex-direction:column;gap:10px;}
  .lang-bar-h{display:flex;justify-content:space-between;gap:10px;font-size:.88rem;margin-bottom:4px;}
  .lang-bar-t{height:9px;background:var(--line);border-radius:100px;overflow:hidden;}
  .lang-bar-f{height:100%;background:linear-gradient(90deg,var(--green),var(--green-dk));border-radius:100px;}
  /* RTL niceties */
  [dir="rtl"] .wrap,[dir="rtl"] .view{text-align:right;}
</style>

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return esc(s).replace(/"/g,'&quot;');}
function safeUrl(u){u=String(u||'').trim();return /^https?:\/\//i.test(u)?u:'https://'+u;}
function fmtDate(d){ if(!d) return ''; const p=d.split('-'); return p.length===3?(p[1]+'/'+p[2]+'/'+p[0].slice(2)):d; }

// generic add/edit form built from a field spec
let _ed=null,_edImgs={};
function openEditor(title, fields, values, onSave){
  _ed={fields,onSave}; _edImgs={};
  if(values) fields.filter(f=>f.type==='image').forEach(f=>{ if(values[f.key])_edImgs[f.key]=values[f.key]; });
  const body=fields.map(f=>{
    const v=(values&&values[f.key]!=null)?values[f.key]:'';
    const lab='<label>'+esc(f.label)+'</label>';
    if(f.type==='textarea') return lab+'<textarea id="ed-'+f.key+'" rows="3" placeholder="'+escA(f.placeholder||'')+'">'+esc(v)+'</textarea>';
    if(f.type==='select') return lab+'<select id="ed-'+f.key+'" class="ed-select">'+(f.options||[]).map(o=>'<option'+((v||f.options[0])===o?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
    if(f.type==='image') return lab+'<input id="ed-'+f.key+'" type="file" accept="image/*"><div class="img-prev" id="edp-'+f.key+'">'+(v?'<img src="'+escA(v)+'">':'')+'</div>';
    const t=f.type==='date'?'date':f.type==='time'?'time':f.type==='url'?'url':'text';
    return lab+'<input id="ed-'+f.key+'" type="'+t+'" value="'+escA(v)+'" placeholder="'+escA(f.placeholder||'')+'">';
  }).join('');
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>'+esc(title)+'</h3><div class="ed">'+body+'</div><p class="err" id="ed-err"></p><button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="submitEditor()">Save</button>');
  fields.filter(f=>f.type==='image').forEach(f=>{
    document.getElementById('ed-'+f.key).addEventListener('change',function(){
      const file=this.files[0]; if(!file) return;
      const rd=new FileReader(); rd.onload=()=>{_edImgs[f.key]=rd.result;document.getElementById('edp-'+f.key).innerHTML='<img src="'+rd.result+'">';}; rd.readAsDataURL(file);
    });
  });
}
function submitEditor(){
  const vals={};
  _ed.fields.forEach(f=>{ vals[f.key]= f.type==='image' ? (_edImgs[f.key]||'') : document.getElementById('ed-'+f.key).value.trim(); });
  const req=_ed.fields[0];
  if(req && req.type!=='image' && !vals[req.key]){ document.getElementById('ed-err').textContent='Please fill in '+req.label+'.'; return; }
  _ed.onSave(vals); closeModal(); render();
}

/* ---- profile picture: zoom + drag inside the circle, then export a square crop ---- */
const AV_SIZE=220, AV_OUT=256;
let _av=null;
function loadAvatarFile(file){ const rd=new FileReader(); rd.onload=function(){ loadAvatarSrc(rd.result); }; rd.readAsDataURL(file); }
function loadAvatarSrc(src){
  const img=new Image();
  img.onload=function(){
    const base=Math.max(AV_SIZE/img.width, AV_SIZE/img.height);            // "cover" the circle
    _av={img:img, base:base, scale:1, x:(AV_SIZE-img.width*base)/2, y:(AV_SIZE-img.height*base)/2, drag:null};
    const w=document.getElementById('pf-avwrap'); if(w)w.style.display='';
    const z=document.getElementById('pf-zoom'); if(z)z.value=1;
    drawAvatar();
  };
  img.src=src;
}
function clampAvatar(){ if(!_av)return; const s=_av.base*_av.scale, w=_av.img.width*s, h=_av.img.height*s;
  _av.x=Math.min(0,Math.max(AV_SIZE-w,_av.x)); _av.y=Math.min(0,Math.max(AV_SIZE-h,_av.y)); }
function drawAvatar(){
  const c=document.getElementById('pf-canvas'); if(!c||!_av)return;
  const g=c.getContext('2d'); g.clearRect(0,0,AV_SIZE,AV_SIZE);
  const s=_av.base*_av.scale;
  g.drawImage(_av.img,_av.x,_av.y,_av.img.width*s,_av.img.height*s);
}
function avZoom(val){
  if(!_av)return; const mid=AV_SIZE/2, old=_av.base*_av.scale;
  _av.scale=parseFloat(val)||1; const now=_av.base*_av.scale;
  _av.x=mid-(mid-_av.x)*(now/old); _av.y=mid-(mid-_av.y)*(now/old);   // zoom about the centre
  clampAvatar(); drawAvatar();
}
function avPt(e){ const r=document.getElementById('pf-canvas').getBoundingClientRect(); const t=(e.touches&&e.touches[0])||e; return {x:t.clientX-r.left, y:t.clientY-r.top}; }
function avDragStart(e){ if(!_av)return; e.preventDefault(); const p=avPt(e); _av.drag={x:p.x-_av.x,y:p.y-_av.y};
  window.addEventListener('mousemove',avDragMove); window.addEventListener('mouseup',avDragEnd);
  window.addEventListener('touchmove',avDragMove,{passive:false}); window.addEventListener('touchend',avDragEnd); }
function avDragMove(e){ if(!_av||!_av.drag)return; e.preventDefault(); const p=avPt(e); _av.x=p.x-_av.drag.x; _av.y=p.y-_av.drag.y; clampAvatar(); drawAvatar(); }
function avDragEnd(){ if(_av)_av.drag=null; window.removeEventListener('mousemove',avDragMove); window.removeEventListener('mouseup',avDragEnd); window.removeEventListener('touchmove',avDragMove); window.removeEventListener('touchend',avDragEnd); }
function avExport(){
  if(!_av)return null;
  const o=document.createElement('canvas'); o.width=AV_OUT; o.height=AV_OUT;
  const g=o.getContext('2d'), k=AV_OUT/AV_SIZE, s=_av.base*_av.scale;
  g.drawImage(_av.img,_av.x*k,_av.y*k,_av.img.width*s*k,_av.img.height*s*k);
  try{ return o.toDataURL('image/jpeg',0.9); }catch(e){ return null; }
}
let _pfAvatar=null;
async function saveProfile(){
  const user=v('pf-user'),pass=document.getElementById('pf-pass').value;
  const pfCountry=(document.getElementById('pf-country')||{}).value||'';

    if(pass){await sb.auth.updateUser({password:pass});}

/* ==========================================================================
   5b) DISCORD VERIFICATION (at log-in) + role mapping
   Sign-up never mentions Discord. Logging in does: we link the member's Discord
   account, then a server function reads their Discord roles and applies the
   owner's mapping. The role change happens server-side on purpose \u2014 the browser
   is never allowed to set its own role.
   ========================================================================== */
function discordOn(){ return !!content.discordVerify; }
async function checkDiscord(){
  if(!BACKEND || !discordOn() || !account || account.discord) return;
  try{
    const {data}=await sb.auth.getUserIdentities();
    const linked=((data&&data.identities)||[]).some(function(i){return i.provider==='discord';});
    if(linked){ await verifyDiscord(true); return; }
  }catch(e){}
  openDiscordVerify();
}
function openDiscordVerify(){
  openModal('<h3>One more step \u2014 verify with Discord</h3>'+
    '<p>Earth Sweet Earth runs on Discord, so we link your Discord account when you log in. You can sign in through your browser or the Discord app \u2014 it only takes a moment.</p>'+
    '<p class="muted" style="font-size:.85rem">If you are under 13, Discord requires you to use a parent or guardian\u2019s account.</p>'+
    '<button class="btn btn-blue" style="width:100%;margin-top:6px" onclick="startDiscordLink()">Continue with Discord</button>'+
    (content.discordRequired
      ? '<button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px" onclick="skipDiscord()">Not now (this logs you out)</button>'
      : '<button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px" onclick="closeModal()">Not now</button>')+
    '<p class="err" id="dc-err"></p>');
}
async function startDiscordLink(){
  const err=document.getElementById('dc-err');
  try{
    const {error}=await sb.auth.linkIdentity({provider:'discord',options:{redirectTo:location.href}});
    if(error) throw error;
  }catch(e){
    if(err) err.innerHTML='Discord sign-in isn\u2019t switched on yet. An owner needs to enable the Discord provider (and manual linking) in Supabase \u2014 see SETUP-discord.md.';
  }
}
function skipDiscord(){ closeModal(); logout(); }
async function verifyDiscord(silent){
  if(!BACKEND || !account) return;
  try{
    const {data,error}=await sb.functions.invoke('discord-verify',{body:{}});
    if(error) throw error;
    if(data && data.ok){
      account.discord=data.discordUsername||'linked';
      if(data.appliedRole && roles[data.appliedRole]) account.roleId=data.appliedRole;
      recomputeSession(); closeModal(); render();
      const rn=data.appliedRole && roles[data.appliedRole] ? roles[data.appliedRole].name : '';
      popup('You\u2019re verified! \u2705','Your Discord account <strong>'+esc(data.discordUsername||'')+'</strong> is linked.'+
        (rn?' Your Discord roles matched, so you now have the <strong>'+esc(rn)+'</strong> role on the site.':'')+
        (data.message?'<br><span class="muted" style="font-size:.85rem">'+esc(data.message)+'</span>':''));
    } else if(!silent){
      toast((data&&data.message)||'We couldn\u2019t verify you with Discord.');
    }
  }catch(e){ if(!silent) toast('Discord verification isn\u2019t set up yet \u2014 see SETUP-discord.md.'); }
}

// winter snow: a field of flakes (deterministic) with per-flake size, drift, speed
function snowLayer(){
  let s='';
  for(let i=0;i<38;i++){
    const x=(fr(i*1.3)*100).toFixed(1), sz=(fr(i*2.7)*3+2).toFixed(1), dur=(fr(i*3.1)*5+6).toFixed(1),
          del=(fr(i*4.9)*-11).toFixed(1), dx=((fr(i*5.3)-0.5)*80).toFixed(0), op=(fr(i*6.1)*0.5+0.5).toFixed(2);
    s+='<span style="left:'+x+'%;width:'+sz+'px;height:'+sz+'px;--dx:'+dx+'px;opacity:'+op+';animation-duration:'+dur+'s;animation-delay:'+del+'s"></span>';
  }
  return '<div class="snow" id="snow">'+s+'</div>';
}

// correct lunar terminator: new → crescent → quarter → gibbous → full → … (gibbous reads as gibbous, not a fat crescent)
function moonLitPath(f){
  const R=54,cx=92,cy=92;
  const rx=Math.abs(R*Math.cos(f*2*Math.PI)).toFixed(2);
  const T=cx+','+(cy-R), B=cx+','+(cy+R);
  const limb=f<0.5?1:0;
  const term=(f<0.25||f>0.75)?limb:1-limb;
  return 'M'+T+' A'+R+','+R+' 0 0,'+limb+' '+B+' A'+rx+','+R+' 0 0,'+term+' '+T+' Z';
}

/* ---- past issues open as PDFs: use a hosted link if set, else build one from the text ---- */
function openIssuePdf(id){
  const n=newsletters.find(function(x){return sameId(x.id,id);}); if(!n)return;
  if(n.pdfUrl){ window.open(/^https?:/i.test(n.pdfUrl)?n.pdfUrl:n.pdfUrl,'_blank','noopener'); return; }
  try{
    const blob=new Blob([buildPdf(n.title, fmtDateTime(n.publishedAt), n.body||'')],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank','noopener');
    setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
  }catch(e){ toast('Couldn\u2019t build the PDF.'); }
}
function pdfAscii(s){ return String(s==null?'':s).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/[\u2013\u2014]/g,'-').replace(/\u2026/g,'...').replace(/[^\x20-\x7E\n]/g,''); }
function pdfEsc(s){ return s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
function pdfWrap(s,max){
  const out=[];
  pdfAscii(s).split('\n').forEach(function(para){
    if(!para.trim()){ out.push(''); return; }
    let line='';
    para.split(/\s+/).forEach(function(w){
      if((line?line+' '+w:w).length>max){ if(line)out.push(line); line=w; } else { line=line?line+' '+w:w; }
    });
    if(line) out.push(line);
  });
  return out;
}
// A minimal, dependency-free PDF writer (Helvetica, letter pages).
function buildPdf(title,dateStr,body){
  const PER=44, MAXW=92;
  const lines=[pdfAscii(dateStr),''].concat(pdfWrap(body,MAXW));
  const pages=[];
  for(let i=0;i<lines.length;i+=PER) pages.push(lines.slice(i,i+PER));
  if(!pages.length) pages.push(['']);
  const N=pages.length, objs=[], kids=[];
  for(let i=0;i<N;i++) kids.push((5+i*2)+' 0 R');
  objs[1]='<< /Type /Catalog /Pages 2 0 R >>';
  objs[2]='<< /Type /Pages /Kids ['+kids.join(' ')+'] /Count '+N+' >>';
  objs[3]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>';
  pages.forEach(function(ls,pi){
    let c='';
    if(pi===0) c+='BT /F1 16 Tf 72 742 Td ('+pdfEsc(pdfAscii(title))+') Tj ET\n';
    c+='BT /F1 11 Tf 72 '+(pi===0?712:742)+' Td 15 TL\n';
    ls.forEach(function(l){ c+='('+pdfEsc(l)+') Tj T*\n'; });
    c+='ET';
    objs[4+pi*2]='<< /Length '+c.length+' >>\nstream\n'+c+'\nendstream';
    objs[5+pi*2]='<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 3 0 R >> >> /Contents '+(4+pi*2)+' 0 R >>';
  });
  const maxId=3+N*2, off=[];
  let out='%PDF-1.4\n';
  for(let id=1; id<=maxId; id++){ off[id]=out.length; out+=id+' 0 obj\n'+objs[id]+'\nendobj\n'; }
  const xref=out.length;
  out+='xref\n0 '+(maxId+1)+'\n0000000000 65535 f \n';
  for(let id=1; id<=maxId; id++){ out+=('0000000000'+off[id]).slice(-10)+' 00000 n \n'; }
  out+='trailer\n<< /Size '+(maxId+1)+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF';
  return out;
}

let eventCounts={}, myEvents={}, eventDataLoaded=false;
function eventTime(e){ if(!e.date) return 0; return new Date(e.date+'T'+(e.time||'00:00')).getTime(); }
function isUpcoming(e){ return eventTime(e) >= Date.now()-3600000; }
function ensureEventData(){ if(eventDataLoaded) return; eventDataLoaded=true; loadEventData(); }
async function loadEventData(){
  if(!BACKEND) return;
  try{ const {data}=await sb.rpc('ese_event_counts'); if(data) eventCounts=data; }catch(e){}
  if(account && account.id){
    try{ const {data}=await sb.from('event_participants').select('event_id').eq('user_id',account.id);
      myEvents={}; (data||[]).forEach(function(r){ myEvents[r.event_id]=true; }); }catch(e){}
  }
  if(route()==='calendar') render();
}
async function joinEvent(id){
  if(!isLoggedIn()){ goParticipate(); return; }
  const eid=String(id), joined=!!myEvents[eid];
  if(joined){
    delete myEvents[eid]; eventCounts[eid]=Math.max(0,(eventCounts[eid]||1)-1); render();
    if(BACKEND && account.id){ try{ await sb.from('event_participants').delete().eq('event_id',eid).eq('user_id',account.id); }catch(e){} }
    toast('You\u2019re no longer signed up.');
  } else {
    myEvents[eid]=true; eventCounts[eid]=(eventCounts[eid]||0)+1; render();
    if(BACKEND && account.id){
      try{ const {error}=await sb.from('event_participants').insert({event_id:eid,user_id:account.id,username:account.username,email:account.email});
        if(error) throw error; }
      catch(e){ delete myEvents[eid]; eventCounts[eid]=Math.max(0,(eventCounts[eid]||1)-1); render(); toast('Couldn\u2019t sign you up \u2014 is the event_participants table set up?'); return; }
    }
    toast('You\u2019re in! 🎉');
  }
}

  const cv=document.getElementById('ca-consent-img'); if(!cv)return;

  if(line)lines.push(line);

  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

function caSetupSig(id){
  const cv=document.getElementById(id); if(!cv)return;
  const W=Math.max(220, cv.clientWidth||cv.parentElement.clientWidth-2), H=150, dpr=window.devicePixelRatio||1, ctx=cv.getContext('2d');

  ctx.lineWidth=2.4; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle=(document.body.getAttribute('data-theme')==='dark')?'#e7eef3':'#12351f';
  cv._ctx=ctx; cv._drawn=false; let drawing=false, lx=0, ly=0;
  const pos=(e)=>{ const r=cv.getBoundingClientRect(), t=(e.touches&&e.touches[0])||e; return [ (t.clientX-r.left)*(W/r.width), (t.clientY-r.top)*(H/r.height) ]; };
  const down=(e)=>{ drawing=true; [lx,ly]=pos(e); if(e.cancelable)e.preventDefault(); };
  const mv=(e)=>{ if(!drawing)return; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.stroke(); [lx,ly]=[x,y]; cv._drawn=true; if(e.cancelable)e.preventDefault(); };

  cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
  cv.addEventListener('touchstart',down,{passive:false}); cv.addEventListener('touchmove',mv,{passive:false}); cv.addEventListener('touchend',up);
}

/* ---------- homemade "slide the puzzle piece" captcha (no third-party service) ---------- */
const PCAP={};
function pcapR(a,b){ return a+Math.random()*(b-a); }
function pcapShape(ctx,x,y,s){
  const k=s*0.2, m=x+s*0.5;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(m-k,y);
  ctx.arc(m,y,k,Math.PI,0,false);          // a knob bulging up out of the top edge
  ctx.lineTo(x+s,y);
  ctx.lineTo(x+s,y+s);
  ctx.lineTo(x,y+s);
  ctx.closePath();
}
function pcapScene(ctx,W,H,d){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#a9d6ea'); sky.addColorStop(.55,'#dfe7cf'); sky.addColorStop(1,'#f6dca0');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#F4C430'; ctx.beginPath(); ctx.arc(d.sunX,d.sunY,d.sunR,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.82)';
  d.clouds.forEach(function(c){ ctx.beginPath(); ctx.ellipse(c.x,c.y,c.r,c.r*0.55,0,0,7); ctx.fill(); });
  const hills=['#7cbb80','#3f8f5c','#1f6b3f'];
  hills.forEach(function(col,i){ ctx.fillStyle=col; const b=H*(0.62+i*0.13);
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,b); ctx.quadraticCurveTo(W*d.hx[i], b-d.hh[i], W, b-6); ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); });
}
function pcapRender(st){
  const ctx=st.ctx, W=st.W, H=st.H, s=st.s;
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(st.scene,0,0,W,H);
  ctx.save(); pcapShape(ctx,st.tx,st.py,s); ctx.fillStyle='rgba(0,0,0,.42)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();       // the gap
  ctx.save(); pcapShape(ctx,st.px,st.py,s); ctx.clip(); ctx.drawImage(st.scene,st.px-st.tx,0,W,H); ctx.restore();   // the moving piece
  ctx.save(); pcapShape(ctx,st.px,st.py,s); ctx.strokeStyle='rgba(255,255,255,.95)'; ctx.lineWidth=2;
  ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=6; ctx.stroke(); ctx.restore();
}
function pcapNew(st){
  const W=st.W, H=st.H, s=st.s, dpr=window.devicePixelRatio||1;
  st.d={ sunX:pcapR(W*.15,W*.85), sunY:pcapR(18,H*.4), sunR:pcapR(15,24),
    hx:[pcapR(.2,.8),pcapR(.2,.8),pcapR(.2,.8)], hh:[pcapR(8,34),pcapR(8,34),pcapR(8,34)],
    clouds:[{x:pcapR(0,W),y:pcapR(14,H*.32),r:pcapR(10,20)},{x:pcapR(0,W),y:pcapR(14,H*.36),r:pcapR(8,15)}] };
  st.tx=pcapR(W*.42,W-s-6); st.py=pcapR(s*0.26,H-s-6); st.px=0;
  const sc=document.createElement('canvas'); sc.width=W*dpr; sc.height=H*dpr;
  const sx=sc.getContext('2d'); sx.setTransform(dpr,0,0,dpr,0,0); pcapScene(sx,W,H,st.d);
  st.scene=sc; pcapRender(st);
}
function initPuzzleCaptcha(id){
  const host=document.getElementById(id); if(!host) return;
  host.classList.add('pcap'); host.classList.remove('solved');
  host.innerHTML='<div class="pcap-stage"><canvas class="pcap-canvas"></canvas>'+
    '<button type="button" class="pcap-refresh" title="Get a new puzzle" aria-label="Get a new puzzle">↻</button>'+
    '<div class="pcap-done">✓ Verified</div></div>'+
    '<input type="range" class="pcap-slider" min="0" max="100" value="0" step="1" aria-label="Slide the puzzle piece into the gap to complete the picture and show you are human">'+
    '<p class="pcap-label">Slide the piece into the gap to finish the picture.</p>';
  const canvas=host.querySelector('.pcap-canvas'), slider=host.querySelector('.pcap-slider');
  const dpr=window.devicePixelRatio||1, W=Math.max(240,Math.min(420,host.clientWidth||300)), H=168, s=46;
  canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  const st={id:id,ctx:ctx,W:W,H:H,s:s,solved:false}; PCAP[id]=st; pcapNew(st);
  function move(){ if(st.solved)return; st.px=(slider.value/100)*(W-s); pcapRender(st);
    if(Math.abs(st.px-st.tx)<=10){ st.solved=true; st.px=st.tx; slider.value=Math.round(st.tx/(W-s)*100); pcapRender(st); host.classList.add('solved'); slider.disabled=true; } }
  slider.addEventListener('input',move);
  host.querySelector('.pcap-refresh').addEventListener('click',function(){ st.solved=false; slider.disabled=false; slider.value=0; host.classList.remove('solved'); pcapNew(st); });
}
function puzzleSolved(id){ return !!(PCAP[id]&&PCAP[id].solved); }

let chaptersRows=[], chapterEvents={}, chaptersLoaded=false;
function ensureChapters(){ if(chaptersLoaded) return; chaptersLoaded=true; loadChapters(); }
async function loadChapters(){
  if(!BACKEND){ chaptersRows=content.chapters||[]; return; }
  try{
    const {data}=await sb.from('chapters').select('id,name,country,continent,leader_id,gcal_id').order('name');
    chaptersRows=(data||[]).map(function(r){ return {id:r.id,name:r.name,country:r.country||'',continent:r.continent||'',leaderId:r.leader_id,gcalId:r.gcal_id||''}; });
  }catch(e){ chaptersRows=[]; }
  const mine=myChapter(); if(mine) await loadChapterEvents(mine.id);
  const led=myLedChapter(); if(led && (!mine||!sameId(led.id,mine.id))) await loadChapterEvents(led.id);
  const r=route(); if(r==='chapterhub'||r==='calendar'||r==='chapterslist') render();
}
async function loadChapterEvents(cid){
  if(!BACKEND || !cid){ chapterEvents[cid]=chapterEvents[cid]||[]; return; }
  try{ const {data}=await sb.from('chapter_events').select('*').eq('chapter_id',cid).order('date');
    chapterEvents[cid]=(data||[]).map(function(e){ return {id:e.id,name:e.name,date:e.date||'',time:e.time||'',link:e.link||'',color:e.color||'Green',details:e.details||''}; });
  }catch(e){ chapterEvents[cid]=[]; }

function myLedChapter(){ if(!account||!account.id) return null; return chaptersRows.find(function(c){return sameId(c.leaderId,account.id);})||null; }
