/* ========================= GALLERY ========================= */
const REACTION_EMOJIS=['\u2764\uFE0F','👍','🎉','🙌','😮','🌱','🔥','👏','😂','💚','🌍','\u2728'];
let gSocial={}, gViewIdx={};
function galleryItems(){ return content.gallery||[]; }
function gPhotos(g){ return (g.photos&&g.photos.length)?g.photos:(g.photo?[g.photo]:[]); }   // tolerate older single-photo posts
function ensureSocial(id){ if(!gSocial[id]) gSocial[id]={reactions:{},mine:null,comments:[]}; return gSocial[id]; }
function totalReactions(r){ let t=0; for(const k in r) t+=r[k]; return t; }
function applyReaction(store,emoji){
  if(!store.reactions)store.reactions={};
  if(store.mine===emoji){ store.reactions[emoji]=(store.reactions[emoji]||1)-1; if(store.reactions[emoji]<=0)delete store.reactions[emoji]; store.mine=null; }
  else { if(store.mine){ store.reactions[store.mine]=(store.reactions[store.mine]||1)-1; if(store.reactions[store.mine]<=0)delete store.reactions[store.mine]; } store.reactions[emoji]=(store.reactions[emoji]||0)+1; store.mine=emoji; }
}
function reactionChips(store, onclickPrefix){
  const entries=Object.keys(store.reactions||{}).map(function(k){return [k,store.reactions[k]];}).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});
  if(!entries.length) return '';
  return '<span class="rx-shown">'+entries.slice(0,3).map(function(e){ const on=store.mine===e[0]?' on':''; return '<span class="rx-chip'+on+'" onclick="'+onclickPrefix+'\''+e[0]+'\')"><span class="rx-e">'+e[0]+'</span><span class="rx-c">'+e[1]+'</span></span>'; }).join('')+'</span>';
}
function socialBar(id){
  const s=ensureSocial(id), total=totalReactions(s.reactions);
  return '<div class="rx">'+reactionChips(s,'socialReact(\''+id+'\',')+
    '<button class="rx-add" title="Add reaction" onclick="openEmojiPicker(this,\'post\',\''+id+'\',\'\')">🙂+</button>'+
    (total?'<span class="rx-total">'+total+'</span>':'')+'</div>';
}
let _openSocial=null;   // which post's modal is open, so a reaction re-renders the right thing
function socialReact(id,emoji){ if(!isLoggedIn()){ popup('Join in','Log in or sign up to react!'); return; } applyReaction(ensureSocial(id),emoji); refreshSocial(id); }
function refreshSocial(id){
  if(_openSocial && sameId(_openSocial.id,id)){
    if(_openSocial.kind==='gallery') renderPostModal(id); else renderNewsletterModal(id);
  } else { render(); }
}

/* emoji picker (floating) */
let _rxTarget=null;
function openEmojiPicker(btn,kind,photoId,commentId){
  if(!isLoggedIn()){ popup('Join in','Log in or sign up to react!'); return; }
  closeEmojiPicker(); _rxTarget={kind:kind,photoId:photoId,commentId:commentId};
  const p=document.createElement('div'); p.className='emoji-picker'; p.id='emojiPicker';
  p.innerHTML=REACTION_EMOJIS.map(function(e){return '<button onclick="pickEmoji(\''+e+'\')">'+e+'</button>';}).join('');
  document.body.appendChild(p);
  const r=btn.getBoundingClientRect();
  p.style.left=Math.max(8,Math.min(r.left, window.innerWidth-p.offsetWidth-10))+'px';
  p.style.top=(r.bottom+6+window.scrollY)+'px';
  setTimeout(function(){ document.addEventListener('mousedown',emojiPickerOutside); },0);
}
function emojiPickerOutside(e){ const p=document.getElementById('emojiPicker'); if(p&&!p.contains(e.target)) closeEmojiPicker(); }
function closeEmojiPicker(){ const p=document.getElementById('emojiPicker'); if(p)p.remove(); document.removeEventListener('mousedown',emojiPickerOutside); }
function pickEmoji(emoji){
  if(!_rxTarget)return; const t=_rxTarget; closeEmojiPicker();
  if(t.kind==='post'){ socialReact(t.photoId,emoji); }
  else { const c=ensureSocial(t.photoId).comments.find(function(x){return x.id===t.commentId;}); if(c){ applyReaction(c,emoji); refreshSocial(t.photoId); } }
}

/* ---- tiles ---- */
function galleryTile(g,admin){
  const ps=gPhotos(g), n=ps.length;
  if(gViewIdx[g.id]==null) gViewIdx[g.id]=Math.min(g.thumb||0, Math.max(0,n-1));
  const i=gViewIdx[g.id];
  let media;
  if(g.inDrive && g.driveLink) media='<div class="g-ph g-drive"><span>🗂\uFE0F</span><small>Photos in the drive</small></div>';
  else if(n) media='<img id="gimg-'+g.id+'" src="'+escA(ps[i])+'" alt="'+escA(g.caption||'')+'">';
  else media='<div class="g-ph"><span>🌿</span></div>';
  const nav=(n>1 && !g.inDrive)?'<button class="gnav gprev" title="Previous" onclick="gStep(\''+g.id+'\',-1,event)">\u2039</button><button class="gnav gnext" title="More photos" onclick="gStep(\''+g.id+'\',1,event)">\u203A</button><span class="gcount" id="gcount-'+g.id+'">'+(i+1)+'/'+n+'</span>':'';
  const s=ensureSocial(g.id), nC=s.comments.length;
  return '<figure class="gtile">'+
    '<div class="gphoto" onclick="openGalleryPost(\''+g.id+'\')">'+media+nav+'</div>'+
    (g.caption?'<figcaption class="gcap">'+esc(g.caption)+'</figcaption>':'')+
    socialBar(g.id)+
    '<div class="gfoot">'+
      '<button class="gcomment" onclick="openGalleryPost(\''+g.id+'\')">💬 '+(nC?nC+(nC===1?' comment':' comments'):'Comment')+'</button>'+
      (admin?'<span class="gadmin"><button class="btn btn-ghost btn-xs" onclick="toggleFeatureGallery(\''+g.id+'\')">'+(g.featured?'\u2605 Unfeature':'\u2606 Feature')+'</button><button class="btn btn-ghost btn-xs" onclick="editGalleryPost(\''+g.id+'\')">Edit</button><button class="btn btn-ghost btn-xs" title="Remove" onclick="deleteItem(\'gallery\',\''+g.id+'\')">\u00d7</button></span>':'')+
    '</div></figure>';
}
function gStep(id,dir,ev){
  if(ev&&ev.stopPropagation)ev.stopPropagation();
  const g=galleryItems().find(function(x){return sameId(x.id,id);}); if(!g)return;
  const ps=gPhotos(g); if(ps.length<2)return;
  const nx=(((gViewIdx[id]||0)+dir)%ps.length+ps.length)%ps.length; gViewIdx[id]=nx;
  const im=document.getElementById('gimg-'+id); if(im)im.src=ps[nx];
  const c=document.getElementById('gcount-'+id); if(c)c.textContent=(nx+1)+'/'+ps.length;
}

function addGPhotos(){
  syncGEd();
  const files=Array.prototype.slice.call(this.files||[]);
  const room=GMAX-_gEd.photos.length;
  if(files.length>room) toast('Only '+room+' more photo'+(room===1?'':'s')+' fit \u2014 '+GMAX+' max.');
  const take=files.slice(0,Math.max(0,room)); let pending=take.length; if(!pending)return;
  take.forEach(function(file){ shrinkImage(file, function(dataUrl){ if(dataUrl)_gEd.photos.push(dataUrl); if(--pending===0) renderGalleryEditor(); }); });
}
// downscale before storing, so a post of 15 photos doesn't balloon the saved row
function shrinkImage(file, cb, maxDim, quality){
  maxDim=maxDim||1400; quality=quality||0.85;
  const rd=new FileReader();
  rd.onload=function(){ const img=new Image();
    img.onload=function(){ const sc=Math.min(1, maxDim/Math.max(img.width,img.height));
      const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      try{ cb(c.toDataURL('image/jpeg',quality)); }catch(e){ cb(rd.result); } };
    img.onerror=function(){ cb(null); }; img.src=rd.result; };
  rd.onerror=function(){ cb(null); };
  rd.readAsDataURL(file);
}

async function loadAnalytics(){
  if(!BACKEND){ analyticsData={members:people.length,countries:1,chApps:[],ylApps:[],parts:[],chTotal:0,chPending:0,ylTotal:0,ylPending:0,traffic:{total:0,week:0,last7:[]}}; analyticsLoading=false; if(route()==='analytics')render(); return; }
  const d={members:0,countries:0,chApps:[],ylApps:[],parts:[],traffic:{total:0,week:0,last7:[]}};

  try{ const {data}=await sb.from('chapter_applications').select('id,data,reviewed,created_at').order('created_at',{ascending:false}); d.chApps=data||[]; }catch(e){}

function fitChapterTitle(){
  const el=document.getElementById('chapTitle'); if(!el)return;
  const tips=el.querySelectorAll('.info .tip'); tips.forEach(function(t){t.style.display='none';});   // the tooltip must not inflate the measured width
  const parent=el.parentElement, cs=getComputedStyle(parent);
  const avail=(parent.clientWidth - parseFloat(cs.paddingLeft||0) - parseFloat(cs.paddingRight||0)) * 0.96;   // fit within ~96% of the width
  const MIN=32, MAX=44;
  el.style.whiteSpace='nowrap';
  let size=MAX; el.style.fontSize=size+'px';
  let guard=0;
  while(el.scrollWidth>avail && size>MIN && guard++<320){ size-=1; el.style.fontSize=size+'px'; }
  if(el.scrollWidth>avail) el.style.whiteSpace='normal';       // still too wide at min size -> let it wrap so it stays readable (not tiny)
  tips.forEach(function(t){t.style.display='';});
}

/* ---- translation engine (cache-first; Edge Function, then MyMemory fallback) ---- */
async function preloadTranslations(code){
  if(code==='en'||!BACKEND) return;
  transCache[code]=transCache[code]||{};
  try{ const {data}=await sb.from('translations').select('source_text,translated').eq('target',code);
    (data||[]).forEach(function(r){ transCache[code][r.source_text]=r.translated; }); }catch(e){}
}
function mmLang(c){ return ({'zh-CN':'zh-CN'})[c]||c; }
let _edgeXlate=(typeof BACKEND!=='undefined'&&BACKEND);   // Edge Function available? disabled after a failure
async function gtxTranslate(text, target){
  const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl='+encodeURIComponent(target)+'&dt=t&q='+encodeURIComponent(text);
  const r=await fetch(url); if(!r.ok) throw new Error('gtx '+r.status);
  const j=await r.json(); return (j[0]||[]).map(function(s){return s[0];}).join('');
}
async function translateBatch(texts, target){
  if(target==='en') return;
  const cache=transCache[target]||(transCache[target]={});
  const todo=[]; texts.forEach(function(t){ if(t&&cache[t]==null&&todo.indexOf(t)<0) todo.push(t); });
  if(!todo.length) return;
  // 1) Edge Function (batched + cached in the DB for identical results every time)
  if(_edgeXlate){
    try{
      const {data,error}=await sb.functions.invoke('translate',{body:{q:todo,target:target,source:'en'}});
      if(!error && data && data.translations){ todo.forEach(function(t,i){ if(data.translations[i]!=null) cache[t]=data.translations[i]; }); }
      else { _edgeXlate=false; }
    }catch(e){ _edgeXlate=false; }
  }
  // 2) Google endpoint directly, in PARALLEL (fast; needs no deployment)
  let still=todo.filter(function(t){return cache[t]==null;});
  if(still.length){
    await Promise.all(still.map(function(t){ return gtxTranslate(t,target).then(function(tr){ if(tr)cache[t]=tr; },function(){}); }));
  }
  // 3) last resort: MyMemory, one at a time
  const left=todo.filter(function(t){return cache[t]==null;});
  for(var i=0;i<left.length;i++){
    try{ const r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(left[i])+'&langpair=en|'+mmLang(target));
      const j=await r.json(); cache[left[i]]=(j&&j.responseData&&j.responseData.translatedText)||left[i]; }
    catch(e){ cache[left[i]]=left[i]; }
  }
}

/* ---- apply translations to whatever is on screen (skips [data-notranslate]) ---- */
function txReplace(node,tr){ const v=node.nodeValue, lead=(v.match(/^\s*/)||[''])[0], trail=(v.match(/\s*$/)||[''])[0]; node.nodeValue=lead+tr+trail; }
function txCollect(root){
  const out=[]; if(!root) return out;
  const w=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  let n; while(n=w.nextNode()){
    const val=n.nodeValue; if(!val||!val.trim()) continue;
    if(/^[\s\d.,:;/#%()\[\]\-–—•|+×✓✕→←↗▾★☆]*$/.test(val)) continue;
    const p=n.parentElement; if(!p) continue;
    const tag=p.tagName; if(tag==='SCRIPT'||tag==='STYLE'||tag==='TEXTAREA'||tag==='CODE') continue;
    if(p.closest('[data-notranslate]')) continue;
    out.push(n);
  }
  return out;
}
let _txRun=0;
async function applyTranslations(){
  if(lang==='en'||!langChosen) return;
  const myRun=++_txRun;
  const roots=[document.getElementById('app'),document.getElementById('modal')];
  let nodes=[]; roots.forEach(function(r){ nodes=nodes.concat(txCollect(r)); });
  const cache=transCache[lang]||(transCache[lang]={});
  const pending=[], need=[];
  nodes.forEach(function(n){ const k=n.nodeValue.trim(); if(cache[k]!=null){ txReplace(n,cache[k]); } else { pending.push({n:n,k:k}); if(need.indexOf(k)<0)need.push(k); } });
  const attrPending=[];
  roots.forEach(function(r){ if(!r)return; Array.prototype.forEach.call(r.querySelectorAll('[placeholder],[title]'),function(el){
    ['placeholder','title'].forEach(function(a){ const val=el.getAttribute(a); if(val&&val.trim()&&!/^[\s\d]*$/.test(val)&&!el.closest('[data-notranslate]')){ if(cache[val]!=null)el.setAttribute(a,cache[val]); else{ attrPending.push({el:el,a:a,k:val}); if(need.indexOf(val)<0)need.push(val);} } }); }); });
  translateWordmark();
  if(!need.length) return;
  await translateBatch(need, lang);
  if(myRun!==_txRun) return;
  pending.forEach(function(p){ if(cache[p.k]!=null && p.n.parentNode && p.n.nodeValue.trim()===p.k) txReplace(p.n,cache[p.k]); });
  attrPending.forEach(function(p){ if(cache[p.k]!=null && p.el.getAttribute(p.a)===p.k) p.el.setAttribute(p.a,cache[p.k]); });
}

async function translateWordmark(){

  const phrase='Earth Sweet Earth', cache=transCache[lang]||(transCache[lang]={});
  if(cache[phrase]==null){ await translateBatch([phrase], lang); }
  const tr=cache[phrase]||phrase;
  if(wm.getAttribute('data-wm')===tr) return;
  const words=tr.split(/\s+/).filter(Boolean);
  wm.setAttribute('data-wm',tr);
  wm.innerHTML=words.map(function(w,i){ const sw=(words.length===3&&i===1)?' sw':''; return '<span class="cw'+sw+'">'+wordCloud(i%3)+esc(w)+'</span>'; }).join(' ');
}

async function translateComment(btn){

  const bg=document.getElementById('liBg'); if(!bg) return;
  const dt=Math.min(64, now-liLast); liLast=now;
  liSpawn-=dt; if(liSpawn<=0 && liLetters.length<42){ liSpawn=230+Math.random()*280; liSpawnLetter(bg); }
  for(let i=liLetters.length-1;i>=0;i--){ const L=liLetters[i];
    L.x+=L.vx*dt; L.y+=L.vy*dt; L.life+=dt;
    const fin=Math.min(1,L.life/1500), fout=(L.life>L.hold)?Math.max(0,1-(L.life-L.hold)/1500):1;
    L.el.style.transform='translate('+L.x.toFixed(1)+'px,'+L.y.toFixed(1)+'px)';
    L.el.style.opacity=(Math.min(fin,fout)*L.max).toFixed(3);
    if(L.life>L.hold+1500){ if(L.el.parentNode)bg.removeChild(L.el); liLetters.splice(i,1); }
  }
  liRAF=requestAnimationFrame(liFrame);
}
function liSpawnLetter(bg){
  const el=document.createElement('span'); el.className='li-letter';
  el.textContent=randGlyph();                       // random LANGUAGE first, then a glyph from it -> equal chance per language
  el.style.fontSize=(16+Math.random()*56).toFixed(0)+'px';
  const W=window.innerWidth,H=window.innerHeight, ang=Math.random()*Math.PI*2, sp=0.005+Math.random()*0.032;
  const L={el:el, x:Math.random()*W, y:Math.random()*H, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life:0, hold:2200+Math.random()*4200, max:0.14+Math.random()*0.42, op:0};
  el.style.transform='translate('+L.x.toFixed(1)+'px,'+L.y.toFixed(1)+'px)'; el.style.opacity='0';
  bg.appendChild(el); liLetters.push(L);
}

/* ==========================================================================
   9) HERO ANIMATION ENGINE
   Scroll-driven: sun/sky/season (light), moon phase (dark), cloud drift, leaf-fall, tree sway.
   Time-driven (independent of scroll): leaf rustle (CSS), a few stars twinkling (JS),
   shooting stars, and occasional leaves breaking off in the wind.
   ========================================================================== */
const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let heroTimers=[];
let heroTimersBird=[], birdOccupied=[];   // birds: up to 2 groups, each in a distinct layer of 4
let heroRAF=0;
function stopBirds(){ heroTimersBird.forEach(clearTimeout); heroTimersBird=[]; birdOccupied=[]; document.querySelectorAll('.birds').forEach(b=>b.remove()); }
function stopHero(){ heroTimers.forEach(clearInterval); heroTimers=[]; cancelAnimationFrame(heroRAF); heroRAF=0; stopBirds(); document.querySelectorAll('.windgust,.shooting').forEach(e=>e.remove()); activeBreezes=0; }
function lerp(a,b,t){return a+(b-a)*t;}
function hex(c){ if(c[0]==='r'){const m=c.match(/\d+/g);return [+m[0],+m[1],+m[2]];} c=c.replace('#','');return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
function mix(a,b,t){const A=hex(a),B=hex(b);return 'rgb('+Math.round(lerp(A[0],B[0],t))+','+Math.round(lerp(A[1],B[1],t))+','+Math.round(lerp(A[2],B[2],t))+')';}

// ---- tree geometry: one leaf shape + one 5-petal flower shape, reused for canopy and falling ----
const LEAF_PATH='M0,-8 C4,-6 5,-1 3,5 C2,7.5 -2,7.5 -3,5 C-5,-1 -4,-6 0,-8 Z';
const FLOWER_PATH=(function(){let d='';for(let k=0;k<5;k++){const a=k*72*Math.PI/180;const R=(x,y)=>[(x*Math.cos(a)-y*Math.sin(a)).toFixed(2),(x*Math.sin(a)+y*Math.cos(a)).toFixed(2)];const p0=R(0,0),c1=R(2.7,-5.4),c2=R(-2.7,-5.4);d+='M'+p0[0]+','+p0[1]+' C'+c1[0]+','+c1[1]+' '+c2[0]+','+c2[1]+' '+p0[0]+','+p0[1]+' ';}return d;})();

// deterministic pseudo-random so the canopy is identical every load
function fr(x){x=Math.sin(x)*43758.5453;return x-Math.floor(x);}
// leaves densely fill a rounded crown (no floating gaps); a ragged edge keeps it natural
const LEAF_POS=(function(){const a=[];const cx=100,cy=82,rx=72,ry=58,step=8;let k=0;
  for(let gy=cy-ry;gy<=cy+ry;gy+=step){for(let gx=cx-rx;gx<=cx+rx;gx+=step){
    const jx=(fr(k*1.7)-0.5)*step*1.0, jy=(fr(k*3.3+1)-0.5)*step*1.0;
    const x=gx+jx, y=gy+jy, nx=(x-cx)/rx, ny=(y-cy)/ry, dist=nx*nx+ny*ny;
    if(dist<=1 && !(dist>0.9 && fr(k*5.1)<0.3)){                          // dense fill, lightly ragged edge
      const lx=100+(fr(k*8.1)-0.5)*116;                                  // land spread across a mound at the base
      const mh=14*Math.max(0,1-Math.pow(Math.abs(lx-100)/56,1.4)) - fr(k*9.3)*6;   // mound height above the ground line (peak centre)
      a.push({x:+x.toFixed(1),y:+y.toFixed(1),r:Math.round(fr(k*2.2)*360),d:Math.min(0.34,Math.max(0,(y-(cy-ry))/(2*ry)*0.32)),dt:+fr(k*11.3).toFixed(3),lx:+lx.toFixed(1),mh:+mh.toFixed(1),lr:Math.round(fr(k*3.7)*160-80)});
    }
    k++;
  }}
  return a;})();
// flowers scatter more sparsely through the same crown, in front of the leaves
const FLOWER_POS=(function(){const a=[];const cx=100,cy=82,rx=64,ry=50,step=15;let k=0;
  for(let gy=cy-ry;gy<=cy+ry;gy+=step){for(let gx=cx-rx;gx<=cx+rx;gx+=step){
    const jx=(fr(k*4.1+7)-0.5)*step, jy=(fr(k*6.7+3)-0.5)*step;
    const x=gx+jx, y=gy+jy, nx=(x-cx)/rx, ny=(y-cy)/ry;
    if(nx*nx+ny*ny<=1){ a.push({x:+x.toFixed(1),y:+y.toFixed(1),d:+(fr(k*2.9)*0.28).toFixed(2)}); }
    k++;
  }}
  return a;})();

// sun/moon vertical placement, measured from the real horizon (hills) so it sits right on any screen
let heroW=0, heroH=0, curP=0, groundY=0, trunkLX=0, trunkRX=0, GROUND_TY=200, canopyY=0, skyY=0, hs=1;
function measureHero(){
  const hero=document.getElementById('hero'); if(!hero)return;
  heroW=hero.clientWidth; heroH=hero.clientHeight;
  const vh=window.innerHeight||heroH;
  const tb=document.querySelector('.topbar'); if(tb) document.documentElement.style.setProperty('--nav-h', tb.offsetHeight+'px');
  // Ground/sky lines from the known vh-based hill sizes — deterministic (getBoundingClientRect on the SVGs was unreliable and put the shadows at the top).
  groundY = heroH - 0.166*vh;                        // front-hill green top (23vh box, green begins ~28% down it)
  skyY    = heroH - 0.258*vh;                        // far light-green hill ridge (34vh box) — the sun sets behind this
  hs = Math.max(0.45, Math.min(1, heroW/1280));     // proportional scale: full on a laptop, smaller on phones/tablets
  hero.style.setProperty('--hs', hs.toFixed(3));
  trunkLX = 89; trunkRX = heroW - 89;                // trunk sits at each tree's horizontal centre (≈89px), unchanged by scaling (trees scale about bottom-centre)
  const contentH=Math.min(0.44*vh, 190*320/200), topPx=heroH-contentH;   // tree content (unscaled); trees scale about the ground line so this crossing stays put
  GROUND_TY = Math.max(40, Math.min(300, (groundY - topPx)/contentH*320));   // viewBox-y where the trunk meets the grass — unchanged by scaling
  const canopyU = topPx + (48/320)*contentH;
  canopyY = groundY - hs*(groundY - canopyU);        // top of the crown, scaled about the ground line
}

function seasonColor(p){ return p<0.32 ? mix('#3f8f4f','#c9a227',p/0.32) : mix('#c9a227','#c0472b',Math.min(1,(p-0.32)/0.22)); }
function currentLeafColor(){ return theme==='dark' ? '#2c5d3a' : seasonColor(curP); }

let leavesFalling=false;
function setTreeLeafVar(col){ ['tree-left','tree-right'].forEach(id=>{const t=document.getElementById(id);if(t)t.style.setProperty('--leaf',col);}); }
function setRustle(on){ ['fo-left','fo-right'].forEach(id=>{const g=document.getElementById(id);if(g)g.classList.toggle('still',!on);}); }
function resetLeaves(){ ['tree-left','tree-right'].forEach(id=>{const t=document.getElementById(id);if(!t)return;t.querySelectorAll('.leaf').forEach(l=>{l._t0=0;l.setAttribute('transform','translate('+l.dataset.x+','+l.dataset.y+') rotate('+l.dataset.a+')');l.style.fill='';l.style.opacity='1';});}); }
// colour/position every leaf. Through autumn each leaf detaches and falls ONCE, landing in a
// leaves detach at random scroll points through autumn; once detached each falls over a fixed
// time, rests on/just below the dark-green ground, then fades after ~1s. All gone by full snow.
const FALL_MS=1400, REST_MS=1100, FADE_MS=900;
// A mound of leaves that accumulates on the grass under each tree (its own layer, in front of the hills,
// so it always sits on the visible ground regardless of how the trees letterbox).
function drawPile(p, night){
  const pile=document.getElementById('leafPile'); if(!pile)return;
  const build=Math.max(0, Math.min(1, (p-0.44)/(0.60-0.44)));          // grows through autumn
  const winterForce=(!night && p>0.62)?Math.min(1,(p-0.62)/(0.78-0.62)):0;
  const vis=night?0:Math.min(1, build*2)*(1-winterForce);
  if(vis<=0.01 || !trunkLX){ if(pile._k){ pile.innerHTML=''; pile._k=''; } pile.style.opacity='0'; return; }
  pile.style.opacity=vis.toFixed(2);
  pile.setAttribute('viewBox','0 0 '+heroW+' '+heroH); pile.setAttribute('preserveAspectRatio','none');
  const col=seasonColor(p), key=Math.round(build*24)+'|'+col+'|'+hs.toFixed(2);   // rebuild when leaf count/colour/scale changes
  if(pile._k===key) return;
  pile._k=key;
  const brown='#7a3f1e', N=16, spread=66*hs;
  let s='';
  [trunkLX, trunkRX].forEach((cx,ti)=>{ if(!cx)return;
    for(let i=0;i<N;i++){ if(i/N>build) continue;
      const rx=fr(ti*91+i*5)*2-1;                                      // -1..1 across the mound
      const dx=rx*spread, mound=(1-rx*rx)*13*hs;                        // parabolic — taller in the middle
      const lx=cx+dx, ly=groundY + 3 - mound*(0.5+fr(ti*91+i*5+1)*0.5);
      const rot=fr(ti*91+i*5+2)*360, sc=(0.85+fr(ti*91+i*5+3)*0.35)*hs;
      const c=mix(col, brown, 0.4+fr(ti*91+i*5+4)*0.5);
      s+='<g transform="translate('+lx.toFixed(1)+','+ly.toFixed(1)+') rotate('+rot.toFixed(0)+') scale('+sc.toFixed(2)+')"><path d="'+LEAF_PATH+'" fill="'+c+'"/></g>';
    }
  });
  pile.innerHTML=s;
}
function paintLeaves(p,night,now){
  const fs=0.40, fe=0.60, winterFull=0.78;
  const base=night?'#2c5d3a':seasonColor(p);
  const winterForce=(!night && p>0.62)?Math.min(1,(p-0.62)/(winterFull-0.62)):0;   // guarantees bare by full snow
  drawPile(p, night);                                          // the mound on the grass (separate layer, sits on the visible ground)
  if(night || p<=fs){
    setTreeLeafVar(base); setRustle(true);
    if(leavesFalling){ resetLeaves(); leavesFalling=false; }
    return;
  }
  leavesFalling=true; setRustle(false);
  ['tree-left','tree-right'].forEach(id=>{ const t=document.getElementById(id); if(!t)return;
    t.querySelectorAll('.leaf').forEach((leaf,i)=>{
      const bx=+leaf.dataset.x, by=+leaf.dataset.y, ba=+leaf.dataset.a;
      const lx=+leaf.dataset.lx, ly=GROUND_TY, lr=+leaf.dataset.lr, dt=+leaf.dataset.dt;
      const thr=fs+dt*(fe-fs);                                  // this leaf's random detach point
      if(p<thr){ leaf._t0=0; leaf.setAttribute('transform','translate('+bx+','+by+') rotate('+ba+')'); leaf.style.opacity=(1-winterForce).toFixed(2); leaf.style.fill=base; return; }
      if(!leaf._t0) leaf._t0=now;                               // detach (records time); reversible on scroll-up
      const e=now-leaf._t0; let px,py,rot,op;
      if(e<FALL_MS){ const u=e/FALL_MS, ue=u*u*(3-2*u), sway=Math.sin(i*1.7+u*7)*15*(1-u*0.4);
        px=bx+(lx-bx)*ue+sway; py=by+(ly-by)*ue; rot=ba+(lr-ba)*ue+Math.sin(u*10)*40*(1-u); op=1; }
      else { px=lx; py=ly; rot=lr; op=Math.max(0, 1-(e-FALL_MS)/FADE_MS); }   // landed → fade as it settles into the ground pile
      leaf.setAttribute('transform','translate('+px.toFixed(1)+','+py.toFixed(1)+') rotate('+rot.toFixed(0)+')');
      leaf.style.fill=mix(base,'#8a4a24',Math.min(1,(e/FALL_MS)*1.2));
      leaf.style.opacity=(op*(1-winterForce)).toFixed(2);
    });
  });
}
// buds emerge and open into 5-petal flowers through spring→summer, in front of the leaves
function paintFlowers(bloom){
  ['fl-left','fl-right'].forEach(id=>{ const g=document.getElementById(id); if(!g)return;
    if(bloom<=0.001){ if(g.style.display!=='none') g.style.display='none'; return; }
    g.style.display=''; g.style.opacity=Math.min(1,bloom).toFixed(2);
    Array.prototype.forEach.call(g.children,(fl)=>{
      const open=Math.min(1,Math.max(0,(bloom-0.15-(+fl.dataset.d)*0.5)/0.5));
      const bud=fl.querySelector('.bud'), bloomG=fl.querySelector('.bloom');
      if(bud) bud.setAttribute('transform','scale('+(1-open).toFixed(2)+')');
      if(bloomG) bloomG.setAttribute('transform','scale('+open.toFixed(2)+')');
    });
  });
}

function computeP(){ const s=document.getElementById('heroScroll'), h=document.getElementById('hero'); if(!s||!h)return 0; const range=s.offsetHeight-h.offsetHeight; return range<=0?0:Math.min(Math.max(window.scrollY/range,0),1); }

  const night = theme==='dark';
  hero.classList.toggle('night',night);
  document.getElementById('sunWrap').style.display = night?'none':'';
  document.getElementById('moon').style.display = night?'':'none';
  document.getElementById('clouds').style.display = night?'none':'';
  // build stars once: a scattered field + a denser band along the Milky Way (all kept above the ground line)
  const starBox=document.getElementById('stars');
  if(night && !starBox.dataset.built){
    let s='';
    const star=(x,y,sz,op,col)=>'<span class="star" data-o="'+op+'" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+op+';background:'+col+'"></span>';

function updateScene(p, now){

    const th0=0.03*Math.PI, th=th0 + p*(Math.PI - 2*th0), sunH=Math.sin(th);   // sun height 0..1 along the arc

function consOrder(){
  const byQ=[[],[],[],[]]; CONSTELLATIONS.forEach((c,i)=>byQ[c.q].push(i));
  if(CONSTELLATION_MODE==='random5'){
    const pool=byQ.map(a=>a.slice()), order=[]; let prevQ=-1;
    for(let n=0;n<5;n++){
      const qs=[0,1,2,3].filter(q=>q!==prevQ && pool[q].length);
      if(!qs.length) break;
      const q=qs[Math.floor(Math.random()*qs.length)];
      const j=Math.floor(Math.random()*pool[q].length);
      order.push(pool[q].splice(j,1)[0]); prevQ=q;
    }
    return order;
  }
  const order=[]; for(let k=0;k<5;k++) for(let q=0;q<4;q++) if(byQ[q][k]!=null) order.push(byQ[q][k]);   // quadrant round-robin (never two in a row)
  return order;
}
function buildConstellations(){
  const svg=document.getElementById('constellations'); if(!svg)return;
  const W=heroW||svg.clientWidth||1200, H=heroH||svg.clientHeight||700;
  svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('preserveAspectRatio','none');   // 1:1 px, no distortion, no crop
  if(!CONS_ORDER.length || CONSTELLATION_MODE!=='random5') CONS_ORDER=consOrder();               // keep the random pick stable across rebuilds
  const S0=H*0.0075;
  let h='';
  CONS_ORDER.forEach((ci,k)=>{ const c=CONSTELLATIONS[ci], cx=c.at[0]*W, cy=c.at[1]*H, S=S0*(c.s||1), n=c.st.length;
    const pts=c.st.map(d=>[cx+d[0]*S, cy+d[1]*S]);
    let g='<g class="cons" data-k="'+k+'">';
    (c.segs||[]).forEach(seg=>{ g+='<polyline class="cline" points="'+seg.map(i=>pts[i][0].toFixed(1)+','+pts[i][1].toFixed(1)).join(' ')+'"/>'; });
    pts.forEach((pt,i)=>{ const mag=1-i/Math.max(1,n-1); const r=(1.6+mag*1.1).toFixed(2);          // rest size by magnitude — largest < 2× smallest, smooth
      g+='<circle class="cstar" data-sf="'+(i/Math.max(1,n-1)).toFixed(3)+'" data-r="'+r+'" cx="'+pt[0].toFixed(1)+'" cy="'+pt[1].toFixed(1)+'" r="0.6"/>'; });
    g+='</g>'; h+=g;
  });
  svg.innerHTML=h;
  svg.querySelectorAll('.cline').forEach(pl=>{ try{ const L=pl.getTotalLength(); pl.dataset.len=L.toFixed(1); pl.style.strokeDasharray=L.toFixed(1); }catch(e){} });
}
function updateConstellations(p, now){
  const svg=document.getElementById('constellations'); if(!svg)return;
  const groups=svg.querySelectorAll('.cons'), N=groups.length; if(!N)return;
  const TRACE=0.8, HOLD=2.4, FADE=0.6;                        // window units; visible for HOLD+FADE=3 windows → ~3 on screen at once
  groups.forEach((g,k)=>{
    const t = p*N - k;                                        // how many windows since this one began
    let lf, vis;
    if(t<0){ lf=0; vis=0; }
    else if(t<TRACE){ lf=t/TRACE; vis=1; }                    // tracing in
    else if(t<HOLD){ lf=1; vis=1; }                           // fully lit
    else if(t<HOLD+FADE){ lf=1; vis=1-(t-HOLD)/FADE; }        // fading out so only ~3 remain
    else { lf=1; vis=0; }
    g.style.opacity=vis.toFixed(3);
    if(vis<=0.002) return;
    const tracing = t>=0 && t<TRACE;
    const linePulse = tracing ? (0.62+0.38*Math.sin((now||0)/170 + k*1.7)) : 1;   // strong pulse only on its turn
    g.querySelectorAll('.cline').forEach(pl=>{ const L=+pl.dataset.len||0; pl.style.strokeDashoffset=(L*(1-lf)).toFixed(1); pl.style.opacity=(Math.min(1,lf*1.15)*0.8*linePulse).toFixed(2); });
    g.querySelectorAll('.cstar').forEach(st=>{ const sf=+st.dataset.sf, rest=+st.dataset.r;
      const e=Math.min(1,Math.max(0,(lf - sf*0.7)/0.2));      // grows to rest size as the line reaches it
      const boost = tracing ? (1+0.16*Math.sin((now||0)/150 + sf*7 + k)) : 1;   // brief gentle twinkle on the turn, then rest
      const r=(0.6 + (rest-0.6)*e) * boost;                    // pinprick → modest rest size (doesn't stay oversized)
      st.setAttribute('r', Math.max(0.4,r).toFixed(2));
      st.style.opacity=(0.3 + e*0.7).toFixed(2);
    });
  });
}

/* ---------- sleep z's from the trees (dark mode), tied to scroll ---------- */
const ZZZ_PER=4;
function buildZzz(){ ['zzzL','zzzR'].forEach(id=>{ const c=document.getElementById(id); if(!c||c.dataset.built)return; let h=''; for(let i=0;i<ZZZ_PER;i++) h+='<span>z</span>'; c.innerHTML=h; c.dataset.built='1'; }); }
function updateZzz(p, now){
  const night = theme==='dark' && p>=0;
  ['zzzL','zzzR'].forEach((id,side)=>{ const c=document.getElementById(id); if(!c)return;
    if(!night){ c.style.opacity='0'; return; }
    c.style.opacity='1';
    const dir = side===0 ? 1 : -1;                              // left tree → up-right, right tree → up-left
    const baseX = (side===0 ? (trunkLX||heroW*0.06) : (trunkRX||heroW*0.94)) + dir*18;   // start just inside the trunk
    const baseY = (canopyY||heroH*0.62);                        // top of the canopy
    const spans=c.children, dist=heroH*0.16;
    for(let i=0;i<spans.length;i++){
      const prog=((p*3 + i/ZZZ_PER) % 1 + 1) % 1;               // scroll drives the rise; staggered per z
      const x=baseX + dir*prog*dist*0.55;
      const y=baseY - prog*dist;
      const scale=0.8 + prog*0.9;                               // start a touch bigger, grow gently
      const rot=(i%2? 1 : -1) * Math.sin(prog*Math.PI*4) * 20;  // each z wobbles; adjacent z's wobble opposite
      const op=Math.sin(Math.min(1,prog)*Math.PI)*0.85;         // grow in, fade out
      const el=spans[i];
      el.style.transform='translate('+x.toFixed(0)+'px,'+y.toFixed(0)+'px) scale('+scale.toFixed(2)+') rotate('+rot.toFixed(0)+'deg)';
      el.style.opacity=op.toFixed(2);
      el.style.fontSize=(13+i)+'px';
    }
  });
}

function breakLeaf(side){

// a faint curved wind gust (with a little spiral) drifts across and fades — all seasons, both modes
let activeBreezes=0;
function windGust(){
  if(activeBreezes>=2) return;                                  // no more than two breezes at once
  const hero=document.getElementById('hero'); if(!hero)return;
  const NS='http://www.w3.org/2000/svg';
  const w=hero.offsetWidth, h=hero.offsetHeight;
  activeBreezes++;
  const dir=Math.random()<0.5?1:-1;
  const vh=window.innerHeight||h;
  // tree-canopy zones (hero coords) for leaf pickup — computed, not measured (crown sits in the upper tree)
  const contentH=Math.min(0.44*vh, 190*320/200), topPx=h-contentH;
  const gy=groundY||(h-0.166*vh);
  const cy0=gy-hs*(gy-(topPx+(18/320)*contentH)), cy1=gy-hs*(gy-(topPx+(150/320)*contentH));
  const halfW=95*hs, tlx=trunkLX||89, trx=trunkRX||(w-89);
  const zones=[{x0:tlx-halfW,x1:tlx+halfW,y0:cy0,y1:cy1},{x0:trx-halfW,x1:trx+halfW,y0:cy0,y1:cy1}];
  const entryZone = dir>0 ? zones[0] : zones[1];               // the tree the breeze passes first
  const y0 = entryZone.y0 + (entryZone.y1-entryZone.y0)*(0.35+Math.random()*0.4);   // aligned to cross that canopy
  const span=w+140;
  const startX=dir>0?-70:w+70;
  // Path SHAPE (t:0→1): off one edge → loop → gentle wave → loop → off the other edge.
  const loopR=Math.max(22, span*0.014);                        // small loop, scales gently with width
  const hw=0.013;                                              // narrow half-window per loop → a clean self-intersecting curl (no cusp)
  const lc1=0.33, lc2=0.64, ld1=Math.random()<0.5?1:-1, ld2=Math.random()<0.5?1:-1;   // two loop centres, each up or down
  const waveAmp=4+Math.random()*4, waveN=2.4+Math.random()*1.2, wavePh=Math.random()*6.283;
  const loops=[{c:lc1,d:ld1},{c:lc2,d:ld2}];
  function shape(t){
    let x=startX+dir*t*span, y=y0+Math.sin(t*waveN*2*Math.PI+wavePh)*waveAmp;         // base glide + ever-so-slight waviness
    for(const lp of loops){ const dt=t-lp.c; if(Math.abs(dt)<hw){ const s=dt/(2*hw)+0.5, a=s*2*Math.PI; x+=dir*Math.sin(a)*loopR; y+=-lp.d*(1-Math.cos(a))*loopR; } }
    return [x,y];
  }
  // Arc-length table so the breeze (and its leaf) travel at CONSTANT speed — loops no longer speed it up.
  const SEG=1200, sx=[], sy=[], cum=[0];
  for(let i=0;i<=SEG;i++){ const p=shape(i/SEG); sx.push(p[0]); sy.push(p[1]); if(i>0) cum.push(cum[i-1]+Math.hypot(sx[i]-sx[i-1], sy[i]-sy[i-1])); }
  const totalLen=cum[SEG]||1;
  function atLen(L){ let lo=0,hi=SEG; while(lo<hi){ const m=(lo+hi)>>1; if(cum[m]<L) lo=m+1; else hi=m; } const i=Math.max(1,lo), seg=cum[i]-cum[i-1], f=seg>0?(L-cum[i-1])/seg:0; return [sx[i-1]+(sx[i]-sx[i-1])*f, sy[i-1]+(sy[i]-sy[i-1])*f]; }
  function lead(u){ return atLen(Math.max(0,Math.min(1,u))*totalLen); }
  const col=theme==='dark'?'rgba(210,220,255,.6)':'rgba(255,255,255,.7)';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('class','windgust'); svg.setAttribute('width',w); svg.setAttribute('height',h);
  svg.setAttribute('viewBox','0 0 '+w+' '+h); svg.style.left='0px'; svg.style.top='0px';
  svg.innerHTML='<path fill="none" style="stroke:'+col+';stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"/>';
  hero.appendChild(svg);
  const path=svg.querySelector('path');
  const seasonCol=currentLeafColor();
  const dur=5200+Math.random()*1800, t0=performance.now();
  const trail=[], maxTrail=30; let carried=null, cAng=Math.random()*360;
  function frame(now){
    if(!document.body.contains(svg)){ if(carried)carried.remove(); activeBreezes=Math.max(0,activeBreezes-1); return; }
    const u=(now-t0)/dur;
    if(u>=1){ svg.remove(); if(carried)carried.remove(); activeBreezes=Math.max(0,activeBreezes-1); return; }
    const lp=lead(u); trail.push(lp); if(trail.length>maxTrail) trail.shift();
    path.setAttribute('d','M'+trail.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L'));
    svg.style.opacity=(u<0.1?u/0.1:u>0.85?(1-u)/0.15:1).toFixed(2);
    if(!carried){ for(const z of zones){ if(lp[0]>=z.x0&&lp[0]<=z.x1&&lp[1]>=z.y0&&lp[1]<=z.y1){ carried=document.createElementNS(NS,'svg'); carried.setAttribute('class','flyleaf'); carried.setAttribute('viewBox','-9 -9 18 18'); carried.innerHTML='<path d="'+LEAF_PATH+'" fill="'+seasonCol+'"/>'; hero.appendChild(carried); break; } } }
    if(carried){ const ahead=lead(Math.min(1,u+0.03)); cAng+=10; carried.style.left=ahead[0].toFixed(1)+'px'; carried.style.top=ahead[1].toFixed(1)+'px'; carried.style.transform='translate(-50%,-50%) rotate('+cAng+'deg)'; }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function shootingStar(){
  const hero=document.getElementById('hero'); if(!hero||theme!=='dark')return;
  const w=hero.offsetWidth, h=hero.offsetHeight;
  const dir=Math.random()<0.5?1:-1;                            // down-right or down-left
  const ang=22+Math.random()*16;                               // degrees below horizontal (a sane angle)
  const rot=dir>0?ang:180-ang;
  const dist=200+Math.random()*180;
  const dx=dir*Math.cos(ang*Math.PI/180)*dist, dy=Math.sin(ang*Math.PI/180)*dist;
  const s=document.createElement('div'); s.className='shooting';
  s.style.top=(Math.random()*h*0.32).toFixed(0)+'px'; s.style.left=((0.1+Math.random()*0.8)*w).toFixed(0)+'px';
  hero.appendChild(s);
  s.animate([
    {transform:'translate(0,0) rotate('+rot.toFixed(0)+'deg)',opacity:0},
    {opacity:1,offset:0.2},
    {transform:'translate('+dx.toFixed(0)+'px,'+dy.toFixed(0)+'px) rotate('+rot.toFixed(0)+'deg)',opacity:0}
  ],{duration:Math.round(750+Math.random()*350),easing:'ease-out'}).onfinish=()=>s.remove();
}
// small bird silhouette; two wings flap via SMIL (rotate around the body)
function birdSVG(flapDur){
  return '<svg viewBox="-13 -9 26 18" width="26" height="18">'+
    '<path d="M0,1 C-5,-5 -9,-4 -12,-1 C-8,-1 -4,0 0,2 Z"><animateTransform attributeName="transform" type="rotate" values="-14 0 1;14 0 1;-14 0 1" dur="'+flapDur+'s" repeatCount="indefinite"/></path>'+
    '<path d="M0,1 C5,-5 9,-4 12,-1 C8,-1 4,0 0,2 Z"><animateTransform attributeName="transform" type="rotate" values="14 0 1;-14 0 1;14 0 1" dur="'+flapDur+'s" repeatCount="indefinite"/></path>'+
  '</svg>';
}
// two independent streams keep at most 2 groups on screen; each group takes a distinct layer (of 4) so they never collide
function birdStream(streamId){
  const hero=document.getElementById('hero');
  if(!hero || route()!=='home' || theme==='dark'){ return; }        // birds sleep at night
  const w=hero.offsetWidth, h=hero.offsetHeight;
  const layers=[0.08,0.24,0.40,0.56];                                // four lanes across the top two-thirds
  const free=[0,1,2,3].filter(l=>birdOccupied.indexOf(l)<0);
  if(!free.length){ heroTimersBird[streamId]=setTimeout(()=>birdStream(streamId),700); return; }
  const layer=free[Math.floor(Math.random()*free.length)]; birdOccupied.push(layer);
  const count=Math.random()<0.5?2:3;                                 // 2 or 3, 50/50, independent per group
  const dir=Math.random()<0.5?1:-1;                                  // side 50/50
  const y=layers[layer]*h, speed=0.13, dist=w+300, dur=Math.round(dist/speed);   // ~2x the falling-leaf speed
  const flapDur=Math.max(0.42,(dur/1000)*0.75/14).toFixed(2);
  const group=document.createElement('div'); group.className='birds'; group.style.top=y.toFixed(0)+'px';
  for(let i=0;i<count;i++){
    const b=document.createElement('div'); b.className='bird';
    b.style.left=(-i*30*dir*hs).toFixed(0)+'px';
    b.style.top=((i%2?1:-1)*i*8*hs).toFixed(0)+'px';
    b.style.transform='scaleX('+dir+') scale('+hs.toFixed(3)+')';
    b.innerHTML=birdSVG(flapDur);
    group.appendChild(b);
  }
  const from=dir>0?-150:w+50, to=dir>0?(w+150):-150;
  group.style.left=from.toFixed(0)+'px';
  hero.appendChild(group);
  group.animate([{transform:'translateX(0)'},{transform:'translateX('+(to-from).toFixed(0)+'px)'}],{duration:dur,easing:'linear'}).onfinish=()=>{
    group.remove(); const k=birdOccupied.indexOf(layer); if(k>-1)birdOccupied.splice(k,1);
    heroTimersBird[streamId]=setTimeout(()=>birdStream(streamId), 500+Math.random()*1500);
  };
}
window.addEventListener('scroll',()=>{ if(document.getElementById('heroScroll')){ curP=computeP(); if(reduceMotion) updateScene(curP, performance.now()); } },{passive:true});
window.addEventListener('resize',()=>{ if(document.getElementById('hero')){ measureHero(); curP=computeP(); buildConstellations(); } });

/* ---- shared site content persisted for everyone via the site_content row ---- */
const SITE_KEYS=['mission','tagline','discord','applyForm','featured','repThreshold','gcalId','aboutSeeded','driveUrl','donateUrl','discordVerify','discordRequired','discordMap'];
const SITE_ARRAYS=['socials','affiliations','chapters','board','advisory','youth','gallery','events','speakers','schoolChallenges','indivChallenges'];
async function loadSiteContent(){
  if(!BACKEND) return;
  try{
    const {data}=await sb.from('site_content').select('data').eq('id',1).single();
    if(data&&data.data){
      SITE_KEYS.forEach(k=>{ if(data.data[k]!=null) content[k]=data.data[k]; });
      SITE_ARRAYS.forEach(k=>{ if(Array.isArray(data.data[k])) content[k]=data.data[k]; });
      if(Array.isArray(data.data.newsletters)) newsletters=data.data.newsletters;
      if(data.data.roles && typeof data.data.roles==='object'){
        roles=data.data.roles;
        if(!roles.owner) roles.owner={name:'Owner',locked:true,caps:allCaps(true)};
        roles.owner.locked=true; roles.owner.caps=allCaps(true);   // owner always keeps every permission
        if(!roles.chapter_leader) roles.chapter_leader={name:'Chapter Leader',caps:Object.assign(allCaps(false),{chapter_manage:true,view_chapters:true,view_gallery:true,view_calendar:true})};
        if(!roles.public) roles.public=DEFAULT_PUBLIC();           // logged-out visitors always have a Public row
      }
    }
  }catch(e){ /* table may not exist yet — falls back to defaults */ }
}
async function saveSiteContent(silent){
  if(!BACKEND){ if(!silent)toast('Saved (preview)'); return; }
  const payload={roles:roles, newsletters:newsletters}; SITE_KEYS.forEach(k=>payload[k]=content[k]); SITE_ARRAYS.forEach(k=>payload[k]=content[k]);
  try{
    const {error}=await sb.from('site_content').upsert({id:1,data:payload});
    if(!silent) toast(error?('Couldn\'t save: '+error.message):'Saved for everyone');
    else if(error) toast('Couldn\'t save: '+error.message);
  }catch(e){ toast('Save failed — is the site_content table set up?'); }
}
function editText(kind){
  const map={mission:{title:'Mission statement',label:'Mission statement',type:'textarea'},tagline:{title:'Home subtitle',label:'Subtitle under “Earth Sweet Earth”',type:'textarea'},discord:{title:'Discord invite link',label:'Discord invite URL',type:'url'},applyForm:{title:'Chapter application form',label:'Application form URL (e.g. a Google Form)',type:'url'}};
  const m=map[kind];
  openEditor(m.title,[{key:'val',label:m.label,type:m.type,placeholder:kind==='discord'?'https://discord.gg/…':''}],{val:content[kind]},v=>{ content[kind]=v.val; saveSiteContent(); });
}

async function init(){
  document.body.setAttribute('data-theme',theme);
  if(BACKEND){ try{ await loadSession(); await loadSiteContent(); }catch(e){} loadNotifCount(); loadEventData(); ensureChapters(); checkDiscord(); sb.auth.onAuthStateChange(()=>{loadSession().then(function(){render();loadNotifCount();eventDataLoaded=false;ensureEventData();chaptersLoaded=false;ensureChapters();}).catch(()=>{});}); }
  if(!location.hash) location.hash='#/home';
  render();
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ const el=document.getElementById('langIntro'); if(el && !el.classList.contains('li-hidden') && !el.classList.contains('revealing')) liHidePicker(); closeNavMenu(); } });
document.addEventListener('click',function(e){ const m=document.getElementById('navMenu'); if(!m||!m.classList.contains('open'))return; const w=m.closest('.acct-profile'); if(w&&!w.contains(e.target)) m.classList.remove('open'); });
init();
