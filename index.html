  EARTH SWEET EARTH — website prototype (structure only, all placeholders)
  ============================================================================
  WHAT THIS IS: a clickable skeleton of the whole site — every page, the top
  tabs (which change pages without scrolling), role-based views, popups, the
  dynamic sun, and an Admin Settings role builder.

  LOGIN & ROLES — TWO MODES (this is the "non-static" part):

    browser so you can click around. The dark "Preview as" bar lets you view
    the site as Public / Member / Moderator / Admin / Owner.
  • REAL MODE: paste your two Supabase keys into the CONFIG block at the very
    top of the script below. Then Sign Up / Log In use a real, secure database
    (passwords are handled by Supabase, never stored here). The "Preview as"
    bar disappears and each person's real role decides what they can see.

<style>
  :root{
    /* ---- Color scheme (green + blue for words & buttons; soft green background) ---- */
    --green:#007600;      /* headings, brand, primary buttons */
    --green-dk:#005800;
    --blue:#2083C4;       /* links, secondary accents & buttons */
    --blue-dk:#186098;
    --bg:#D5E3DA;         /* page background */
    --card:#ffffff;       /* content surfaces */
    --ink:#20302a;        /* body text (kept dark for readability) */
    --muted:#5f7168;      /* secondary / placeholder text */
    --line:#c4d6cb;       /* borders */
    --sun:#F4C430;        /* decorative sun (not a "word/button", so a warm color is fine) */
    --maxw:1140px;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;overflow-x:hidden;
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;line-height:1.1;margin:0;color:var(--green);}
  p{margin:0 0 1rem;}
  a{color:var(--blue);}
  img{max-width:100%;display:block;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}

  /* focus ring for keyboard users (accessibility — keep) */
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{
    outline:3px solid var(--blue);outline-offset:2px;border-radius:6px;
  }
  .skip{position:absolute;left:16px;top:-60px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;z-index:200;transition:top .2s;}
  .skip:focus{top:70px;}

  /* ---------- buttons ---------- */
  .btn{display:inline-block;font-family:inherit;font-weight:600;font-size:.98rem;padding:12px 24px;border-radius:100px;text-decoration:none;cursor:pointer;border:2px solid transparent;transition:transform .15s,background .2s,color .2s,border-color .2s;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-dk);transform:translateY(-2px);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{background:var(--blue-dk);transform:translateY(-2px);}
  .btn-ghost{background:transparent;border-color:var(--blue);color:var(--blue);}
  .btn-ghost:hover{background:var(--blue);color:#fff;transform:translateY(-2px);}
  .btn-sm{padding:8px 16px;font-size:.9rem;}

  /* ---------- prototype "preview as" bar (developer tool, not real chrome) ---------- */
  .proto{background:#20302a;color:#e7efe9;font-size:.86rem;}
  .proto .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:9px 24px;}
  .proto b{color:var(--sun);}
  .proto .spacer{flex:1;}
  .proto .pv{display:flex;gap:6px;flex-wrap:wrap;}
  .proto .pv button{background:transparent;border:1px solid #4a5d54;color:#cfe;border-radius:100px;padding:5px 12px;font-size:.82rem;cursor:pointer;font-family:inherit;}
  .proto .pv button.active{background:var(--sun);color:#20302a;border-color:var(--sun);font-weight:600;}

  /* ---------- top navigation ---------- */
  .topbar{background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:14px 0;}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:1.2rem;color:var(--green);text-decoration:none;letter-spacing:-.01em;white-space:nowrap;}
  .brand .sw{color:var(--blue);font-style:italic;}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;flex:1;}
  .tabs button{background:transparent;border:none;font-family:inherit;font-size:.95rem;font-weight:500;color:var(--ink);cursor:pointer;padding:8px 12px;border-radius:8px;border-bottom:2px solid transparent;}
  .tabs button:hover{color:var(--green);background:rgba(0,118,0,.06);}
  .tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
  .tabs button.admin{color:var(--blue);}
  .tabs button.admin.active{color:var(--blue);border-bottom-color:var(--blue);}
  .acct{display:flex;gap:8px;align-items:center;white-space:nowrap;}
  .acct .who{font-size:.9rem;color:var(--muted);}
  .acct .who b{color:var(--green);}

  /* ---------- generic page bits ---------- */
  .view{padding:56px 0 88px;}
  .js-anim .view{animation:fade .5s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .eyebrow{font-size:.76rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--blue);margin-bottom:12px;}
  .page-title{font-size:clamp(2rem,4.5vw,2.9rem);margin-bottom:10px;}
  .page-intro{font-size:1.1rem;color:var(--ink);max-width:65ch;margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:0 8px 22px rgba(20,48,42,.06);}
  .grid{display:grid;gap:22px;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}

  /* placeholder look — anything not built yet */
  .ph{border:2px dashed var(--line);border-radius:12px;color:var(--muted);background:rgba(255,255,255,.5);padding:18px;text-align:center;font-size:.95rem;}
  .ph-box{aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .muted{color:var(--muted);}
  .pill{display:inline-block;background:rgba(32,131,196,.12);color:var(--blue-dk);border-radius:100px;padding:3px 12px;font-size:.78rem;font-weight:600;}
  .lock-note{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted);margin-left:8px;}

  /* info tooltip (ⓘ) */
  .info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:.8rem;font-style:italic;font-weight:700;cursor:help;margin-left:2px;}
  .info .tip{visibility:hidden;opacity:0;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:#20302a;color:#eef;padding:10px 12px;border-radius:8px;font-size:.82rem;font-weight:400;font-style:normal;width:230px;line-height:1.4;z-index:20;transition:opacity .15s;}
  .info .tip a{color:var(--sun);}
  .info:hover .tip,.info:focus .tip{visibility:visible;opacity:1;}

  /* ---------- hero (home) ---------- */
  .hero{position:relative;text-align:center;padding:40px 0 150px;overflow:hidden;}
  .hero .sun{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:0;will-change:transform;}
  .hero .scene{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:auto;z-index:1;}
  .hero .inner{position:relative;z-index:2;}
  .wordmark{font-size:clamp(2.6rem,9vw,6rem);font-weight:900;letter-spacing:-.03em;color:var(--green);margin:14px 0;}
  .wordmark .sw{color:var(--blue);font-style:italic;font-weight:600;}
  .tagline{font-size:clamp(1.05rem,2.2vw,1.4rem);color:var(--ink);max-width:620px;margin:0 auto 30px;}
  .cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

  /* team cards */
  .team-photo{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.78rem;text-align:center;}
  .team-card{text-align:center;}
  .team-card h3{color:var(--green);font-size:1.15rem;margin-bottom:4px;}

  /* discord block */
  .discord{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px;text-align:center;box-shadow:0 8px 22px rgba(20,48,42,.06);}
  .discord h2{font-size:1.7rem;margin-bottom:8px;}

  /* newsletter */
  .featured{border-left:5px solid var(--green);}
  .reactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
  .reactions button{background:rgba(0,118,0,.07);border:1px solid var(--line);border-radius:100px;padding:6px 14px;font-size:.9rem;cursor:pointer;font-family:inherit;color:var(--ink);}
  .reactions button:hover{background:rgba(0,118,0,.14);}
  .nl-list a{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--card);text-decoration:none;color:var(--ink);margin-bottom:10px;}
  .nl-list a:hover{border-color:var(--blue);}
  .nl-list .pdf{font-size:.78rem;color:var(--blue);font-weight:600;}
  .composer input,.composer textarea{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:#fff;color:var(--ink);}
  .composer .tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* chapters */
  .search{width:100%;font-family:inherit;font-size:1rem;padding:13px 16px;border:1px solid var(--line);border-radius:100px;margin-bottom:20px;background:#fff;}
  details.cont{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  details.cont summary{cursor:pointer;padding:15px 18px;font-weight:600;color:var(--green);list-style:none;display:flex;justify-content:space-between;}
  details.cont summary::after{content:"＋";color:var(--blue);}
  details.cont[open] summary::after{content:"–";}
  details.cont .body{padding:0 18px 16px;}

  /* access-denied card */
  .denied{text-align:center;max-width:520px;margin:40px auto;}
  .denied .big{font-size:2.4rem;margin-bottom:10px;}

  /* admin settings */
  .table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .table th,.table td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:.92rem;vertical-align:middle;}
  .table th{background:rgba(0,118,0,.06);color:var(--green);font-family:"Fraunces",serif;font-weight:600;}
  .table tr:last-child td{border-bottom:none;}
  .table td.center,.table th.center{text-align:center;}
  .switch{position:relative;display:inline-block;width:40px;height:22px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:#c4d6cb;border-radius:22px;transition:.2s;cursor:pointer;}
  .slider::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--green);}
  .switch input:checked + .slider::before{transform:translateX(18px);}
  .switch input:disabled + .slider{opacity:.55;cursor:not-allowed;}
  select.role-sel{font-family:inherit;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);}

  /* ---------- modal / popup ---------- */
  .modal{position:fixed;inset:0;background:rgba(20,48,42,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:300;}
  .modal.open{display:flex;}
  .modal-card{background:#fff;border-radius:18px;padding:30px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:pop .2s ease;}
  @keyframes pop{from{transform:scale(.94);opacity:0;}to{transform:none;opacity:1;}}
  .modal-card h3{font-size:1.5rem;margin-bottom:10px;}
  .modal-card .x{float:right;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;}
  .modal-card label{display:block;font-size:.85rem;font-weight:600;color:var(--green);margin:12px 0 5px;}
  .modal-card input{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  .modal-note{background:rgba(32,131,196,.1);border:1px solid rgba(32,131,196,.3);color:var(--blue-dk);border-radius:10px;padding:11px 13px;font-size:.84rem;margin:14px 0;}
  .err{color:#b3261e;font-size:.84rem;margin:6px 0 0;min-height:1em;}

  /* toast */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#20302a;color:#eef;padding:12px 20px;border-radius:100px;font-size:.9rem;opacity:0;transition:.3s;z-index:400;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* footer */
  footer{background:var(--green);color:#dfeede;padding:44px 0 34px;text-align:center;font-size:.9rem;}
  footer .fm{font-family:"Fraunces",serif;color:#fff;font-size:1.25rem;margin-bottom:8px;}
  footer .fm .sw{color:var(--sun);font-style:italic;}
  footer a{color:#fff;}

  /* responsive */
  @media (max-width:860px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:1fr;}.g2{grid-template-columns:1fr;}}
  @media (max-width:560px){.view{padding:40px 0 64px;}.tabs{gap:0;}.tabs button{padding:7px 8px;font-size:.86rem;}}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;}*{transition:none!important;animation:none!important;}}
</style>
</head>

<script>
/* ==========================================================================
   0) SUPABASE CONFIG  ← paste your two keys here to switch on real accounts
   --------------------------------------------------------------------------
   Get these from your Supabase project: Project Settings → API.
   Leave them as "" and the site runs in local PREVIEW mode (fake accounts).
   Fill them in and Sign Up / Log In become real and secure.
   (The anon/public key is SAFE to put in the browser — that's what it's for.
    Your data is protected by the rules in supabase-setup.sql, not by hiding
    this key. NEVER paste the "service_role" key here.)
   ========================================================================== */
const SUPABASE_URL      = "https://najuadikmuiojsmnylya.supabase.co";   // base project URL only — NO "/rest/v1" (supabase-js adds it)
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hanVhZGlrbXVpb2pzbW55bHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjAxNzUsImV4cCI6MjA5ODgzNjE3NX0.Y-ji-1eVcF8LHf9skBJhO8THzlALFSJ21h8TD6s0CQA";   // the long "anon public" key

let sb = null, BACKEND = false;
if (SUPABASE_URL && SUPABASE_ANON_KEY && typeof supabase !== 'undefined' && supabase.createClient) {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  BACKEND = true;   // real accounts are ON
}

/* ==========================================================================
   1) STATE  (roles/permissions live here; `session` is the logged-in person)
   ========================================================================== */

// Every permission the site knows about, with a human label for the toggles.
const CAPS = [
  {id:'view_chapters',   label:'View the Chapters page'},
  {id:'view_gallery',    label:'View the Gallery page'},
  {id:'view_calendar',   label:'View the Calendar page'},
  {id:'newsletter_post', label:'Post & edit newsletters'},
  {id:'programs_update', label:'Update the Programs page'},
  {id:'gallery_upload',  label:'Upload photos to the Gallery'},
  {id:'calendar_edit',   label:'Edit Calendar & post meeting links'},
  {id:'chapters_add',    label:'Add / approve chapters'},
  {id:'admin_settings',  label:'Open Admin Settings & manage roles'},
];
const allCaps = (v)=>Object.fromEntries(CAPS.map(c=>[c.id,v]));

// Default roles. Owner is locked (always all permissions). Defaults match your table.
let roles = {
  owner:     {name:'Owner',     locked:true,  caps:allCaps(true)},
  admin:     {name:'Admin',     caps:allCaps(true)},
  moderator: {name:'Moderator', caps:{...allCaps(false), newsletter_post:true, programs_update:true}},
  member:    {name:'Member',    caps:allCaps(false)},   // a signed-in person with no special powers
};

// Mock people for the Admin Settings "check profiles" table (placeholders).
let people = [
  {id:1, username:'(you)',      email:'owner@earthsweetearth.org', roleId:'owner'},
  {id:2, username:'Add member', email:'—', roleId:'member'},
  {id:3, username:'Add member', email:'—', roleId:'member'},
];

// Newsletter posts (1 featured + 2 list placeholders). "pdf:true" = shown as a link to a PDF.
let newsletters = [
  {id:1, featured:true, title:'Featured news', body:'Add featured newsletter', reactions:{heart:0,support:0,thank:0,celebrate:0}},
  {id:2, featured:false, title:'Newsletter — add date', pdf:true},
  {id:3, featured:false, title:'Newsletter — add date', pdf:true},
];

// The current "logged in" person for the prototype. null = Public (logged out).
let session = null;   // e.g. {roleId:'member', username:'...', email:'...'}

/* ==========================================================================
   2) PERMISSION HELPERS
   ========================================================================== */
const isLoggedIn = ()=> session !== null;
const myRole     = ()=> session ? roles[session.roleId] : null;
const can        = (cap)=> isLoggedIn() && !!myRole().caps[cap];

// Which pages each visitor can open. Home/Newsletter/Programs/Contact are public.
function canView(route){
  if(route==='chapters') return can('view_chapters');
  if(route==='gallery')  return can('view_gallery');
  if(route==='calendar') return can('view_calendar');
  if(route==='admin')    return can('admin_settings');
  return true;
}

/* ==========================================================================
   3) ROUTER  (top tabs change the page via the URL #hash — no scrolling)
   ========================================================================== */
const ROUTES = ['home','newsletter','programs','chapters','gallery','contact','calendar','admin'];
const TAB_LABELS = {home:'Home',newsletter:'Newsletter',programs:'Programs',chapters:'Chapters',gallery:'Gallery',contact:'Contact',calendar:'Calendar',admin:'Admin Settings'};
const route = ()=> (location.hash.replace('#/','') || 'home');
const go = (r)=>{ location.hash = '#/'+r; };
window.addEventListener('hashchange', render);

/* ==========================================================================
   4) SMALL UI HELPERS (modal, toast)
   ========================================================================== */
const modal = document.getElementById('modal');
function openModal(html){ modal.innerHTML = '<div class="modal-card">'+html+'</div>'; modal.classList.add('open'); }
function closeModal(){ modal.classList.remove('open'); modal.innerHTML=''; }
modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });
function popup(title,msg){ openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>'+title+'</h3><p>'+msg+'</p><button class="btn btn-primary" onclick="closeModal()">Got it</button>'); }
const comingSoon = ()=> popup('Under construction','Coming soon!');
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

/* ==========================================================================
   5) LOGIN / SIGN UP — real via Supabase when keys are set, else local preview
   ========================================================================== */
function noteHtml(){
  return BACKEND ? '' :
    '<div class="modal-note">Preview mode: this doesn\'t make a real account yet. Add your Supabase keys (top of the code) to turn on real, secure accounts. You can change these details later.</div>';
}
function openSignup(){
  openModal(
    '<button class="x" onclick="closeModal()" aria-label="Close">×</button>'+
    '<h3>Sign up</h3>'+ noteHtml() +
    '<label for="su-email">Email</label><input id="su-email" type="email" placeholder="you@example.com" autocomplete="email">'+
    '<label for="su-user">Username</label><input id="su-user" type="text" placeholder="Pick a username">'+
    '<label for="su-pass">Password</label><input id="su-pass" type="password" placeholder="Create a password">'+
    '<p class="err" id="su-err"></p>'+
    '<button class="btn btn-primary" id="su-btn" style="margin-top:6px;width:100%" onclick="doSignup()">Create account</button>'
  );
}
async function doSignup(){
  const email=document.getElementById('su-email').value.trim();
  const user=document.getElementById('su-user').value.trim();
  const pass=document.getElementById('su-pass').value;
  const err=document.getElementById('su-err');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ err.textContent='Please enter a valid email.'; return; }
  if(!user){ err.textContent='Please pick a username.'; return; }
  if(pass.length<6){ err.textContent='Password should be at least 6 characters.'; return; }

  if(BACKEND){
    const btn=document.getElementById('su-btn'); btn.disabled=true; btn.textContent='Creating…'; err.textContent='';
    const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ username:user } } });
    if(error){ btn.disabled=false; btn.textContent='Create account'; err.textContent=error.message; return; }
    if(!data.session){ closeModal(); popup('Almost there!','Check your email to confirm your account, then log in.'); return; }
    await loadSession(); closeModal(); render(); toast('Welcome, '+user+'!');
  } else {
    session = {roleId:'member', username:user, email:email};   // preview: new users start as "Member"
    closeModal(); render(); toast('Signed up (preview) — welcome, '+user+'!');
  }
}
function openLogin(){
  openModal(
    '<button class="x" onclick="closeModal()" aria-label="Close">×</button>'+
    '<h3>Log in</h3>'+ noteHtml() +
    '<label for="li-email">Email</label><input id="li-email" type="email" placeholder="you@example.com" autocomplete="email">'+
    '<label for="li-pass">Password</label><input id="li-pass" type="password" placeholder="Your password">'+
    '<p class="err" id="li-err"></p>'+
    '<button class="btn btn-primary" id="li-btn" style="margin-top:6px;width:100%" onclick="doLogin()">Log in</button>'
  );
}
async function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  const err=document.getElementById('li-err');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ err.textContent='Please enter a valid email.'; return; }

  if(BACKEND){
    const btn=document.getElementById('li-btn'); btn.disabled=true; btn.textContent='Logging in…'; err.textContent='';
    const { error } = await sb.auth.signInWithPassword({ email, password:pass });
    if(error){ btn.disabled=false; btn.textContent='Log in'; err.textContent=error.message; return; }
    await loadSession(); closeModal(); render(); toast('Logged in');
  } else {
    session = {roleId:'member', username:email.split('@')[0], email:email};
    closeModal(); render(); toast('Logged in (preview)');
  }
}
async function logout(){ if(BACKEND){ await sb.auth.signOut(); } session=null; go('home'); render(); toast('Logged out'); }

// Read the logged-in Supabase user + their role from the "profiles" table.
async function loadSession(){
  if(!BACKEND){ return; }
  const { data:{ user } } = await sb.auth.getUser();
  if(!user){ session=null; return; }
  let role='member', username=user.email.split('@')[0];
  const { data:profile } = await sb.from('profiles').select('username, role').eq('id', user.id).single();
  if(profile){ role = profile.role || 'member'; username = profile.username || username; }
  session = { roleId:role, username:username, email:user.email };
}

function openProfile(){
  openModal(
    '<button class="x" onclick="closeModal()" aria-label="Close">×</button>'+
    '<h3>Your profile</h3>'+ noteHtml() +
    '<label>Username</label><input id="pf-user" type="text" value="'+(session?session.username:'')+'">'+
    '<label>Email</label><input type="email" value="'+(session?session.email:'')+'" disabled>'+
    '<label>New password</label><input id="pf-pass" type="password" placeholder="Leave blank to keep current">'+
    '<button class="btn btn-primary" style="margin-top:14px;width:100%" onclick="saveProfile()">Save changes</button>'
  );
}
async function saveProfile(){
  const user=document.getElementById('pf-user').value.trim();
  const pass=document.getElementById('pf-pass').value;
  if(BACKEND){
    const { data:{ user:u } } = await sb.auth.getUser();
    if(u){ await sb.from('profiles').update({ username:user }).eq('id', u.id); }
    if(pass){ await sb.auth.updateUser({ password:pass }); }
    await loadSession(); closeModal(); render(); toast('Saved');
  } else {
    if(session){ session.username = user || session.username; }
    closeModal(); render(); toast('Saved (preview)');
  }
}

function renderChrome(){

  const proto = document.getElementById('protoBar');
  if(BACKEND){
    proto.style.display = 'none';
  } else {
    proto.style.display = '';

      '<button class="'+(currentPreviewId()===p.id?'active':'')+'" onclick="setPreview(\''+p.id+'\')">'+p.label+'</button>'

      '<button class="btn btn-ghost btn-sm" onclick="openProfile()">Profile</button>'+

/* ---- Admin Settings: role builder + profiles ---- */
function adminView(){
  // capability matrix (rows = capabilities, columns = roles)
  const roleIds = Object.keys(roles);
  let matrix = '<div style="overflow-x:auto;"><table class="table"><thead><tr><th>Permission</th>'+
    roleIds.map(id=>'<th class="center">'+roles[id].name+(roles[id].locked?' 🔒':'')+'</th>').join('')+'</tr></thead><tbody>';
  CAPS.forEach(cap=>{
    matrix += '<tr><td>'+cap.label+'</td>'+
      roleIds.map(id=>{
        const checked = roles[id].caps[cap.id] ? 'checked' : '';
        const disabled = roles[id].locked ? 'disabled' : '';
        return '<td class="center"><label class="switch"><input type="checkbox" '+checked+' '+disabled+
          ' onchange="toggleCap(\''+id+'\',\''+cap.id+'\',this.checked)"><span class="slider"></span></label></td>';
      }).join('')+'</tr>';
  });
  matrix += '</tbody></table></div>';

  // people table (assign roles / "check specific profiles")
  let ppl = '<div style="overflow-x:auto;"><table class="table"><thead><tr><th>Member</th><th>Email</th><th>Role</th></tr></thead><tbody>'+
    people.map(p=>'<tr><td>'+p.username+'</td><td class="muted">'+p.email+'</td><td>'+
      '<select class="role-sel" onchange="setPersonRole('+p.id+',this.value)">'+
        Object.keys(roles).map(id=>'<option value="'+id+'" '+(p.roleId===id?'selected':'')+'>'+roles[id].name+'</option>').join('')+
      '</select></td></tr>').join('')+
    '</tbody></table></div>';

  return '<div class="wrap view">'+
    '<p class="eyebrow">Admin</p><h1 class="page-title">Admin Settings</h1>'+
    '<p class="page-intro">Create roles, set exactly what each one can do, and manage members. Changes here update the site live in this preview.</p>'+

    '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin:28px 0 12px;">'+
      '<h2 style="font-size:1.5rem;">Roles &amp; permissions</h2>'+
      '<button class="btn btn-primary btn-sm" onclick="openCreateRole()">＋ Create New Role</button>'+
    '</div>'+
    matrix+
    '<p class="muted" style="font-size:.85rem;">Owner always has every permission (that\'s you) and can\'t be changed.</p>'+

    '<h2 style="font-size:1.5rem;margin:34px 0 12px;">Members</h2>'+
    ppl+
    '<p class="muted" style="font-size:.85rem;">Set anyone to Admin, Moderator, or any role you create.</p>'+
  '</div>';
}
function toggleCap(roleId,capId,val){ if(roles[roleId].locked) return; roles[roleId].caps[capId]=val; render(); }
function setPersonRole(id,roleId){ const p=people.find(x=>x.id===id); if(p){ p.roleId=roleId; toast(p.username+' → '+roles[roleId].name); } }
function openCreateRole(){
  openModal(
    '<button class="x" onclick="closeModal()" aria-label="Close">×</button>'+
    '<h3>Create a new role</h3>'+
    '<p class="muted" style="font-size:.9rem;">Give it a name. It starts with no permissions — turn them on with the toggles.</p>'+
    '<label for="nr">Role name</label><input id="nr" type="text" placeholder="e.g. Event Lead">'+
    '<p class="err" id="nr-err"></p>'+
    '<button class="btn btn-primary" style="margin-top:6px;width:100%" onclick="doCreateRole()">Create role</button>'
  );
}
function doCreateRole(){
  const name=document.getElementById('nr').value.trim();
  if(!name){ document.getElementById('nr-err').textContent='Please enter a name.'; return; }
  const key='role_'+Date.now();
  roles[key]={name:name, caps:allCaps(false)};
  closeModal(); render(); toast('Created role: '+name);
}

/* ==========================================================================
   8) MAIN RENDER
   ========================================================================== */
function render(){
  renderChrome();
  let r = route();
  if(!ROUTES.includes(r)){ r='home'; }
  const app = document.getElementById('app');

  if(!canView(r)){
    const msg = (r==='calendar') ? 'The calendar opens up once you\'re signed in and it\'s switched on.'
              : (r==='admin')    ? 'Admin Settings is for Admins and the Owner.'
              : 'This section isn\'t open to everyone yet.';
    app.innerHTML = deniedView(msg);
    window.scrollTo(0,0);
    return;
  }

  const views = {home:homeView,newsletter:newsletterView,programs:programsView,chapters:chaptersView,gallery:galleryView,contact:contactView,calendar:calendarView,admin:adminView};
  app.innerHTML = views[r]();
  window.scrollTo(0,0);

  // (re)attach the dynamic sun on the home page
  attachSun();
}

/* ==========================================================================
   9) DYNAMIC SUN — moves opposite to scrolling (scroll down → sun drifts up)
   ========================================================================== */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function onScroll(){
  const sun=document.getElementById('sun');
  if(!sun || reduceMotion) return;
  sun.style.transform = 'translateX(-50%) translateY('+(-window.scrollY*0.35)+'px)';
}
function attachSun(){ onScroll(); }
window.addEventListener('scroll', ()=>requestAnimationFrame(onScroll), {passive:true});

/* ==========================================================================
   10) START
   ========================================================================== */
async function init(){
  if(BACKEND){
    await loadSession();                                   // restore a logged-in user on page load
    sb.auth.onAuthStateChange(()=>{ loadSession().then(render); });  // keep in sync (login/logout in other tabs, token refresh)
  }
  if(!location.hash) location.hash = '#/home';
  render();
}
init();
</script>
