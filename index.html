<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Sweet Earth</title>
<meta name="description" content="Earth Sweet Earth — a youth-led project growing a greener, kinder planet, one neighborhood at a time.">
<meta property="og:type" content="website">
<meta property="og:title" content="Earth Sweet Earth">
<meta property="og:description" content="A youth-led project growing a greener, kinder planet — one neighborhood at a time.">
<meta property="og:url" content="https://earthsweetearth.org">
<meta property="og:image" content="https://earthsweetearth.org/social.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23007600'/%3E%3Ccircle cx='16' cy='19' r='7' fill='%23F4C430'/%3E%3Cpath d='M17 18c0-6 5-9 9-9 0 6-4 9-9 9z' fill='%23ffffff'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Supabase library — powers real accounts once you add your keys (CONFIG block in the script). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --green:#007600; --green-dk:#005800;
    --blue:#2083C4;  --blue-dk:#186098;
    --bg:#D5E3DA; --card:#ffffff; --ink:#20302a; --muted:#5f7168; --line:#c4d6cb;
    --sun:#F4C430;
    --maxw:1200px;
  }
  [data-theme="dark"]{
    --green:#49b76e; --green-dk:#3aa05e;
    --blue:#5cb3ea;  --blue-dk:#3f97cf;
    --bg:#0e1720; --card:#17222c; --ink:#e7eef3; --muted:#9db0bb; --line:#2a3742;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;overflow-x:hidden;font-family:"Inter",system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;
    transition:background .3s ease,color .3s ease;}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;line-height:1.1;margin:0;color:var(--green);}
  p{margin:0 0 1rem;}
  a{color:var(--blue);}
  img{max-width:100%;display:block;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}

  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:6px;}
  .skip{position:absolute;left:16px;top:-60px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;z-index:200;transition:top .2s;}
  .skip:focus{top:70px;}

  /* buttons */
  .btn{display:inline-block;font-family:inherit;font-weight:600;font-size:.96rem;padding:12px 24px;border-radius:100px;text-decoration:none;cursor:pointer;border:2px solid transparent;transition:transform .15s,background .2s,color .2s,border-color .2s;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-dk);transform:translateY(-2px);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{background:var(--blue-dk);transform:translateY(-2px);}
  .btn-ghost{background:transparent;border-color:var(--blue);color:var(--blue);}
  .btn-ghost:hover{background:var(--blue);color:#fff;transform:translateY(-2px);}
  .btn-sm{padding:8px 16px;font-size:.88rem;}
  .btn-xs{padding:5px 12px;font-size:.8rem;border-width:1.5px;}

  /* preview bar */
  .proto{background:#20302a;color:#e7efe9;font-size:.84rem;}
  [data-theme="dark"] .proto{background:#050d13;}
  .proto .wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 24px;}
  .proto b{color:var(--sun);}
  .proto .spacer{flex:1;}
  .proto .pv{display:flex;gap:6px;flex-wrap:wrap;}
  .proto .pv button{background:transparent;border:1px solid #4a5d54;color:#cfe;border-radius:100px;padding:4px 11px;font-size:.8rem;cursor:pointer;font-family:inherit;}
  .proto .pv button.active{background:var(--sun);color:#20302a;border-color:var(--sun);font-weight:600;}

  /* top nav — sized so all tabs fit on one row at the same height for everyone */
  .topbar{background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;transition:background .3s;}
  .nav{display:flex;align-items:center;gap:14px;padding:12px 0;min-height:64px;}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:1.15rem;color:var(--green);text-decoration:none;white-space:nowrap;}
  .brand .sw{color:var(--blue);font-style:italic;}
  .tabs{display:flex;gap:2px;flex:1;justify-content:center;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tabs button{background:transparent;border:none;font-family:inherit;font-size:.92rem;font-weight:500;color:var(--ink);cursor:pointer;padding:7px 11px;border-radius:8px;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s;}
  .tabs button:hover{color:var(--green);}
  .tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
  .tabs button.admin{color:var(--blue);}
  .tabs button.admin.active{color:var(--blue);border-bottom-color:var(--blue);}
  .acct{display:flex;gap:8px;align-items:center;white-space:nowrap;}
  .iconbtn{background:transparent;border:1.5px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:50%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;}
  .iconbtn:hover{border-color:var(--blue);color:var(--blue);}
  .userbtn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1.5px solid var(--line);border-radius:100px;padding:4px 12px 4px 4px;cursor:pointer;font-family:inherit;color:var(--ink);}
  .userbtn:hover{border-color:var(--blue);}
  .userbtn .uname{font-size:.9rem;font-weight:600;}
  .avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-weight:700;font-size:.85rem;overflow:hidden;}

  /* page bits */
  .view{padding:52px 0 84px;}
  .fade{animation:fade .45s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .eyebrow{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--blue);margin-bottom:12px;}
  .page-title{font-size:clamp(2rem,4.5vw,2.9rem);margin-bottom:10px;}
  .page-intro{font-size:1.1rem;color:var(--ink);max-width:65ch;margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(20,48,42,.06);}
  [data-theme="dark"] .card{box-shadow:0 8px 22px rgba(0,0,0,.3);}
  .grid{display:grid;gap:20px;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  .muted{color:var(--muted);}
  .pill{display:inline-block;background:rgba(32,131,196,.12);color:var(--blue-dk);border-radius:100px;padding:3px 12px;font-size:.76rem;font-weight:600;}
  [data-theme="dark"] .pill{background:rgba(92,179,234,.18);color:var(--blue);}
  .addbtn{background:transparent;border:2px dashed var(--line);color:var(--muted);border-radius:12px;padding:12px 18px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.9rem;width:100%;transition:border-color .2s,color .2s;}
  .addbtn:hover{border-color:var(--green);color:var(--green);}
  .rowbtns{display:flex;gap:6px;margin-top:10px;}
  .sec{margin-bottom:52px;}
  .sechead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px;}

  /* info tooltip (ⓘ) — upright, and opens BELOW so it never gets clipped by the nav */
  .info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:.72rem;font-weight:700;cursor:help;margin-left:6px;font-style:normal;vertical-align:middle;}
  .info .tip{visibility:hidden;opacity:0;position:absolute;top:150%;left:50%;transform:translateX(-50%);background:#20302a;color:#eef;padding:10px 12px;border-radius:8px;font-size:.82rem;font-weight:400;width:240px;line-height:1.4;z-index:60;transition:opacity .15s;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .info .tip::after{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#20302a;}
  .info .tip a{color:var(--sun);}
  .info:hover .tip,.info:focus .tip,.info:focus-within .tip{visibility:visible;opacity:1;}

  /* ---------- HERO (home) ---------- */
  .hero{position:relative;overflow:hidden;min-height:90vh;isolation:isolate;}
  .sky{position:absolute;inset:0;z-index:0;transition:none;}
  .stars,.milky{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity .4s;}
  .hero.night .stars,.hero.night .milky{opacity:1;}
  .milky{background:
      radial-gradient(52% 22% at 60% 46%, rgba(120,150,235,.16), transparent 65%),
      radial-gradient(30% 14% at 64% 30%, rgba(255,236,206,.10), transparent 70%),
      linear-gradient(118deg, transparent 40%,
        rgba(90,120,200,.10) 44%,
        rgba(150,120,190,.14) 47%,
        rgba(210,216,255,.26) 49%,
        rgba(240,232,255,.34) 50.5%,
        rgba(255,238,210,.16) 52%,
        rgba(150,168,225,.16) 55%,
        rgba(90,120,200,.10) 58%,
        transparent 61%);
    filter:blur(4px);mix-blend-mode:screen;}
  .milky::after{content:"";position:absolute;inset:0;opacity:.55;background:
      radial-gradient(1.4px 1.4px at 55% 33%,#fff,transparent),
      radial-gradient(1px 1px at 60% 46%,#d5ddff,transparent),
      radial-gradient(1.4px 1.4px at 64% 37%,#fff,transparent),
      radial-gradient(1px 1px at 58% 54%,#e9edff,transparent),
      radial-gradient(1.2px 1.2px at 67% 27%,#fff,transparent),
      radial-gradient(1px 1px at 52% 60%,#cfd8ff,transparent);}
  .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:blink 4s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:.25;}50%{opacity:1;}}
  .celestial{position:absolute;left:50%;top:50%;z-index:1;transform:translate(-50%,-50%);pointer-events:none;}
  .sun-wrap{position:relative;width:150px;height:150px;}
  .sun-glow{position:absolute;left:50%;top:50%;width:280px;height:280px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(244,196,48,.6),rgba(244,196,48,0) 68%);}
  .sun-disk{position:absolute;left:50%;top:50%;width:120px;height:120px;transform:translate(-50%,-50%);border-radius:50%;background:var(--sun);box-shadow:0 0 46px rgba(244,196,48,.6);}
  .clouds{position:absolute;inset:0;z-index:2;pointer-events:none;}
  .cloud{position:absolute;fill:#ffffff;opacity:.9;}
  .hills-back{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:auto;z-index:2;display:block;}
  .hills-front{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:auto;z-index:4;display:block;}
  .tree{position:absolute;bottom:0;width:190px;height:44vh;max-height:420px;z-index:3;transform-origin:bottom center;pointer-events:none;}
  .tree-left{left:-6px;}
  .tree-right{right:-6px;transform:scaleX(-1);}
  .trunk{fill:#7a5636;transition:fill .3s;}
  [data-theme="dark"] .hero .trunk{fill:#41301f;}
  .bark{fill:none;stroke:#7a5636;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s;}
  [data-theme="dark"] .hero .bark{stroke:#41301f;}
  .foliage{transform-origin:100px 118px;animation:rustle 5s ease-in-out infinite;}
  .foliage.still{animation:none;}
  .leaf{fill:var(--leaf,#3f8f4f);transition:fill .12s;}
  @keyframes rustle{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}}
  .flower .bud{fill:#a9c98d;}
  .flower .petals{fill:#ffc0d8;}
  .flower .fcenter{fill:#ffdd66;}
  .flyleaf{position:absolute;width:16px;height:16px;z-index:4;pointer-events:none;overflow:visible;}
  .hero-content{position:relative;z-index:5;min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px 190px;}
  .wordmark{font-size:clamp(2.6rem,9vw,6rem);font-weight:900;letter-spacing:-.03em;color:var(--green);margin:0 0 20px;}
  [data-theme="dark"] .hero-content .wordmark{color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.5);}
  .wordmark .sw{color:var(--blue);font-style:italic;font-weight:600;}
  [data-theme="dark"] .hero-content .wordmark .sw{color:var(--sun);}
  .tagline{font-size:clamp(1.05rem,2.2vw,1.4rem);color:var(--ink);max-width:600px;margin:0 auto 30px;}
  [data-theme="dark"] .hero-content .tagline{color:#dfe7ee;}
  .cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .shooting{position:absolute;height:2px;width:120px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff);border-radius:2px;z-index:1;pointer-events:none;}

  /* team */
  .team-photo{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;object-fit:cover;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;overflow:hidden;}
  .team-card{text-align:center;}
  .team-card h3{font-size:1.15rem;margin-bottom:4px;}

  /* discord */
  .discord{text-align:center;}
  .discord h2{font-size:1.7rem;margin-bottom:8px;}

  /* newsletter */
  .featured{border-left:5px solid var(--green);}
  .reactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .reactions button{background:transparent;border:1px solid var(--line);border-radius:100px;padding:6px 13px;font-size:.88rem;cursor:pointer;font-family:inherit;color:var(--ink);transition:background .15s,border-color .15s;}
  .reactions button:hover{border-color:var(--green);}
  .reactions button.on{background:var(--green);color:#fff;border-color:var(--green);}
  .postcard{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:10px;}
  .postcard .t{cursor:pointer;font-weight:600;}
  .composer input,.composer textarea,.ed input,.ed textarea,.ed select{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:var(--card);color:var(--ink);}
  .tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* chapters */
  .search{width:100%;font-family:inherit;font-size:1rem;padding:13px 16px;border:1px solid var(--line);border-radius:100px;margin-bottom:20px;background:var(--card);color:var(--ink);}
  details.cont{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  details.cont summary{cursor:pointer;padding:15px 18px;font-weight:600;color:var(--green);list-style:none;display:flex;justify-content:space-between;}
  details.cont summary::-webkit-details-marker{display:none;}
  details.cont summary::after{content:"+";color:var(--blue);}
  details.cont[open] summary::after{content:"\2013";}
  details.cont .body{padding:0 18px 16px;}

  /* calendar */
  .mtg-rect{display:block;background:var(--card);border:2px solid var(--green);border-radius:14px;padding:22px;text-align:center;font-weight:600;color:var(--green);text-decoration:none;margin-bottom:20px;}
  .mtg-rect:hover{background:rgba(0,118,0,.06);}
  .evt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 18px;margin-bottom:12px;cursor:pointer;}
  .evt:hover{border-color:var(--blue);}
  .evt .en{font-weight:600;color:var(--green);}
  .evt .ed2{font-size:.88rem;color:var(--muted);}

  /* gallery */
  .gitem{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--line);}
  .gitem img{width:100%;aspect-ratio:4/3;object-fit:cover;}
  .gitem figcaption{padding:10px 12px;font-size:.9rem;color:var(--muted);}

  /* admin table */
  .tbl{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .tbl th,.tbl td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:.9rem;vertical-align:middle;}
  .tbl th{background:rgba(0,118,0,.06);color:var(--green);font-family:"Fraunces",serif;}
  [data-theme="dark"] .tbl th{background:rgba(73,183,110,.12);}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl td.c,.tbl th.c{text-align:center;}
  .switch{position:relative;display:inline-block;width:40px;height:22px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:22px;transition:.2s;cursor:pointer;}
  .slider::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--green);}
  .switch input:checked + .slider::before{transform:translateX(18px);}
  .switch input:disabled + .slider{opacity:.5;cursor:not-allowed;}
  select.rsel{font-family:inherit;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);}

  .denied{text-align:center;max-width:520px;margin:40px auto;}
  .denied .big{font-size:2.4rem;margin-bottom:10px;}

  /* social links list */
  .links{display:flex;flex-wrap:wrap;gap:10px;}
  .links a,.links .lk{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 16px;text-decoration:none;color:var(--blue);font-weight:600;font-size:.9rem;}
  .links a:hover{border-color:var(--blue);}

  /* modal / toast */
  .modal{position:fixed;inset:0;background:rgba(20,48,42,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:300;}
  .modal.open{display:flex;}
  .modal-card{background:var(--card);color:var(--ink);border-radius:18px;padding:28px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);max-height:88vh;overflow:auto;animation:pop .2s ease;}
  @keyframes pop{from{transform:scale(.95);opacity:0;}to{transform:none;opacity:1;}}
  .modal-card h3{font-size:1.4rem;margin-bottom:10px;}
  .modal-card .x{float:right;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;}
  .modal-card label{display:block;font-size:.84rem;font-weight:600;color:var(--green);margin:12px 0 5px;}
  .modal-card input,.modal-card textarea,.modal-card select{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);}
  .modal-note{background:rgba(32,131,196,.1);border:1px solid rgba(32,131,196,.3);color:var(--blue-dk);border-radius:10px;padding:11px 13px;font-size:.83rem;margin:12px 0;}
  [data-theme="dark"] .modal-note{color:var(--blue);}
  .err{color:#d0463b;font-size:.83rem;margin:6px 0 0;min-height:1em;}
  .img-prev img{width:80px;height:80px;object-fit:cover;border-radius:10px;margin-top:8px;border:1px solid var(--line);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#20302a;color:#eef;padding:12px 20px;border-radius:100px;font-size:.9rem;opacity:0;transition:.3s;z-index:400;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* footer */
  footer{background:var(--green);color:#e4efe6;padding:44px 0 34px;text-align:center;font-size:.9rem;}
  [data-theme="dark"] footer{background:#0a1219;border-top:1px solid var(--line);}
  footer .fm{font-family:"Fraunces",serif;color:#fff;font-size:1.3rem;margin-bottom:14px;}
  footer .fm .sw{color:var(--sun);font-style:italic;}
  footer .fcol{margin:14px 0;}
  footer .flab{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;opacity:.75;margin-bottom:8px;}
  footer .links{justify-content:center;}
  footer .links a,footer .links .lk{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#fff;}
  footer .addbtn{max-width:280px;margin:0 auto;color:#e4efe6;border-color:rgba(255,255,255,.4);}
  footer .cpy{margin-top:20px;opacity:.8;}

  @media (max-width:900px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:1fr;}.g2{grid-template-columns:1fr;}}
  @media (max-width:640px){.view{padding:38px 0 60px;}.nav{flex-wrap:wrap;}.tabs{order:3;width:100%;justify-content:flex-start;}}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;}*{transition:none!important;}.foliage,.star{animation:none!important;}}
</style>
</head>
<body>

<a class="skip" href="#/home">Skip to content</a>

<!-- Preview bar — stays available even after Supabase, so you can always view other perspectives -->
<div class="proto" id="protoBar">
  <div class="wrap">
    <span>🔧 <b>Preview</b> — view the site as:</span>
    <span class="pv" id="previewBar"></span>

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return esc(s).replace(/"/g,'&quot;');}

// generic add/edit form built from a field spec
let _ed=null,_edImgs={};
function openEditor(title, fields, values, onSave){
  _ed={fields,onSave}; _edImgs={};
  if(values) fields.filter(f=>f.type==='image').forEach(f=>{ if(values[f.key])_edImgs[f.key]=values[f.key]; });
  const body=fields.map(f=>{
    const v=(values&&values[f.key]!=null)?values[f.key]:'';
    const lab='<label>'+esc(f.label)+'</label>';
    if(f.type==='textarea') return lab+'<textarea id="ed-'+f.key+'" rows="3" placeholder="'+escA(f.placeholder||'')+'">'+esc(v)+'</textarea>';
    if(f.type==='image') return lab+'<input id="ed-'+f.key+'" type="file" accept="image/*"><div class="img-prev" id="edp-'+f.key+'">'+(v?'<img src="'+escA(v)+'">':'')+'</div>';
    const t=f.type==='date'?'date':f.type==='time'?'time':f.type==='url'?'url':'text';
    return lab+'<input id="ed-'+f.key+'" type="'+t+'" value="'+escA(v)+'" placeholder="'+escA(f.placeholder||'')+'">';
  }).join('');
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>'+esc(title)+'</h3><div class="ed">'+body+'</div><p class="err" id="ed-err"></p><button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="submitEditor()">Save</button>');
  fields.filter(f=>f.type==='image').forEach(f=>{
    document.getElementById('ed-'+f.key).addEventListener('change',function(){
      const file=this.files[0]; if(!file) return;
      const rd=new FileReader(); rd.onload=()=>{_edImgs[f.key]=rd.result;document.getElementById('edp-'+f.key).innerHTML='<img src="'+rd.result+'">';}; rd.readAsDataURL(file);
    });
  });
}
function submitEditor(){
  const vals={};
  _ed.fields.forEach(f=>{ vals[f.key]= f.type==='image' ? (_edImgs[f.key]||'') : document.getElementById('ed-'+f.key).value.trim(); });
  const req=_ed.fields[0];
  if(req && req.type!=='image' && !vals[req.key]){ document.getElementById('ed-err').textContent='Please fill in '+req.label+'.'; return; }
  _ed.onSave(vals); closeModal(); render();
}

function noteHtml(){return BACKEND?'':'<div class="modal-note">Preview mode: not a real account yet. Add your Supabase keys to go live. You can change these later.</div>';}
function openSignup(){
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>Sign up</h3>'+noteHtml()+
    '<label>Email</label><input id="su-email" type="email" placeholder="you@example.com">'+
    '<label>Username</label><input id="su-user" type="text" placeholder="Pick a username">'+
    '<label>Password</label><input id="su-pass" type="password" placeholder="Create a password">'+
    '<p class="err" id="su-err"></p><button class="btn btn-primary" id="su-btn" style="width:100%;margin-top:6px" onclick="doSignup()">Create account</button>');
}
async function doSignup(){
  const email=v('su-email'),user=v('su-user'),pass=document.getElementById('su-pass').value,err=document.getElementById('su-err');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Please enter a valid email.';return;}
  if(!user){err.textContent='Please pick a username.';return;}
  if(pass.length<6){err.textContent='Password should be at least 6 characters.';return;}
  if(BACKEND){
    const b=document.getElementById('su-btn');b.disabled=true;b.textContent='Creating…';err.textContent='';
    const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username:user}}});
    if(error){b.disabled=false;b.textContent='Create account';err.textContent=error.message;return;}
    if(!data.session){closeModal();popup('Almost there!','Check your email to confirm your account, then log in.');return;}
    await loadSession();closeModal();render();toast('Welcome, '+user+'!');
  } else { session={roleId:'member',username:user,email,avatar:null};closeModal();render();toast('Signed up (preview) — welcome, '+user+'!'); }
}
function openLogin(){
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>Log in</h3>'+noteHtml()+
    '<label>Email</label><input id="li-email" type="email" placeholder="you@example.com">'+
    '<label>Password</label><input id="li-pass" type="password" placeholder="Your password">'+
    '<p class="err" id="li-err"></p><button class="btn btn-primary" id="li-btn" style="width:100%;margin-top:6px" onclick="doLogin()">Log in</button>');
}
async function doLogin(){
  const email=v('li-email'),pass=document.getElementById('li-pass').value,err=document.getElementById('li-err');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Please enter a valid email.';return;}
  if(BACKEND){
    const b=document.getElementById('li-btn');b.disabled=true;b.textContent='Logging in…';err.textContent='';
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){b.disabled=false;b.textContent='Log in';err.textContent=error.message;return;}
    await loadSession();closeModal();render();toast('Logged in');
  } else { session={roleId:'member',username:email.split('@')[0],email,avatar:null};closeModal();render();toast('Logged in (preview)'); }
}
async function logout(){ if(BACKEND){await sb.auth.signOut();} session=null;go('home');render();toast('Logged out'); }
async function loadSession(){
  if(!BACKEND) return;
  const {data:{user}}=await sb.auth.getUser();
  if(!user){session=null;return;}
  let role='member',username=user.email.split('@')[0];
  const {data:profile}=await sb.from('profiles').select('username, role').eq('id',user.id).single();
  if(profile){role=profile.role||'member';username=profile.username||username;}
  session={roleId:role,username,email:user.email,avatar:(session&&session.avatar)||null};
}
function openProfile(){
  const av=session&&session.avatar?'<img src="'+escA(session.avatar)+'">':'';
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>Your profile</h3>'+noteHtml()+
    '<label>Profile picture</label><input id="pf-av" type="file" accept="image/*"><div class="img-prev" id="pf-avp">'+av+'</div>'+
    '<label>Username</label><input id="pf-user" type="text" value="'+escA(session?session.username:'')+'">'+
    '<label>Email</label><input type="email" value="'+escA(session?session.email:'')+'" disabled>'+
    '<label>New password</label><input id="pf-pass" type="password" placeholder="Leave blank to keep current">'+
    '<button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="saveProfile()">Save changes</button>'+
    '<button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px" onclick="logout()">Log out</button>');
  document.getElementById('pf-av').addEventListener('change',function(){
    const f=this.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{_pfAvatar=rd.result;document.getElementById('pf-avp').innerHTML='<img src="'+rd.result+'">';};rd.readAsDataURL(f);
  });
}
let _pfAvatar=null;
async function saveProfile(){
  const user=v('pf-user'),pass=document.getElementById('pf-pass').value;
  if(session){ session.username=user||session.username; if(_pfAvatar)session.avatar=_pfAvatar; }
  if(BACKEND){
    const {data:{user:u}}=await sb.auth.getUser();
    if(u){await sb.from('profiles').update({username:user}).eq('id',u.id);}
    if(pass){await sb.auth.updateUser({password:pass});}
  }
  _pfAvatar=null;closeModal();render();toast(BACKEND?'Saved':'Saved (preview)');
}

/* ==========================================================================
   9) HERO ANIMATION ENGINE
   Scroll-driven: sun/sky/season (light), moon phase (dark), cloud drift, leaf-fall, tree sway.
   Time-driven (independent of scroll): leaf rustle (CSS), star blink (CSS),
   shooting stars, and occasional leaves breaking off in the wind.
   ========================================================================== */
const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let heroTimers=[];
function stopHero(){ heroTimers.forEach(clearInterval); heroTimers=[]; }
function lerp(a,b,t){return a+(b-a)*t;}
function hex(c){ if(c[0]==='r'){const m=c.match(/\d+/g);return [+m[0],+m[1],+m[2]];} c=c.replace('#','');return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
function mix(a,b,t){const A=hex(a),B=hex(b);return 'rgb('+Math.round(lerp(A[0],B[0],t))+','+Math.round(lerp(A[1],B[1],t))+','+Math.round(lerp(A[2],B[2],t))+')';}

// ---- tree geometry: one leaf shape + one 5-petal flower shape, reused for canopy and falling ----
const LEAF_PATH='M0,-8 C4,-6 5,-1 3,5 C2,7.5 -2,7.5 -3,5 C-5,-1 -4,-6 0,-8 Z';
const FLOWER_PATH=(function(){let d='';for(let k=0;k<5;k++){const a=k*72*Math.PI/180;const R=(x,y)=>[(x*Math.cos(a)-y*Math.sin(a)).toFixed(2),(x*Math.sin(a)+y*Math.cos(a)).toFixed(2)];const p0=R(0,0),c1=R(2.7,-5.4),c2=R(-2.7,-5.4);d+='M'+p0[0]+','+p0[1]+' C'+c1[0]+','+c1[1]+' '+c2[0]+','+c2[1]+' '+p0[0]+','+p0[1]+' ';}return d;})();

// leaves grow in clusters at the branch tips; clusters fill a rounded canopy wider than the trunk
const CLUSTERS=[{x:100,y:56,s:22},{x:74,y:66,s:22},{x:126,y:66,s:22},{x:52,y:90,s:24},{x:148,y:90,s:24},{x:86,y:84,s:20},{x:114,y:84,s:20},{x:66,y:112,s:22},{x:134,y:112,s:22},{x:100,y:104,s:22},{x:38,y:112,s:20},{x:162,y:112,s:20},{x:100,y:128,s:18}];
const LEAF_POS=(function(){const a=[];let k=0;CLUSTERS.forEach(c=>{const N=12;for(let i=0;i<N;i++){const ang=k*2.39996;const rad=c.s*Math.sqrt((i+0.5)/N);const x=c.x+Math.cos(ang)*rad;const y=c.y+Math.sin(ang)*rad*0.9;const d=Math.min(0.34,Math.max(0,(y-45)/95*0.28+(k%5)*0.015));a.push({x:+x.toFixed(1),y:+y.toFixed(1),r:Math.round((k*47)%360),d:+d.toFixed(2)});k++;}});return a;})();
const FLOWER_POS=(function(){const a=[];let k=0;CLUSTERS.forEach(c=>{const N=4;for(let i=0;i<N;i++){const ang=k*2.39996+1.3;const rad=c.s*0.78*Math.sqrt((i+0.6)/N);const x=c.x+Math.cos(ang)*rad;const y=c.y+Math.sin(ang)*rad*0.9;a.push({x:+x.toFixed(1),y:+y.toFixed(1),d:+(((k%7)/7)*0.28).toFixed(2)});k++;}});return a;})();

// sun/moon vertical placement, measured from the real horizon (hills) so it sits right on any screen
let sunStartT=120, sunRise=380, moonY=120;
function measureHero(){
  const hero=document.getElementById('hero'); if(!hero)return;
  const hills=hero.querySelector('.hills-back'); if(!hills)return;
  const H=hero.offsetHeight;
  const horizonY=hills.getBoundingClientRect().top - hero.getBoundingClientRect().top;
  const startCenter=horizonY-20;             // sits low, peeking over the hills (sunrise)
  const endCenter=Math.max(64,H*0.12);       // near the top when fully risen
  sunStartT=startCenter-H/2;
  sunRise=sunStartT-(endCenter-H/2);
  moonY=sunStartT;                           // moon rests exactly where the sun starts
}
// moon runs a touch slower — full phase cycle finishes right as the banner scrolls out of view
function moonP(){ const h=document.getElementById('hero'); if(!h)return 0; return Math.min(Math.max(window.scrollY/Math.max(h.offsetHeight,500),0),1); }

function seasonColor(p){ return p<0.45 ? mix('#3f8f4f','#c9a227',p/0.45) : mix('#c9a227','#c0472b',(p-0.45)/0.55); }
function currentLeafColor(){ return theme==='dark' ? '#2c5d3a' : seasonColor(scrollP()); }

let leavesFalling=false;
function setTreeLeafVar(col){ ['tree-left','tree-right'].forEach(id=>{const t=document.getElementById(id);if(t)t.style.setProperty('--leaf',col);}); }
function setRustle(on){ ['fo-left','fo-right'].forEach(id=>{const g=document.getElementById(id);if(g)g.classList.toggle('still',!on);}); }
function resetLeaves(){ ['tree-left','tree-right'].forEach(id=>{const t=document.getElementById(id);if(!t)return;t.querySelectorAll('.leaf').forEach(l=>{l.setAttribute('transform','translate('+l.dataset.x+','+l.dataset.y+') rotate('+l.dataset.a+')');l.style.fill='';});}); }

// colour/position every leaf. Before winter they share one colour (cheap). In winter each leaf
// detaches and falls ONCE to the ground, browning; once fallen it rests and no longer sways.
function paintLeaves(p,night){
  const fs=0.7;
  const base=night?'#2c5d3a':seasonColor(p);
  const f=(!night && p>fs)?(p-fs)/(1-fs):0;
  if(f<=0){
    setTreeLeafVar(base); setRustle(true);
    if(leavesFalling){ resetLeaves(); leavesFalling=false; }
    return;
  }
  leavesFalling=true; setRustle(false);
  ['tree-left','tree-right'].forEach(id=>{ const t=document.getElementById(id); if(!t)return;
    t.querySelectorAll('.leaf').forEach((leaf,i)=>{
      const bx=+leaf.dataset.x, by=+leaf.dataset.y, ba=+leaf.dataset.a, bd=+leaf.dataset.d;
      const lf=Math.min(1,Math.max(0,(f-bd)/(1-0.34)));               // per-leaf progress, capped at 1
      const dx=Math.sin(i*1.3)*26*lf, dy=(305-by)*lf, rot=ba+lf*170;
      leaf.setAttribute('transform','translate('+(bx+dx).toFixed(1)+','+(by+dy).toFixed(1)+') rotate('+rot.toFixed(0)+')');
      leaf.style.fill=mix(base,'#6e4423',Math.min(1,lf*1.25));         // browns as it lands
    });
  });
}
// buds emerge and open into 5-petal flowers through spring→summer, in front of the leaves
function paintFlowers(bloom){
  ['fl-left','fl-right'].forEach(id=>{ const g=document.getElementById(id); if(!g)return;
    if(bloom<=0.001){ if(g.style.display!=='none') g.style.display='none'; return; }
    g.style.display=''; g.style.opacity=Math.min(1,bloom).toFixed(2);
    Array.prototype.forEach.call(g.children,(fl)=>{
      const open=Math.min(1,Math.max(0,(bloom-0.15-(+fl.dataset.d)*0.5)/0.5));
      const bud=fl.querySelector('.bud'), bloomG=fl.querySelector('.bloom');
      if(bud) bud.setAttribute('transform','scale('+(1-open).toFixed(2)+')');
      if(bloomG) bloomG.setAttribute('transform','scale('+open.toFixed(2)+')');
    });
  });
}

function scrollP(){ const h=document.getElementById('hero'); if(!h)return 0; const dist=Math.max(h.offsetHeight*0.75,500); return Math.min(Math.max(window.scrollY/dist,0),1); }

function initHero(){
  stopHero();
  const hero=document.getElementById('hero'); if(!hero)return;
  const night = theme==='dark';
  hero.classList.toggle('night',night);
  document.getElementById('sunWrap').style.display = night?'none':'';
  document.getElementById('moon').style.display = night?'':'none';
  document.getElementById('clouds').style.display = night?'none':'';
  // build stars once: a scattered field + a denser band along the Milky Way
  const starBox=document.getElementById('stars');
  if(night && !starBox.dataset.built){
    let s='';
    for(let i=0;i<80;i++){ const x=(Math.random()*100).toFixed(1),y=(Math.random()*72).toFixed(1),d=(Math.random()*4).toFixed(2),sz=(Math.random()*1.5+1).toFixed(1); s+='<span class="star" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;animation-delay:'+d+'s"></span>'; }
    for(let i=0;i<40;i++){ const t=Math.random(); const x=(48+t*26+(Math.random()-0.5)*10).toFixed(1),y=(72-t*64+(Math.random()-0.5)*8).toFixed(1),d=(Math.random()*4).toFixed(2),sz=(Math.random()*1.3+0.8).toFixed(1); s+='<span class="star" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;animation-delay:'+d+'s"></span>'; }
    for(let i=0;i<44;i++){ const t=Math.random()*0.55; const x=(48+t*26+(Math.random()-0.5)*13).toFixed(1),y=(72-t*64+(Math.random()-0.5)*7).toFixed(1),d=(Math.random()*4).toFixed(2),sz=(Math.random()*1.2+0.7).toFixed(1); const col=Math.random()<0.28?'#cfe0ff':(Math.random()<0.28?'#fff0d8':'#ffffff'); s+='<span class="star" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;background:'+col+';animation-delay:'+d+'s"></span>'; }
    starBox.innerHTML=s; starBox.dataset.built='1';
  }
  measureHero();
  updateHero();
  if(reduceMotion) return;
  // time-driven extras
  if(night){ heroTimers.push(setInterval(shootingStar, 5400)); }
  heroTimers.push(setInterval(()=>breakLeaf('left'), 5200));
  heroTimers.push(setInterval(()=>breakLeaf('right'), 6800));
}

function updateHero(){
  const hero=document.getElementById('hero'); if(!hero)return;
  const night=theme==='dark', p=scrollP();
  const sky=document.getElementById('sky');
  if(night){
    sky.style.background='linear-gradient(#060a16,#0c1730 66%,#101d38)';
    // moon stays put; cycles phases with a slightly slower progress
    const mp=moonP(), R=52, cx=90; let s,dark;
    if(mp<=0.5){ s=4*R*mp; dark=cx-s; } else { s=4*R*(1-mp); dark=cx+s; }
    const sh=document.getElementById('mshadow'); if(sh) sh.setAttribute('cx',dark.toFixed(1));
    const moon=document.getElementById('moon'); if(moon) moon.style.transform='translateY('+moonY.toFixed(0)+'px)';
    swayTrees(Math.sin(p*Math.PI*5)*1.4);   // gentler sway
    paintFlowers(0);
    paintLeaves(p,true);
  } else {
    const top=mix('#a9d1f2','#2f86d4',p), bot=mix('#f7d9a6','#bfe3f6',p);
    sky.style.background='linear-gradient(to bottom,'+top+' 0%,'+bot+' 78%)';
    const sw=document.getElementById('sunWrap'); if(sw) sw.style.transform='translateY('+(sunStartT-p*sunRise).toFixed(0)+'px)';
    document.querySelectorAll('#clouds .cloud').forEach((c,i)=>{ const dir=i%2?1:-1; c.style.transform='translateX('+(dir*(1-p)*190).toFixed(0)+'px)'; c.style.opacity=(0.28+p*0.62).toFixed(2); });
    const bloom = p<0.12 ? p/0.12 : p<0.4 ? 1 : Math.max(0,1-(p-0.4)/0.16);
    paintFlowers(bloom);
    swayTrees(0);
    paintLeaves(p,false);
  }
}
function swayTrees(deg){ const l=document.getElementById('tree-left'),r=document.getElementById('tree-right'); if(l)l.style.transform='rotate('+deg+'deg)'; if(r)r.style.transform='scaleX(-1) rotate('+(deg)+'deg)'; }

// a leaf breaks off and rides the wind sideways + gently down (not tied to scrolling)
function breakLeaf(side){
  const hero=document.getElementById('hero'); if(!hero)return;
  const tree=document.getElementById('tree-'+side); if(!tree)return;
  const rect=tree.getBoundingClientRect(), hrect=hero.getBoundingClientRect();
  const startX=rect.left-hrect.left + rect.width*(side==='left'?0.6:0.4);
  const startY=rect.top-hrect.top + rect.height*0.35;
  const leaf=document.createElementNS('http://www.w3.org/2000/svg','svg'); leaf.setAttribute('class','flyleaf'); leaf.setAttribute('viewBox','-9 -9 18 18');
  leaf.innerHTML='<path d="'+LEAF_PATH+'" fill="'+currentLeafColor()+'"/>';
  leaf.style.left=startX+'px'; leaf.style.top=startY+'px';
  hero.appendChild(leaf);
  const dir = side==='left'?1:-1;              // left tree -> fly right; right tree -> fly left
  const dx = dir*(120+Math.random()*120);
  const dy = 160+Math.random()*120;
  leaf.animate([
    {transform:'translate(0,0) rotate(0deg)',opacity:1},
    {transform:'translate('+(dx*0.5)+'px,'+(dy*0.35)+'px) rotate(140deg)',opacity:1,offset:0.5},
    {transform:'translate('+dx+'px,'+dy+'px) rotate(320deg)',opacity:0}
  ],{duration:4200,easing:'ease-in'}).onfinish=()=>leaf.remove();
}
function shootingStar(){
  const hero=document.getElementById('hero'); if(!hero||theme!=='dark')return;
  const s=document.createElement('div'); s.className='shooting';
  const y=Math.random()*hero.offsetHeight*0.4, x=Math.random()*hero.offsetWidth*0.5;
  s.style.top=y+'px'; s.style.left=x+'px'; s.style.transform='rotate(20deg)';
  hero.appendChild(s);
  s.animate([{transform:'translate(0,0) rotate(20deg)',opacity:0},{opacity:1,offset:0.2},{transform:'translate(260px,120px) rotate(20deg)',opacity:0}],{duration:900,easing:'ease-out'}).onfinish=()=>s.remove();
}
window.addEventListener('scroll',()=>{ if(document.getElementById('hero')) requestAnimationFrame(updateHero); },{passive:true});
window.addEventListener('resize',()=>{ if(document.getElementById('hero')){ measureHero(); updateHero(); } });

async function init(){
  document.body.setAttribute('data-theme',theme);
  if(BACKEND){ await loadSession(); sb.auth.onAuthStateChange(()=>{loadSession().then(render);}); }
  if(!location.hash) location.hash='#/home';
  render();
}
init();
