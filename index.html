<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Sweet Earth</title>
<meta name="description" content="Earth Sweet Earth — a youth-led project growing a greener, kinder planet, one neighborhood at a time.">
<meta property="og:type" content="website">
<meta property="og:title" content="Earth Sweet Earth">
<meta property="og:description" content="We have everything we need to pick up the pen without the will to pick up our hands. Let's write our own ending.">
<meta property="og:url" content="https://earthsweetearth.org">
<meta property="og:image" content="https://earthsweetearth.org/social.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23007600'/%3E%3Ccircle cx='16' cy='19' r='7' fill='%23F4C430'/%3E%3Cpath d='M17 18c0-6 5-9 9-9 0 6-4 9-9 9z' fill='%23ffffff'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Supabase library — powers real accounts once you add your keys (CONFIG block in the script). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --green:#007600; --green-dk:#005800;
    --blue:#2083C4;  --blue-dk:#186098;
    --bg:#D5E3DA; --card:#ffffff; --ink:#20302a; --muted:#5f7168; --line:#c4d6cb;
    --sun:#F4C430;
    --maxw:1200px;
  }
  [data-theme="dark"]{
    --green:#49b76e; --green-dk:#3aa05e;
    --blue:#5cb3ea;  --blue-dk:#3f97cf;
    --bg:#0e1720; --card:#17222c; --ink:#e7eef3; --muted:#9db0bb; --line:#2a3742;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;font-family:"Inter",system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;
    transition:background .3s ease,color .3s ease;}
  #app{flex:1 0 auto;}
  footer{flex-shrink:0;}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;line-height:1.1;margin:0;color:var(--green);}
  p{margin:0 0 1rem;}
  a{color:var(--blue);}
  img{max-width:100%;display:block;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}

  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:6px;}
  .skip{position:absolute;left:16px;top:-60px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;z-index:200;transition:top .2s;}
  .skip:focus{top:70px;}

  /* buttons */
  .btn{display:inline-block;font-family:inherit;font-weight:600;font-size:.96rem;padding:12px 24px;border-radius:100px;text-decoration:none;cursor:pointer;border:2px solid transparent;transition:transform .15s,background .2s,color .2s,border-color .2s;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-dk);transform:translateY(-2px);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{background:var(--blue-dk);transform:translateY(-2px);}
  .btn-ghost{background:transparent;border-color:var(--blue);color:var(--blue);}
  .btn-ghost:hover{background:var(--blue);color:#fff;transform:translateY(-2px);}
  .btn-sm{padding:8px 16px;font-size:.88rem;}
  .btn-xs{padding:5px 12px;font-size:.8rem;border-width:1.5px;}
  .btn-danger{background:#c0392b;color:#fff;}
  .btn-danger:hover{background:#a5301f;transform:translateY(-2px);}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  .mrow{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
  .mrow .search{flex:1;}

  /* preview bar */
  .proto{background:#20302a;color:#e7efe9;font-size:.84rem;}
  [data-theme="dark"] .proto{background:#050d13;}
  .proto .wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 24px;}
  .proto b{color:var(--sun);}
  .proto .spacer{flex:1;}
  .proto .pv{display:flex;gap:6px;flex-wrap:wrap;}
  .proto .pv button{background:transparent;border:1px solid #4a5d54;color:#cfe;border-radius:100px;padding:4px 11px;font-size:.8rem;cursor:pointer;font-family:inherit;}
  .proto .pv button.active{background:var(--sun);color:#20302a;border-color:var(--sun);font-weight:600;}

  /* top nav — sized so all tabs fit on one row at the same height for everyone */
  .topbar{background:#F4D462;border-bottom:1px solid rgba(0,0,0,.14);position:sticky;top:0;z-index:50;transition:background .3s;}
  [data-theme="dark"] .topbar{background:#2e2712;border-bottom:1px solid #1c1709;}
  [data-theme="dark"] .topbar .tabs button{color:#eadfce;}
  .topbar .brand{color:#0a4d0a;}
  .topbar .tabs button{color:#33261a;}
  [data-theme="dark"] .topbar .brand{color:var(--green);}
  .nav{display:flex;align-items:center;gap:14px;padding:12px 0;min-height:64px;}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:1.15rem;color:var(--green);text-decoration:none;white-space:nowrap;}
  .brand .sw{color:var(--blue);font-style:italic;}
  .tabs{display:flex;gap:2px;flex:1;justify-content:center;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tabs button{background:transparent;border:none;font-family:inherit;font-size:.92rem;font-weight:500;color:var(--ink);cursor:pointer;padding:7px 11px;border-radius:8px;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s;}
  .tabs button:hover{color:var(--green);}
  .tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
  .tabs button.admin{color:var(--blue);}
  .tabs button.admin.active{color:var(--blue);border-bottom-color:var(--blue);}
  .acct{display:flex;gap:8px;align-items:center;white-space:nowrap;}
  .iconbtn{background:var(--blue);border:1.5px solid var(--blue);color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;}
  .iconbtn:hover{background:var(--blue-dk);border-color:var(--blue-dk);color:#fff;}
  .userbtn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1.5px solid var(--line);border-radius:100px;padding:4px 12px 4px 4px;cursor:pointer;font-family:inherit;color:var(--ink);}
  .userbtn:hover{border-color:var(--blue);}
  .userbtn .uname{font-size:.9rem;font-weight:600;}
  .avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-weight:700;font-size:.85rem;overflow:hidden;}

  /* page bits */
  .view{padding:52px 0 84px;}
  .fade{animation:fade .45s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .eyebrow{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--blue);margin-bottom:12px;}
  .page-title{font-size:clamp(2rem,4.5vw,2.9rem);margin-bottom:10px;}
  .page-intro{font-size:1.1rem;color:var(--ink);max-width:65ch;margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(20,48,42,.06);}
  [data-theme="dark"] .card{box-shadow:0 8px 22px rgba(0,0,0,.3);}
  .grid{display:grid;gap:20px;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  .muted{color:var(--muted);}
  .pill{display:inline-block;background:rgba(32,131,196,.12);color:var(--blue-dk);border-radius:100px;padding:3px 12px;font-size:.76rem;font-weight:600;}
  [data-theme="dark"] .pill{background:rgba(92,179,234,.18);color:var(--blue);}
  .addbtn{background:transparent;border:2px dashed var(--line);color:var(--muted);border-radius:12px;padding:12px 18px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.9rem;width:100%;transition:border-color .2s,color .2s;}
  .addbtn:hover{border-color:var(--green);color:var(--green);}
  .rowbtns{display:flex;gap:6px;margin-top:10px;}
  .sec{margin-bottom:52px;}
  .home-stack{display:flex;flex-direction:column;gap:52px;padding:52px 0 8px;}
  .sechead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px;}

  /* info tooltip (ⓘ) — upright, and opens BELOW so it never gets clipped by the nav */
  .info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:.72rem;font-weight:700;cursor:help;margin-left:6px;font-style:normal;vertical-align:middle;}
  .info .tip{visibility:hidden;opacity:0;position:absolute;top:150%;left:50%;transform:translateX(-50%);background:#20302a;color:#eef;padding:10px 12px;border-radius:8px;font-size:.82rem;font-weight:400;width:240px;line-height:1.4;z-index:60;transition:opacity .15s;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .info .tip::after{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#20302a;}
  .info .tip a{color:var(--sun);}
  .info:hover .tip,.info:focus .tip,.info:focus-within .tip{visibility:visible;opacity:1;}

  /* ---------- HERO (home) ---------- */
  .hero-scroll{position:relative;height:var(--seasons,240vh);}
  .hero{position:sticky;top:var(--nav-h, 64px);height:calc(100vh - var(--nav-h, 64px));overflow:hidden;isolation:isolate;}
  .sky{position:absolute;inset:0;z-index:0;transition:none;}
  .stars,.milky{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity .4s;}
  .constellations{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:0;transition:opacity .4s;}
  .hero.night .stars,.hero.night .milky,.hero.night .constellations{opacity:1;}
  .milky{background:
      radial-gradient(40% 26% at 58% 32%, rgba(255,244,222,.09), transparent 72%),
      radial-gradient(26% 20% at 50% 46%, rgba(150,110,70,.15), transparent 72%),
      radial-gradient(24% 18% at 64% 24%, rgba(170,120,72,.14), transparent 74%),
      radial-gradient(20% 15% at 54% 40%, rgba(224,180,120,.14), transparent 72%),
      radial-gradient(18% 14% at 68% 18%, rgba(234,194,132,.13), transparent 74%),
      radial-gradient(26% 22% at 47% 50%, rgba(88,120,220,.13), transparent 74%),
      radial-gradient(22% 18% at 66% 22%, rgba(120,90,210,.12), transparent 74%),
      radial-gradient(20% 16% at 60% 30%, rgba(70,100,200,.10), transparent 76%),
      radial-gradient(16% 14% at 52% 44%, rgba(140,82,190,.10), transparent 76%);
    filter:blur(8px);mix-blend-mode:screen;}
  .milky::after{content:"";position:absolute;inset:0;opacity:.55;background:
      radial-gradient(1.3px 1.3px at 55% 33%,#fff,transparent),radial-gradient(1px 1px at 60% 26%,#d5ddff,transparent),
      radial-gradient(1.3px 1.3px at 64% 24%,#fff,transparent),radial-gradient(1px 1px at 58% 34%,#e9edff,transparent),
      radial-gradient(1px 1px at 52% 40%,#cfd8ff,transparent),radial-gradient(1.3px 1.3px at 49% 48%,#fff,transparent),
      radial-gradient(1px 1px at 46% 52%,#ffe9cf,transparent),radial-gradient(1.2px 1.2px at 57% 30%,#fff5e6,transparent),
      radial-gradient(1px 1px at 61% 22%,#ffe9cf,transparent),radial-gradient(1.1px 1.1px at 66% 20%,#fff,transparent),
      radial-gradient(1px 1px at 50% 44%,#ffe0c0,transparent),radial-gradient(1.2px 1.2px at 70% 16%,#fff,transparent),
      radial-gradient(1px 1px at 48% 46%,#f0e6ff,transparent),radial-gradient(1.1px 1.1px at 63% 28%,#fff,transparent),
      radial-gradient(1px 1px at 54% 38%,#ffedd6,transparent),radial-gradient(1.2px 1.2px at 72% 14%,#fff,transparent);}
  .star{position:absolute;border-radius:50%;background:#fff;}
  .star.tw{box-shadow:0 0 4px 1px rgba(255,255,255,.9);}
  .cline{fill:none;stroke:#b6cbff;stroke-width:1.4;opacity:0;filter:drop-shadow(0 0 3px rgba(150,185,255,.8)) drop-shadow(0 0 7px rgba(120,160,255,.45));}
  .cstar{fill:#ffffff;opacity:.4;filter:drop-shadow(0 0 3px rgba(200,220,255,.8));}
  .celestial{position:absolute;inset:0;z-index:1;pointer-events:none;}
  .sun-wrap{position:absolute;left:0;top:0;width:150px;height:150px;will-change:transform;}
  .sun-glow{position:absolute;left:50%;top:50%;width:320px;height:320px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(244,196,48,.6),rgba(244,196,48,0) 68%);mix-blend-mode:screen;}
  .sun-disk{position:absolute;left:50%;top:50%;width:120px;height:120px;transform:translate(-50%,-50%);border-radius:50%;background:var(--sun);box-shadow:0 0 46px rgba(244,196,48,.55);}
  .moon{position:absolute;left:50%;top:8%;transform:translateX(-50%);filter:drop-shadow(0 0 18px rgba(200,215,255,.4));}
  .clouds{position:absolute;inset:0;z-index:2;pointer-events:none;}
  .cloud{position:absolute;fill:#ffffff;opacity:.9;}
  .hills-back{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:34vh;z-index:2;display:block;}
  .hills-front{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:23vh;z-index:5;display:block;}
  .ground-shadows{position:absolute;left:0;right:0;bottom:0;width:100%;height:52vh;z-index:2;pointer-events:none;}
  .tshadow{position:absolute;left:0;top:0;width:120px;height:24px;border-radius:50%;background:radial-gradient(closest-side,rgba(8,38,14,.5),rgba(8,38,14,0));z-index:6;pointer-events:none;opacity:0;transform-origin:center;will-change:transform,opacity;}
  .leaf-pile{position:absolute;inset:0;width:100%;height:100%;z-index:6;pointer-events:none;opacity:0;overflow:visible;}
  .tree{position:absolute;bottom:0;width:190px;height:44vh;z-index:3;transform-origin:bottom center;pointer-events:none;}
  .tree-left{left:-6px;}
  .tree-right{right:-6px;transform:scaleX(-1);}
  .trunk{fill:#7a5636;transition:fill .3s;}
  [data-theme="dark"] .hero .trunk{fill:#41301f;}
  .bark{fill:none;stroke:#7a5636;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s;}
  [data-theme="dark"] .hero .bark{stroke:#41301f;}
  .foliage{transform-origin:100px 118px;animation:rustle 5s ease-in-out infinite;}
  .foliage.still{animation:none;}
  .leaf{fill:var(--leaf,#3f8f4f);transition:fill .12s;}
  @keyframes rustle{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}}
  .flower .bud{fill:#a9c98d;}
  .flower .petals{fill:#ffc0d8;}
  .flower .fcenter{fill:#ffdd66;}
  .flyleaf{position:absolute;width:16px;height:16px;z-index:12;pointer-events:none;overflow:visible;}
  .zzz{position:absolute;left:0;top:0;z-index:6;pointer-events:none;}
  .zzz span{position:absolute;font-family:"Fraunces",serif;font-weight:700;color:#eef4ff;text-shadow:0 1px 6px rgba(0,0,0,.4);will-change:transform,opacity;}
  .scroll-hint{margin-top:20px;font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);opacity:.8;animation:hintbob 1.8s ease-in-out infinite;}
  [data-theme="dark"] .hero-content .scroll-hint{color:#bcc7d6;}
  @keyframes hintbob{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(5px);opacity:.9;}}
  .hero-content{position:relative;z-index:7;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px 190px;}
  .wordmark{font-size:clamp(2.6rem,9vw,6rem);font-weight:900;letter-spacing:-.03em;color:var(--green);margin:0 0 20px;}
  [data-theme="dark"] .hero-content .wordmark{color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.5);}
  .wordmark .sw{color:var(--blue);font-style:italic;font-weight:600;}
  [data-theme="dark"] .hero-content .wordmark .sw{color:var(--sun);}
  .tagline{font-size:clamp(1.05rem,2.2vw,1.4rem);color:var(--ink);max-width:600px;margin:0 auto 30px;}
  [data-theme="dark"] .hero-content .tagline{color:#dfe7ee;}
  .cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .shooting{position:absolute;height:2px;width:120px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff);border-radius:2px;z-index:1;pointer-events:none;}
  /* birds: small silhouettes gliding across the top two-thirds (daytime only) */
  .birds{position:absolute;z-index:4;pointer-events:none;}
  .bird{position:absolute;color:#333;}
  [data-theme="dark"] .hero .bird{color:#9aa6b4;}
  .bird svg{display:block;fill:currentColor;}
  /* winter snow: falling flakes; the ground shapes themselves recolour to white */
  .snow{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;}
  .snow span{position:absolute;top:-6%;border-radius:50%;background:#fff;opacity:.9;animation:snowfall linear infinite;}
  @keyframes snowfall{0%{transform:translate(0,-10%);}100%{transform:translate(var(--dx,10px),120vh);}}
  .windgust{position:absolute;z-index:12;pointer-events:none;overflow:visible;}
  .windgust path{fill:none;stroke:#ffffff;stroke-linecap:round;}

  /* team */
  .team-photo{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;object-fit:cover;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;overflow:hidden;}
  .team-card{text-align:center;}
  .team-card h3{font-size:1.15rem;margin-bottom:4px;}

  /* discord */
  .discord{text-align:center;}
  .discord h2{font-size:1.7rem;margin-bottom:8px;}

  /* newsletter */
  .featured{border-left:5px solid var(--green);}
  .reactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .reactions button{background:transparent;border:1px solid var(--line);border-radius:100px;padding:6px 13px;font-size:.88rem;cursor:pointer;font-family:inherit;color:var(--ink);transition:background .15s,border-color .15s;}
  .reactions button:hover{border-color:var(--green);}
  .reactions button.on{background:var(--green);color:#fff;border-color:var(--green);}
  .postcard{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:10px;}
  .postcard .t{cursor:pointer;font-weight:600;}
  .composer input,.composer textarea,.ed input,.ed textarea,.ed select{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:var(--card);color:var(--ink);}
  .tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* chapters */
  .search{width:100%;font-family:inherit;font-size:1rem;padding:13px 16px;border:1px solid var(--line);border-radius:100px;margin-bottom:20px;background:var(--card);color:var(--ink);}
  details.cont{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  details.cont summary{cursor:pointer;padding:15px 18px;font-weight:600;color:var(--green);list-style:none;display:flex;justify-content:space-between;}
  details.cont summary::-webkit-details-marker{display:none;}
  details.cont summary::after{content:"+";color:var(--blue);}
  details.cont[open] summary::after{content:"\2013";}
  details.cont .body{padding:0 18px 16px;}
  .chp-country{padding:8px 0;border-top:1px solid var(--line);}
  .chp-country:first-child{border-top:none;}
  .chp-cn{font-weight:600;margin-bottom:4px;}
  .chp-list{list-style:none;margin:0;padding:0 0 0 4px;}
  .chp-list li{padding:3px 0;color:var(--ink);}
  .ed-select{width:100%;font-family:inherit;font-size:1rem;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);}

  /* calendar */
  .mtg-rect{display:block;background:var(--card);border:2px solid var(--green);border-radius:14px;padding:22px;text-align:center;font-weight:600;color:var(--green);text-decoration:none;margin-bottom:20px;}
  .mtg-rect:hover{background:rgba(0,118,0,.06);}
  .evt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 18px;margin-bottom:12px;cursor:pointer;}
  .evt:hover{border-color:var(--blue);}
  .evt .en{font-weight:600;color:var(--green);}
  .evt .ed2{font-size:.88rem;color:var(--muted);}

  /* gallery */
  .gitem{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--line);}
  .gitem img{width:100%;aspect-ratio:4/3;object-fit:cover;}
  .gitem figcaption{padding:10px 12px;font-size:.9rem;color:var(--muted);}

  /* admin table */
  .tbl{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .tbl th,.tbl td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:.9rem;vertical-align:middle;}
  .tbl th{background:rgba(0,118,0,.06);color:var(--green);font-family:"Fraunces",serif;}

  .modal-card input,.modal-card textarea,.modal-card select{width:100%;font-family:inherit;font-size:1rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);}
  .modal-note{background:rgba(32,131,196,.1);border:1px solid rgba(32,131,196,.3);color:var(--blue-dk);border-radius:10px;padding:11px 13px;font-size:.83rem;margin:12px 0;}
  [data-theme="dark"] .modal-note{color:var(--blue);}
  .err{color:#d0463b;font-size:.83rem;margin:6px 0 0;min-height:1em;}
  .img-prev img{width:80px;height:80px;object-fit:cover;border-radius:10px;margin-top:8px;border:1px solid var(--line);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#20302a;color:#eef;padding:12px 20px;border-radius:100px;font-size:.9rem;opacity:0;transition:.3s;z-index:400;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* footer */
  footer{background:#F4D462;color:#3a2f14;padding:44px 0 34px;text-align:center;font-size:.9rem;}
  [data-theme="dark"] footer{background:#2e2712;color:#e8dcc0;border-top:1px solid #1c1709;}
  footer .fm{font-family:"Fraunces",serif;font-size:1.3rem;margin-bottom:14px;color:var(--green);}
  footer .fm .sw{color:var(--blue);font-style:italic;}
  footer .fcol{margin:14px 0;}
  footer .flab{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;opacity:.7;margin-bottom:8px;}
  footer .links{justify-content:center;}
  footer .links a,footer .links .lk{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.2);color:var(--blue-dk);}
  [data-theme="dark"] footer .links a,[data-theme="dark"] footer .links .lk{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25);color:var(--blue);}
  footer .addbtn{max-width:280px;margin:0 auto;color:#3a2f14;border-color:rgba(0,0,0,.35);}
  [data-theme="dark"] footer .addbtn{color:#e8dcc0;border-color:rgba(255,255,255,.4);}
  footer .cpy{margin-top:20px;color:#000;}
  [data-theme="dark"] footer .cpy{color:#fff;}

  @media (max-width:900px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:1fr;}.g2{grid-template-columns:1fr;}}
  @media (max-width:640px){.view{padding:38px 0 60px;}.nav{flex-wrap:wrap;}.tabs{order:3;width:100%;justify-content:flex-start;}}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;}*{transition:none!important;}.foliage,.star,.snow span{animation:none!important;}}
</style>

let content = { mission:'', tagline:'', discord:'', team:[], socials:[], affiliations:[], doing:[], speakers:[], events:[], gallery:[], chapters:[], meetingLink:'' };
let newsletters = [];   // {id,title,body,featured,reactions,myReaction}

function recomputeSession(){
  if(previewAs==='public'){ session=null; return; }

const isLoggedIn=()=> session!==null;

const can=(cap)=> isLoggedIn() && !!myRole().caps[cap];
function canView(r){
  if(r==='chapters') return can('view_chapters');
  if(r==='gallery')  return can('view_gallery');
  if(r==='calendar') return can('view_calendar');
  if(r==='admin')    return isLoggedIn() && session.roleId==='owner';
  return true;
}
// which permission controls editing each content kind
const KIND_CAP = {team:'edit_content', social:'edit_content', affiliation:'edit_content',
  doing:'programs_update', speaker:'programs_update', event:'calendar_edit', meetingLink:'calendar_edit',
  gallery:'gallery_upload', newsletter:'newsletter_post'};
const canEditKind=(k)=> editUI && can(KIND_CAP[k]);
const canEdit=(cap)=> editUI && can(cap);   // edit buttons also require the owner's "edit placeholders" switch to be on

const ROUTES=['home','newsletter','programs','chapters','gallery','contact','calendar','admin'];
const TAB={home:'Home',newsletter:'Newsletter',programs:'Programs',chapters:'Chapters',gallery:'Gallery',contact:'Contact',calendar:'Calendar',admin:'Owner Settings'};

let lastRoute=null;
window.addEventListener('hashchange', ()=>{ closeModal(); render(); });

/* ==========================================================================
   4) HELPERS: escaping, modal, toast, generic editor
   ========================================================================== */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return esc(s).replace(/"/g,'&quot;');}
function safeUrl(u){u=String(u||'').trim();return /^https?:\/\//i.test(u)?u:'https://'+u;}
function fmtDate(d){ if(!d) return ''; const p=d.split('-'); return p.length===3?(p[1]+'/'+p[2]+'/'+p[0].slice(2)):d; }

const modal=document.getElementById('modal');
function openModal(html){modal.innerHTML='<div class="modal-card">'+html+'</div>';modal.classList.add('open');}
function closeModal(){modal.classList.remove('open');modal.innerHTML='';}
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && modal.classList.contains('open')) closeModal(); });
function popup(t,m){openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>'+t+'</h3><p>'+m+'</p><button class="btn btn-primary" onclick="closeModal()">Got it</button>');}
const comingSoon=()=>popup('Under construction','Coming soon!');
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}

// generic add/edit form built from a field spec
let _ed=null,_edImgs={};
function openEditor(title, fields, values, onSave){
  _ed={fields,onSave}; _edImgs={};
  if(values) fields.filter(f=>f.type==='image').forEach(f=>{ if(values[f.key])_edImgs[f.key]=values[f.key]; });
  const body=fields.map(f=>{
    const v=(values&&values[f.key]!=null)?values[f.key]:'';
    const lab='<label>'+esc(f.label)+'</label>';
    if(f.type==='textarea') return lab+'<textarea id="ed-'+f.key+'" rows="3" placeholder="'+escA(f.placeholder||'')+'">'+esc(v)+'</textarea>';
    if(f.type==='select') return lab+'<select id="ed-'+f.key+'" class="ed-select">'+(f.options||[]).map(o=>'<option'+((v||f.options[0])===o?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
    if(f.type==='image') return lab+'<input id="ed-'+f.key+'" type="file" accept="image/*"><div class="img-prev" id="edp-'+f.key+'">'+(v?'<img src="'+escA(v)+'">':'')+'</div>';
    const t=f.type==='date'?'date':f.type==='time'?'time':f.type==='url'?'url':'text';
    return lab+'<input id="ed-'+f.key+'" type="'+t+'" value="'+escA(v)+'" placeholder="'+escA(f.placeholder||'')+'">';
  }).join('');
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>'+esc(title)+'</h3><div class="ed">'+body+'</div><p class="err" id="ed-err"></p><button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="submitEditor()">Save</button>');
  fields.filter(f=>f.type==='image').forEach(f=>{
    document.getElementById('ed-'+f.key).addEventListener('change',function(){
      const file=this.files[0]; if(!file) return;
      const rd=new FileReader(); rd.onload=()=>{_edImgs[f.key]=rd.result;document.getElementById('edp-'+f.key).innerHTML='<img src="'+rd.result+'">';}; rd.readAsDataURL(file);
    });
  });
}
function submitEditor(){
  const vals={};
  _ed.fields.forEach(f=>{ vals[f.key]= f.type==='image' ? (_edImgs[f.key]||'') : document.getElementById('ed-'+f.key).value.trim(); });
  const req=_ed.fields[0];
  if(req && req.type!=='image' && !vals[req.key]){ document.getElementById('ed-err').textContent='Please fill in '+req.label+'.'; return; }

}
const uid=()=>Date.now()+Math.floor(Math.random()*1000);

// content add/edit/delete/details ------------------------------------------------
const FIELDS={

const COLL={team:'team',social:'socials',affiliation:'affiliations',doing:'doing',speaker:'speakers',event:'events',gallery:'gallery',chapter:'chapters'};

function addItem(kind){ openEditor(ADD_TITLE[kind], FIELDS[kind], null, v=>{ v.id=uid(); content[COLL[kind]].push(v); toast('Added'); if(PERSIST_KIND[kind])saveSiteContent(true); }); }
function editItem(kind,id){ const arr=content[COLL[kind]]; const it=arr.find(x=>x.id===id); openEditor('Edit', FIELDS[kind], it, v=>{ Object.assign(it,v); toast('Saved'); if(PERSIST_KIND[kind])saveSiteContent(true); }); }
function deleteItem(kind,id){ const arr=content[COLL[kind]]; const i=arr.findIndex(x=>x.id===id); if(i>-1){arr.splice(i,1);toast('Removed'); if(PERSIST_KIND[kind])saveSiteContent(true); render();} }
function editMeetingLink(){ openEditor('Meeting link', [{key:'url',label:'Link for the next meeting',type:'url'}], {url:content.meetingLink}, v=>{ content.meetingLink=v.url; toast('Saved'); }); }

function editDel(kind,id){ return '<div class="rowbtns"><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();editItem(\''+kind+'\','+id+')">Edit</button><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();deleteItem(\''+kind+'\','+id+')">Delete</button></div>'; }
// render a section only if it has items OR the viewer can edit it
function section(kind, title, itemsHtml, addLabel){

/* ==========================================================================
   5) AUTH (real via Supabase, else local preview) + profile w/ avatar
   ========================================================================== */
function noteHtml(){return BACKEND?'':'<div class="modal-note">Preview mode: not a real account yet. Add your Supabase keys to go live. You can change these later.</div>';}
function openSignup(){
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>Sign up</h3>'+noteHtml()+
    '<label>Email</label><input id="su-email" type="email" placeholder="you@example.com">'+
    '<label>Username</label><input id="su-user" type="text" placeholder="Pick a username">'+
    '<label>Password</label><input id="su-pass" type="password" placeholder="Create a password">'+
    '<p class="err" id="su-err"></p><button class="btn btn-primary" id="su-btn" style="width:100%;margin-top:6px" onclick="doSignup()">Create account</button>');
}
async function doSignup(){
  const email=v('su-email'),user=v('su-user'),pass=document.getElementById('su-pass').value,err=document.getElementById('su-err');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Please enter a valid email.';return;}
  if(!user){err.textContent='Please pick a username.';return;}
  if(pass.length<6){err.textContent='Password should be at least 6 characters.';return;}
  if(BACKEND){
    const b=document.getElementById('su-btn');b.disabled=true;b.textContent='Creating…';err.textContent='';
    const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username:user}}});
    if(error){b.disabled=false;b.textContent='Create account';err.textContent=error.message;return;}
    if(!data.session){closeModal();popup('Almost there!','Check your email to confirm your account, then log in.');return;}
    await loadSession();closeModal();render();toast('Welcome, '+user+'!');
  } else { account={roleId:'member',username:user,email,avatar:null};previewAs=null;recomputeSession();closeModal();render();toast('Signed up (preview) — welcome, '+user+'!'); }
}
function openLogin(){
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>Log in</h3>'+noteHtml()+
    '<label>Email</label><input id="li-email" type="email" placeholder="you@example.com">'+
    '<label>Password</label><input id="li-pass" type="password" placeholder="Your password">'+
    '<p class="err" id="li-err"></p><button class="btn btn-primary" id="li-btn" style="width:100%;margin-top:6px" onclick="doLogin()">Log in</button>');
}
async function doLogin(){
  const email=v('li-email'),pass=document.getElementById('li-pass').value,err=document.getElementById('li-err');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Please enter a valid email.';return;}
  if(BACKEND){
    const b=document.getElementById('li-btn');b.disabled=true;b.textContent='Logging in…';err.textContent='';
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){b.disabled=false;b.textContent='Log in';
      err.innerHTML=/invalid login credentials/i.test(error.message)
        ? 'We couldn’t find an account with those details. If you’re new, please <a href="#" onclick="closeModal();openSignup();return false;">sign up</a> first.'
        : esc(error.message);
      return;}
    await loadSession();closeModal();render();toast('Logged in');
  } else { account={roleId:'member',username:email.split('@')[0],email,avatar:null};previewAs=null;recomputeSession();closeModal();render();toast('Logged in (preview)'); }
}
async function logout(){ if(BACKEND){await sb.auth.signOut();} account=null;previewAs=null;recomputeSession();closeModal();go('home');render();toast('Logged out'); }
async function loadSession(){
  if(!BACKEND){ recomputeSession(); return; }
  const {data:{user}}=await sb.auth.getUser();
  if(!user){ account=null; recomputeSession(); return; }
  let role='member',username=user.email.split('@')[0];
  const {data:profile}=await sb.from('profiles').select('username, role').eq('id',user.id).single();
  if(profile){role=profile.role||'member';username=profile.username||username;}
  account={roleId:role,username,email:user.email,avatar:(account&&account.avatar)||null};
  recomputeSession();
}
function openProfile(){
  const av=account&&account.avatar?'<img src="'+escA(account.avatar)+'">':'';
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>Your profile</h3>'+noteHtml()+
    '<label>Profile picture</label><input id="pf-av" type="file" accept="image/*"><div class="img-prev" id="pf-avp">'+av+'</div>'+
    '<label>Username</label><input id="pf-user" type="text" value="'+escA(account?account.username:'')+'">'+
    '<label>Email</label><input type="email" value="'+escA(account?account.email:'')+'" disabled>'+
    '<label>New password</label><input id="pf-pass" type="password" placeholder="Leave blank to keep current">'+
    '<button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="saveProfile()">Save changes</button>'+

// winter snow: a field of flakes (deterministic) with per-flake size, drift, speed
function snowLayer(){
  let s='';
  for(let i=0;i<38;i++){
    const x=(fr(i*1.3)*100).toFixed(1), sz=(fr(i*2.7)*3+2).toFixed(1), dur=(fr(i*3.1)*5+6).toFixed(1),
          del=(fr(i*4.9)*-11).toFixed(1), dx=((fr(i*5.3)-0.5)*80).toFixed(0), op=(fr(i*6.1)*0.5+0.5).toFixed(2);
    s+='<span style="left:'+x+'%;width:'+sz+'px;height:'+sz+'px;--dx:'+dx+'px;opacity:'+op+';animation-duration:'+dur+'s;animation-delay:'+del+'s"></span>';
  }
  return '<div class="snow" id="snow">'+s+'</div>';
}

// correct lunar terminator: new → crescent → quarter → gibbous → full → … (gibbous reads as gibbous, not a fat crescent)
function moonLitPath(f){
  const R=54,cx=92,cy=92;
  const rx=Math.abs(R*Math.cos(f*2*Math.PI)).toFixed(2);
  const T=cx+','+(cy-R), B=cx+','+(cy+R);
  const limb=f<0.5?1:0;
  const term=(f<0.25||f>0.75)?limb:1-limb;
  return 'M'+T+' A'+R+','+R+' 0 0,'+limb+' '+B+' A'+rx+','+R+' 0 0,'+term+' '+T+' Z';
}

  const manage=canEdit('chapters_add');
  const byCont={};
  content.chapters.forEach(ch=>{ const c=conts.indexOf(ch.continent)>-1?ch.continent:'Other'; (byCont[c]=byCont[c]||{}); const co=ch.country||'—'; (byCont[c][co]=byCont[c][co]||[]).push(ch); });
  const body=conts.map(c=>{
    const countries=byCont[c]?Object.keys(byCont[c]).sort((a,b)=>a<b?-1:a>b?1:0):[];    // sort by Unicode code units
    let inner;
    if(countries.length){
      inner=countries.map(co=>'<div class="chp-country"><div class="chp-cn">'+esc(co)+'</div><ul class="chp-list">'+
        byCont[c][co].slice().sort((a,b)=>(a.name||'')<(b.name||'')?-1:1).map(ch=>'<li>'+esc(ch.name)+(manage?' <button class="btn btn-ghost btn-xs" style="padding:0 6px" title="Remove" onclick="deleteItem(\'chapter\','+ch.id+')">×</button>':'')+'</li>').join('')+'</ul></div>').join('');
    } else { inner='<p class="muted">No chapters here yet — check back soon!</p>'; }
    return '<details class="cont"><summary>'+c+'</summary><div class="body">'+inner+'</div></details>';
  }).join('');
  return '<div class="wrap view"><h1 class="page-title">ESE chapters</h1>'+
    '<p class="page-intro">Chapters are regional branches of ESE. People can apply to start one in their area.</p>'+
    '<p style="margin-bottom:0"><button class="btn btn-primary btn-sm" onclick="createChapter()">Start your own chapter</button></p>'+
    '<p class="muted" style="font-size:.9rem;margin-top:16px">Fill out the application form to start a chapter — the ESE team reviews each one and, once approved, adds it here.</p>'+
    (manage?'<div class="card" style="margin:18px 0"><strong style="color:var(--green)">Chapter admin</strong><p class="muted" style="margin:6px 0 10px">Add an approved chapter. Country and chapter names can be written in any language or script.</p><button class="btn btn-primary btn-sm" onclick="addItem(\'chapter\')">+ Add a chapter</button></div>':'<div style="height:8px"></div>')+
    body+
  '</div>';
}

/* ---- member management (search / role save / delete) ---- */
let memberResults=null, memberQuery='';
async function searchMembers(){
  const el=document.getElementById('mem-q'); const q=el?el.value.trim():'';
  memberQuery=q;
  if(!q){ memberResults=null; render(); return; }
  if(!BACKEND){ memberResults=people.filter(p=>(p.email||'').toLowerCase().includes(q.toLowerCase())); render(); return; }
  try{
    const {data,error}=await sb.from('profiles').select('id,username,email,role').ilike('email','%'+q+'%').limit(30);
    if(error){ toast('Search error: '+error.message); memberResults=[]; }
    else memberResults=(data||[]).map(r=>({id:r.id,username:r.username||'(member)',email:r.email||'',roleId:r.role||'member'}));
  }catch(e){ memberResults=[]; toast('Search failed — is the profiles table set up?'); }
  render();
}
function stageMemberRole(id,rid){ const m=(memberResults||[]).find(x=>String(x.id)===String(id)); if(m){ m._newRole=rid; render(); } }
async function saveMemberRole(id){
  const m=(memberResults||[]).find(x=>String(x.id)===String(id)); if(!m)return;
  const rid=m._newRole||m.roleId; const rn=roles[rid]?roles[rid].name:rid;
  if(!BACKEND){ m.roleId=rid; delete m._newRole; toast('Saved (preview): '+m.email+' → '+rn); render(); return; }
  try{ const {error}=await sb.from('profiles').update({role:rid}).eq('id',m.id);
    if(error) toast('Save failed: '+error.message);
    else { m.roleId=rid; delete m._newRole; toast('Saved: '+m.email+' is now '+rn); }
  }catch(e){ toast('Save failed'); }
  render();
}
function confirmDeleteUser(id){
  const m=(memberResults||[]).find(x=>String(x.id)===String(id)); if(!m)return;
  openModal('<button class="x" onclick="closeModal()" aria-label="Close">×</button><h3>Delete account</h3>'+
    '<p>Are you sure you want to delete <strong>'+esc(m.email)+'</strong>’s account?</p>'+
    '<div class="ed"><label>Reason (this is emailed to them)</label><textarea id="del-reason" rows="3" placeholder="Let them know why the account is being removed…"></textarea></div>'+
    '<p class="muted" style="font-size:.8rem">They can still sign up again later. Deleting sends them an email with your reason.</p>'+
    '<div class="rowbtns" style="margin-top:12px;justify-content:flex-end"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button> <button class="btn btn-danger btn-sm" onclick="doDeleteUser(\''+String(m.id)+'\')">Delete account</button></div>');
}
async function doDeleteUser(id){
  const m=(memberResults||[]).find(x=>String(x.id)===String(id)); if(!m)return;
  const rEl=document.getElementById('del-reason'); const reason=rEl?rEl.value.trim():'';
  closeModal();
  if(!BACKEND){ toast('Deleted (preview): '+m.email); memberResults=memberResults.filter(x=>x!==m); render(); return; }
  try{
    const {error}=await sb.functions.invoke('delete-user',{body:{userId:m.id,email:m.email,reason:reason}});
    if(error) toast('Delete needs the delete-user server function — see setup notes.');
    else { toast('Account deleted and email sent.'); memberResults=memberResults.filter(x=>x!==m); }
  }catch(e){ toast('Delete needs the delete-user Edge Function deployed.'); }
  render();
}

/* ==========================================================================
   9) HERO ANIMATION ENGINE
   Scroll-driven: sun/sky/season (light), moon phase (dark), cloud drift, leaf-fall, tree sway.
   Time-driven (independent of scroll): leaf rustle (CSS), a few stars twinkling (JS),
   shooting stars, and occasional leaves breaking off in the wind.
   ========================================================================== */
const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let heroTimers=[];
let heroTimersBird=[], birdOccupied=[];   // birds: up to 2 groups, each in a distinct layer of 4
let heroRAF=0;
function stopBirds(){ heroTimersBird.forEach(clearTimeout); heroTimersBird=[]; birdOccupied=[]; document.querySelectorAll('.birds').forEach(b=>b.remove()); }
function stopHero(){ heroTimers.forEach(clearInterval); heroTimers=[]; cancelAnimationFrame(heroRAF); heroRAF=0; stopBirds(); document.querySelectorAll('.windgust,.shooting').forEach(e=>e.remove()); activeBreezes=0; }
function lerp(a,b,t){return a+(b-a)*t;}
function hex(c){ if(c[0]==='r'){const m=c.match(/\d+/g);return [+m[0],+m[1],+m[2]];} c=c.replace('#','');return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
function mix(a,b,t){const A=hex(a),B=hex(b);return 'rgb('+Math.round(lerp(A[0],B[0],t))+','+Math.round(lerp(A[1],B[1],t))+','+Math.round(lerp(A[2],B[2],t))+')';}

// ---- tree geometry: one leaf shape + one 5-petal flower shape, reused for canopy and falling ----
const LEAF_PATH='M0,-8 C4,-6 5,-1 3,5 C2,7.5 -2,7.5 -3,5 C-5,-1 -4,-6 0,-8 Z';
const FLOWER_PATH=(function(){let d='';for(let k=0;k<5;k++){const a=k*72*Math.PI/180;const R=(x,y)=>[(x*Math.cos(a)-y*Math.sin(a)).toFixed(2),(x*Math.sin(a)+y*Math.cos(a)).toFixed(2)];const p0=R(0,0),c1=R(2.7,-5.4),c2=R(-2.7,-5.4);d+='M'+p0[0]+','+p0[1]+' C'+c1[0]+','+c1[1]+' '+c2[0]+','+c2[1]+' '+p0[0]+','+p0[1]+' ';}return d;})();

// deterministic pseudo-random so the canopy is identical every load
function fr(x){x=Math.sin(x)*43758.5453;return x-Math.floor(x);}
// leaves densely fill a rounded crown (no floating gaps); a ragged edge keeps it natural
const LEAF_POS=(function(){const a=[];const cx=100,cy=82,rx=72,ry=58,step=8;let k=0;
  for(let gy=cy-ry;gy<=cy+ry;gy+=step){for(let gx=cx-rx;gx<=cx+rx;gx+=step){
    const jx=(fr(k*1.7)-0.5)*step*1.0, jy=(fr(k*3.3+1)-0.5)*step*1.0;
    const x=gx+jx, y=gy+jy, nx=(x-cx)/rx, ny=(y-cy)/ry, dist=nx*nx+ny*ny;
    if(dist<=1 && !(dist>0.9 && fr(k*5.1)<0.3)){                          // dense fill, lightly ragged edge
      const lx=100+(fr(k*8.1)-0.5)*116;                                  // land spread across a mound at the base
      const mh=14*Math.max(0,1-Math.pow(Math.abs(lx-100)/56,1.4)) - fr(k*9.3)*6;   // mound height above the ground line (peak centre)
      a.push({x:+x.toFixed(1),y:+y.toFixed(1),r:Math.round(fr(k*2.2)*360),d:Math.min(0.34,Math.max(0,(y-(cy-ry))/(2*ry)*0.32)),dt:+fr(k*11.3).toFixed(3),lx:+lx.toFixed(1),mh:+mh.toFixed(1),lr:Math.round(fr(k*3.7)*160-80)});
    }
    k++;
  }}
  return a;})();
// flowers scatter more sparsely through the same crown, in front of the leaves
const FLOWER_POS=(function(){const a=[];const cx=100,cy=82,rx=64,ry=50,step=15;let k=0;
  for(let gy=cy-ry;gy<=cy+ry;gy+=step){for(let gx=cx-rx;gx<=cx+rx;gx+=step){
    const jx=(fr(k*4.1+7)-0.5)*step, jy=(fr(k*6.7+3)-0.5)*step;
    const x=gx+jx, y=gy+jy, nx=(x-cx)/rx, ny=(y-cy)/ry;
    if(nx*nx+ny*ny<=1){ a.push({x:+x.toFixed(1),y:+y.toFixed(1),d:+(fr(k*2.9)*0.28).toFixed(2)}); }
    k++;
  }}
  return a;})();

// sun/moon vertical placement, measured from the real horizon (hills) so it sits right on any screen
let heroW=0, heroH=0, curP=0, groundY=0, trunkLX=0, trunkRX=0, GROUND_TY=200, canopyY=0, skyY=0;
function measureHero(){
  const hero=document.getElementById('hero'); if(!hero)return;
  heroW=hero.clientWidth; heroH=hero.clientHeight;
  const vh=window.innerHeight||heroH;
  const tb=document.querySelector('.topbar'); if(tb) document.documentElement.style.setProperty('--nav-h', tb.offsetHeight+'px');
  // Ground/sky lines from the known vh-based hill sizes — deterministic (getBoundingClientRect on the SVGs was unreliable and put the shadows at the top).
  groundY = heroH - 0.166*vh;                        // front-hill green top (23vh box, green begins ~28% down it)
  skyY    = heroH - 0.258*vh;                        // far light-green hill ridge (34vh box) — the sun sets behind this
  trunkLX = 89; trunkRX = heroW - 89;                // trees are 190px wide at each edge (left:-6 / right:-6) → centre ≈89px in
  const contentH=Math.min(0.44*vh, 190*320/200), topPx=heroH-contentH;   // tree content is bottom-aligned & letterboxed to its width
  GROUND_TY = Math.max(40, Math.min(300, (groundY - topPx)/contentH*320));   // tree viewBox-y that lands on the visible ground
  canopyY = topPx + (48/320)*contentH;               // just below the top of the crown
}

function seasonColor(p){ return p<0.32 ? mix('#3f8f4f','#c9a227',p/0.32) : mix('#c9a227','#c0472b',Math.min(1,(p-0.32)/0.22)); }
function currentLeafColor(){ return theme==='dark' ? '#2c5d3a' : seasonColor(curP); }

let leavesFalling=false;
function setTreeLeafVar(col){ ['tree-left','tree-right'].forEach(id=>{const t=document.getElementById(id);if(t)t.style.setProperty('--leaf',col);}); }
function setRustle(on){ ['fo-left','fo-right'].forEach(id=>{const g=document.getElementById(id);if(g)g.classList.toggle('still',!on);}); }
function resetLeaves(){ ['tree-left','tree-right'].forEach(id=>{const t=document.getElementById(id);if(!t)return;t.querySelectorAll('.leaf').forEach(l=>{l._t0=0;l.setAttribute('transform','translate('+l.dataset.x+','+l.dataset.y+') rotate('+l.dataset.a+')');l.style.fill='';l.style.opacity='1';});}); }
// colour/position every leaf. Through autumn each leaf detaches and falls ONCE, landing in a
// leaves detach at random scroll points through autumn; once detached each falls over a fixed
// time, rests on/just below the dark-green ground, then fades after ~1s. All gone by full snow.
const FALL_MS=1400, REST_MS=1100, FADE_MS=900;
// A mound of leaves that accumulates on the grass under each tree (its own layer, in front of the hills,
// so it always sits on the visible ground regardless of how the trees letterbox).
function drawPile(p, night){
  const pile=document.getElementById('leafPile'); if(!pile)return;
  const build=Math.max(0, Math.min(1, (p-0.44)/(0.60-0.44)));          // grows through autumn
  const winterForce=(!night && p>0.62)?Math.min(1,(p-0.62)/(0.78-0.62)):0;
  const vis=night?0:Math.min(1, build*2)*(1-winterForce);
  if(vis<=0.01 || !trunkLX){ if(pile._k){ pile.innerHTML=''; pile._k=''; } pile.style.opacity='0'; return; }
  pile.style.opacity=vis.toFixed(2);
  pile.setAttribute('viewBox','0 0 '+heroW+' '+heroH); pile.setAttribute('preserveAspectRatio','none');
  const col=seasonColor(p), key=Math.round(build*24)+'|'+col;          // rebuild only when the leaf count/colour changes
  if(pile._k===key) return;
  pile._k=key;
  const brown='#7a3f1e', N=16, spread=66;
  let s='';
  [trunkLX, trunkRX].forEach((cx,ti)=>{ if(!cx)return;
    for(let i=0;i<N;i++){ if(i/N>build) continue;
      const rx=fr(ti*91+i*5)*2-1;                                      // -1..1 across the mound
      const dx=rx*spread, mound=(1-rx*rx)*13;                          // parabolic — taller in the middle
      const lx=cx+dx, ly=groundY + 3 - mound*(0.5+fr(ti*91+i*5+1)*0.5);
      const rot=fr(ti*91+i*5+2)*360, sc=0.85+fr(ti*91+i*5+3)*0.35;
      const c=mix(col, brown, 0.4+fr(ti*91+i*5+4)*0.5);
      s+='<g transform="translate('+lx.toFixed(1)+','+ly.toFixed(1)+') rotate('+rot.toFixed(0)+') scale('+sc.toFixed(2)+')"><path d="'+LEAF_PATH+'" fill="'+c+'"/></g>';
    }
  });
  pile.innerHTML=s;
}
function paintLeaves(p,night,now){
  const fs=0.40, fe=0.60, winterFull=0.78;
  const base=night?'#2c5d3a':seasonColor(p);
  const winterForce=(!night && p>0.62)?Math.min(1,(p-0.62)/(winterFull-0.62)):0;   // guarantees bare by full snow
  drawPile(p, night);                                          // the mound on the grass (separate layer, sits on the visible ground)
  if(night || p<=fs){
    setTreeLeafVar(base); setRustle(true);
    if(leavesFalling){ resetLeaves(); leavesFalling=false; }
    return;
  }
  leavesFalling=true; setRustle(false);
  ['tree-left','tree-right'].forEach(id=>{ const t=document.getElementById(id); if(!t)return;
    t.querySelectorAll('.leaf').forEach((leaf,i)=>{

}

function consOrder(){
  const byQ=[[],[],[],[]]; CONSTELLATIONS.forEach((c,i)=>byQ[c.q].push(i));
  if(CONSTELLATION_MODE==='random5'){
    const pool=byQ.map(a=>a.slice()), order=[]; let prevQ=-1;
    for(let n=0;n<5;n++){
      const qs=[0,1,2,3].filter(q=>q!==prevQ && pool[q].length);
      if(!qs.length) break;
      const q=qs[Math.floor(Math.random()*qs.length)];
      const j=Math.floor(Math.random()*pool[q].length);
      order.push(pool[q].splice(j,1)[0]); prevQ=q;
    }
    return order;
  }
  const order=[]; for(let k=0;k<5;k++) for(let q=0;q<4;q++) if(byQ[q][k]!=null) order.push(byQ[q][k]);   // quadrant round-robin (never two in a row)
  return order;
}
function buildConstellations(){
  const svg=document.getElementById('constellations'); if(!svg)return;
  const W=heroW||svg.clientWidth||1200, H=heroH||svg.clientHeight||700;
  svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('preserveAspectRatio','none');   // 1:1 px, no distortion, no crop
  if(!CONS_ORDER.length || CONSTELLATION_MODE!=='random5') CONS_ORDER=consOrder();               // keep the random pick stable across rebuilds
  const S0=H*0.0075;
  let h='';
  CONS_ORDER.forEach((ci,k)=>{ const c=CONSTELLATIONS[ci], cx=c.at[0]*W, cy=c.at[1]*H, S=S0*(c.s||1), n=c.st.length;
    const pts=c.st.map(d=>[cx+d[0]*S, cy+d[1]*S]);
    let g='<g class="cons" data-k="'+k+'">';
    (c.segs||[]).forEach(seg=>{ g+='<polyline class="cline" points="'+seg.map(i=>pts[i][0].toFixed(1)+','+pts[i][1].toFixed(1)).join(' ')+'"/>'; });
    pts.forEach((pt,i)=>{ const mag=1-i/Math.max(1,n-1); const r=(1.6+mag*1.1).toFixed(2);          // rest size by magnitude — largest < 2× smallest, smooth
      g+='<circle class="cstar" data-sf="'+(i/Math.max(1,n-1)).toFixed(3)+'" data-r="'+r+'" cx="'+pt[0].toFixed(1)+'" cy="'+pt[1].toFixed(1)+'" r="0.6"/>'; });
    g+='</g>'; h+=g;
  });
  svg.innerHTML=h;
  svg.querySelectorAll('.cline').forEach(pl=>{ try{ const L=pl.getTotalLength(); pl.dataset.len=L.toFixed(1); pl.style.strokeDasharray=L.toFixed(1); }catch(e){} });
}
function updateConstellations(p, now){
  const svg=document.getElementById('constellations'); if(!svg)return;
  const groups=svg.querySelectorAll('.cons'), N=groups.length; if(!N)return;
  const TRACE=0.8, HOLD=2.4, FADE=0.6;                        // window units; visible for HOLD+FADE=3 windows → ~3 on screen at once
  groups.forEach((g,k)=>{
    const t = p*N - k;                                        // how many windows since this one began
    let lf, vis;
    if(t<0){ lf=0; vis=0; }
    else if(t<TRACE){ lf=t/TRACE; vis=1; }                    // tracing in
    else if(t<HOLD){ lf=1; vis=1; }                           // fully lit
    else if(t<HOLD+FADE){ lf=1; vis=1-(t-HOLD)/FADE; }        // fading out so only ~3 remain
    else { lf=1; vis=0; }
    g.style.opacity=vis.toFixed(3);
    if(vis<=0.002) return;
    const tracing = t>=0 && t<TRACE;
    const linePulse = tracing ? (0.62+0.38*Math.sin((now||0)/170 + k*1.7)) : 1;   // strong pulse only on its turn
    g.querySelectorAll('.cline').forEach(pl=>{ const L=+pl.dataset.len||0; pl.style.strokeDashoffset=(L*(1-lf)).toFixed(1); pl.style.opacity=(Math.min(1,lf*1.15)*0.8*linePulse).toFixed(2); });
    g.querySelectorAll('.cstar').forEach(st=>{ const sf=+st.dataset.sf, rest=+st.dataset.r;
      const e=Math.min(1,Math.max(0,(lf - sf*0.7)/0.2));      // grows to rest size as the line reaches it
      const boost = tracing ? (1+0.16*Math.sin((now||0)/150 + sf*7 + k)) : 1;   // brief gentle twinkle on the turn, then rest
      const r=(0.6 + (rest-0.6)*e) * boost;                    // pinprick → modest rest size (doesn't stay oversized)
      st.setAttribute('r', Math.max(0.4,r).toFixed(2));
      st.style.opacity=(0.3 + e*0.7).toFixed(2);
    });
  });
}

/* ---------- sleep z's from the trees (dark mode), tied to scroll ---------- */
const ZZZ_PER=4;
function buildZzz(){ ['zzzL','zzzR'].forEach(id=>{ const c=document.getElementById(id); if(!c||c.dataset.built)return; let h=''; for(let i=0;i<ZZZ_PER;i++) h+='<span>z</span>'; c.innerHTML=h; c.dataset.built='1'; }); }
function updateZzz(p, now){
  const night = theme==='dark' && p>=0;
  ['zzzL','zzzR'].forEach((id,side)=>{ const c=document.getElementById(id); if(!c)return;
    if(!night){ c.style.opacity='0'; return; }
    c.style.opacity='1';
    const dir = side===0 ? 1 : -1;                              // left tree → up-right, right tree → up-left
    const baseX = (side===0 ? (trunkLX||heroW*0.06) : (trunkRX||heroW*0.94)) + dir*18;   // start just inside the trunk
    const baseY = (canopyY||heroH*0.62);                        // top of the canopy
    const spans=c.children, dist=heroH*0.16;
    for(let i=0;i<spans.length;i++){
      const prog=((p*3 + i/ZZZ_PER) % 1 + 1) % 1;               // scroll drives the rise; staggered per z
      const x=baseX + dir*prog*dist*0.55;
      const y=baseY - prog*dist;
      const scale=0.8 + prog*0.9;                               // start a touch bigger, grow gently
      const rot=(i%2? 1 : -1) * Math.sin(prog*Math.PI*4) * 20;  // each z wobbles; adjacent z's wobble opposite
      const op=Math.sin(Math.min(1,prog)*Math.PI)*0.85;         // grow in, fade out
      const el=spans[i];
      el.style.transform='translate('+x.toFixed(0)+'px,'+y.toFixed(0)+'px) scale('+scale.toFixed(2)+') rotate('+rot.toFixed(0)+'deg)';
      el.style.opacity=op.toFixed(2);
      el.style.fontSize=(13+i)+'px';
    }
  });
}
function swayTrees(deg){ const l=document.getElementById('tree-left'),r=document.getElementById('tree-right'); if(l)l.style.transform='rotate('+deg+'deg)'; if(r)r.style.transform='scaleX(-1) rotate('+(deg)+'deg)'; }

// a leaf breaks off and rides the wind sideways + gently down (not tied to scrolling)
function breakLeaf(side){
  const hero=document.getElementById('hero'); if(!hero)return;
  if(theme!=='dark' && scrollP()>0.5) return;   // daytime: no break-off once the tree is shedding/bare
  const tree=document.getElementById('tree-'+side); if(!tree)return;
  const cx=(side==='left'?trunkLX:trunkRX)||(side==='left'?90:(hero.clientWidth-90));
  const startX=cx + (side==='left'?18:-18) + (Math.random()*40-20);
  const startY=(canopyY||hero.clientHeight*0.75) + 20 + Math.random()*30;
  const leaf=document.createElementNS('http://www.w3.org/2000/svg','svg'); leaf.setAttribute('class','flyleaf'); leaf.setAttribute('viewBox','-9 -9 18 18');
  leaf.innerHTML='<path d="'+LEAF_PATH+'" fill="'+currentLeafColor()+'"/>';
  leaf.style.left=startX+'px'; leaf.style.top=startY+'px';
  hero.appendChild(leaf);
  const dir = side==='left'?1:-1;              // left tree -> fly right; right tree -> fly left
  const dx = dir*(120+Math.random()*120);
  const dy = 160+Math.random()*120;
  leaf.animate([
    {transform:'translate(0,0) rotate(0deg)',opacity:1},
    {transform:'translate('+(dx*0.5)+'px,'+(dy*0.35)+'px) rotate(140deg)',opacity:1,offset:0.5},
    {transform:'translate('+dx+'px,'+dy+'px) rotate(320deg)',opacity:0}
  ],{duration:4200,easing:'ease-in'}).onfinish=()=>leaf.remove();
}
// a faint curved wind gust (with a little spiral) drifts across and fades — all seasons, both modes
let activeBreezes=0;
function windGust(){
  if(activeBreezes>=2) return;                                  // no more than two breezes at once
  const hero=document.getElementById('hero'); if(!hero)return;
  const NS='http://www.w3.org/2000/svg';
  const w=hero.offsetWidth, h=hero.offsetHeight;
  activeBreezes++;
  const dir=Math.random()<0.5?1:-1;
  const vh=window.innerHeight||h;
  // tree-canopy zones (hero coords) for leaf pickup — computed, not measured (crown sits in the upper tree)
  const contentH=Math.min(0.44*vh, 190*320/200), topPx=h-contentH;
  const cy0=topPx+(18/320)*contentH, cy1=topPx+(150/320)*contentH;
  const zones=[{x0:-6,x1:184,y0:cy0,y1:cy1},{x0:w-184,x1:w+6,y0:cy0,y1:cy1}];
  const entryZone = dir>0 ? zones[0] : zones[1];               // the tree the breeze passes first
  const y0 = entryZone.y0 + (entryZone.y1-entryZone.y0)*(0.35+Math.random()*0.4);   // aligned to cross that canopy
  const span=w+140;
  const startX=dir>0?-70:w+70;
  // Path SHAPE (t:0→1): off one edge → loop → gentle wave → loop → off the other edge.
  const loopR=Math.max(22, span*0.014);                        // small loop, scales gently with width
  const hw=0.013;                                              // narrow half-window per loop → a clean self-intersecting curl (no cusp)
  const lc1=0.33, lc2=0.64, ld1=Math.random()<0.5?1:-1, ld2=Math.random()<0.5?1:-1;   // two loop centres, each up or down
  const waveAmp=4+Math.random()*4, waveN=2.4+Math.random()*1.2, wavePh=Math.random()*6.283;
  const loops=[{c:lc1,d:ld1},{c:lc2,d:ld2}];
  function shape(t){
    let x=startX+dir*t*span, y=y0+Math.sin(t*waveN*2*Math.PI+wavePh)*waveAmp;         // base glide + ever-so-slight waviness
    for(const lp of loops){ const dt=t-lp.c; if(Math.abs(dt)<hw){ const s=dt/(2*hw)+0.5, a=s*2*Math.PI; x+=dir*Math.sin(a)*loopR; y+=-lp.d*(1-Math.cos(a))*loopR; } }
    return [x,y];
  }
  // Arc-length table so the breeze (and its leaf) travel at CONSTANT speed — loops no longer speed it up.
  const SEG=1200, sx=[], sy=[], cum=[0];
  for(let i=0;i<=SEG;i++){ const p=shape(i/SEG); sx.push(p[0]); sy.push(p[1]); if(i>0) cum.push(cum[i-1]+Math.hypot(sx[i]-sx[i-1], sy[i]-sy[i-1])); }
  const totalLen=cum[SEG]||1;
  function atLen(L){ let lo=0,hi=SEG; while(lo<hi){ const m=(lo+hi)>>1; if(cum[m]<L) lo=m+1; else hi=m; } const i=Math.max(1,lo), seg=cum[i]-cum[i-1], f=seg>0?(L-cum[i-1])/seg:0; return [sx[i-1]+(sx[i]-sx[i-1])*f, sy[i-1]+(sy[i]-sy[i-1])*f]; }
  function lead(u){ return atLen(Math.max(0,Math.min(1,u))*totalLen); }
  const col=theme==='dark'?'rgba(210,220,255,.6)':'rgba(255,255,255,.7)';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('class','windgust'); svg.setAttribute('width',w); svg.setAttribute('height',h);
  svg.setAttribute('viewBox','0 0 '+w+' '+h); svg.style.left='0px'; svg.style.top='0px';
  svg.innerHTML='<path fill="none" style="stroke:'+col+';stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"/>';
  hero.appendChild(svg);
  const path=svg.querySelector('path');
  const seasonCol=currentLeafColor();
  const dur=5200+Math.random()*1800, t0=performance.now();
  const trail=[], maxTrail=30; let carried=null, cAng=Math.random()*360;
  function frame(now){
    if(!document.body.contains(svg)){ if(carried)carried.remove(); activeBreezes=Math.max(0,activeBreezes-1); return; }
    const u=(now-t0)/dur;
    if(u>=1){ svg.remove(); if(carried)carried.remove(); activeBreezes=Math.max(0,activeBreezes-1); return; }
    const lp=lead(u); trail.push(lp); if(trail.length>maxTrail) trail.shift();
    path.setAttribute('d','M'+trail.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L'));
    svg.style.opacity=(u<0.1?u/0.1:u>0.85?(1-u)/0.15:1).toFixed(2);
    if(!carried){ for(const z of zones){ if(lp[0]>=z.x0&&lp[0]<=z.x1&&lp[1]>=z.y0&&lp[1]<=z.y1){ carried=document.createElementNS(NS,'svg'); carried.setAttribute('class','flyleaf'); carried.setAttribute('viewBox','-9 -9 18 18'); carried.innerHTML='<path d="'+LEAF_PATH+'" fill="'+seasonCol+'"/>'; hero.appendChild(carried); break; } } }
    if(carried){ const ahead=lead(Math.min(1,u+0.03)); cAng+=10; carried.style.left=ahead[0].toFixed(1)+'px'; carried.style.top=ahead[1].toFixed(1)+'px'; carried.style.transform='translate(-50%,-50%) rotate('+cAng+'deg)'; }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function shootingStar(){
  const hero=document.getElementById('hero'); if(!hero||theme!=='dark')return;
  const w=hero.offsetWidth, h=hero.offsetHeight;
  const dir=Math.random()<0.5?1:-1;                            // down-right or down-left
  const ang=22+Math.random()*16;                               // degrees below horizontal (a sane angle)
  const rot=dir>0?ang:180-ang;
  const dist=200+Math.random()*180;
  const dx=dir*Math.cos(ang*Math.PI/180)*dist, dy=Math.sin(ang*Math.PI/180)*dist;
  const s=document.createElement('div'); s.className='shooting';
  s.style.top=(Math.random()*h*0.32).toFixed(0)+'px'; s.style.left=((0.1+Math.random()*0.8)*w).toFixed(0)+'px';
  hero.appendChild(s);
  s.animate([
    {transform:'translate(0,0) rotate('+rot.toFixed(0)+'deg)',opacity:0},
    {opacity:1,offset:0.2},
    {transform:'translate('+dx.toFixed(0)+'px,'+dy.toFixed(0)+'px) rotate('+rot.toFixed(0)+'deg)',opacity:0}
  ],{duration:Math.round(750+Math.random()*350),easing:'ease-out'}).onfinish=()=>s.remove();
}
// small bird silhouette; two wings flap via SMIL (rotate around the body)
function birdSVG(flapDur){
  return '<svg viewBox="-13 -9 26 18" width="26" height="18">'+
    '<path d="M0,1 C-5,-5 -9,-4 -12,-1 C-8,-1 -4,0 0,2 Z"><animateTransform attributeName="transform" type="rotate" values="-14 0 1;14 0 1;-14 0 1" dur="'+flapDur+'s" repeatCount="indefinite"/></path>'+
    '<path d="M0,1 C5,-5 9,-4 12,-1 C8,-1 4,0 0,2 Z"><animateTransform attributeName="transform" type="rotate" values="14 0 1;-14 0 1;14 0 1" dur="'+flapDur+'s" repeatCount="indefinite"/></path>'+
  '</svg>';
}
// two independent streams keep at most 2 groups on screen; each group takes a distinct layer (of 4) so they never collide
function birdStream(streamId){
  const hero=document.getElementById('hero');
  if(!hero || route()!=='home' || theme==='dark'){ return; }        // birds sleep at night
  const w=hero.offsetWidth, h=hero.offsetHeight;
  const layers=[0.08,0.24,0.40,0.56];                                // four lanes across the top two-thirds
  const free=[0,1,2,3].filter(l=>birdOccupied.indexOf(l)<0);
  if(!free.length){ heroTimersBird[streamId]=setTimeout(()=>birdStream(streamId),700); return; }
  const layer=free[Math.floor(Math.random()*free.length)]; birdOccupied.push(layer);
  const count=Math.random()<0.5?2:3;                                 // 2 or 3, 50/50, independent per group
  const dir=Math.random()<0.5?1:-1;                                  // side 50/50
  const y=layers[layer]*h, speed=0.13, dist=w+300, dur=Math.round(dist/speed);   // ~2x the falling-leaf speed
  const flapDur=Math.max(0.42,(dur/1000)*0.75/14).toFixed(2);
  const group=document.createElement('div'); group.className='birds'; group.style.top=y.toFixed(0)+'px';
  for(let i=0;i<count;i++){
    const b=document.createElement('div'); b.className='bird';
    b.style.left=(-i*30*dir).toFixed(0)+'px';
    b.style.top=((i%2?1:-1)*i*8).toFixed(0)+'px';
    b.style.transform='scaleX('+dir+')';
    b.innerHTML=birdSVG(flapDur);
    group.appendChild(b);
  }
  const from=dir>0?-150:w+50, to=dir>0?(w+150):-150;
  group.style.left=from.toFixed(0)+'px';
  hero.appendChild(group);
  group.animate([{transform:'translateX(0)'},{transform:'translateX('+(to-from).toFixed(0)+'px)'}],{duration:dur,easing:'linear'}).onfinish=()=>{
    group.remove(); const k=birdOccupied.indexOf(layer); if(k>-1)birdOccupied.splice(k,1);
    heroTimersBird[streamId]=setTimeout(()=>birdStream(streamId), 500+Math.random()*1500);
  };
}
window.addEventListener('scroll',()=>{ if(document.getElementById('heroScroll')){ curP=computeP(); if(reduceMotion) updateScene(curP, performance.now()); } },{passive:true});
window.addEventListener('resize',()=>{ if(document.getElementById('hero')){ measureHero(); curP=computeP(); buildConstellations(); } });

/* ---- shared site content persisted for everyone via the site_content row ---- */
const SITE_KEYS=['mission','tagline','discord'];
const SITE_ARRAYS=['socials','affiliations','chapters'];
async function loadSiteContent(){
  if(!BACKEND) return;
  try{
    const {data}=await sb.from('site_content').select('data').eq('id',1).single();
    if(data&&data.data){
      SITE_KEYS.forEach(k=>{ if(data.data[k]!=null) content[k]=data.data[k]; });
      SITE_ARRAYS.forEach(k=>{ if(Array.isArray(data.data[k])) content[k]=data.data[k]; });
      if(data.data.roles && typeof data.data.roles==='object'){
        roles=data.data.roles;
        if(!roles.owner) roles.owner={name:'Owner',locked:true,caps:allCaps(true)};
        roles.owner.locked=true; roles.owner.caps=allCaps(true);   // owner always keeps every permission
      }
    }
  }catch(e){ /* table may not exist yet — falls back to defaults */ }
}
async function saveSiteContent(silent){
  if(!BACKEND){ if(!silent)toast('Saved (preview)'); return; }
  const payload={roles:roles}; SITE_KEYS.forEach(k=>payload[k]=content[k]); SITE_ARRAYS.forEach(k=>payload[k]=content[k]);
  try{
    const {error}=await sb.from('site_content').upsert({id:1,data:payload});
    if(!silent) toast(error?('Couldn\'t save: '+error.message):'Saved for everyone');
    else if(error) toast('Couldn\'t save: '+error.message);
  }catch(e){ toast('Save failed — is the site_content table set up?'); }
}
function editText(kind){
  const map={mission:{title:'Mission statement',label:'Mission statement',type:'textarea'},tagline:{title:'Home subtitle',label:'Subtitle under “Earth Sweet Earth”',type:'text'},discord:{title:'Discord invite link',label:'Discord invite URL',type:'url'}};
  const m=map[kind];
  openEditor(m.title,[{key:'val',label:m.label,type:m.type,placeholder:kind==='discord'?'https://discord.gg/…':''}],{val:content[kind]},v=>{ content[kind]=v.val; saveSiteContent(); });
}

async function init(){
  document.body.setAttribute('data-theme',theme);
  if(BACKEND){ try{ await loadSession(); await loadSiteContent(); }catch(e){} sb.auth.onAuthStateChange(()=>{loadSession().then(render).catch(()=>{});}); }
  if(!location.hash) location.hash='#/home';
  render();
}
init();
